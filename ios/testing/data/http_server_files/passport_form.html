<!DOCTYPE html>
<html>
<head>
  <title>Passport Form</title>
</head>
<body>
  <form id="passport_form" action="destination.html">
    Passport Number: <input type="text" id="passportNumber" name="passportNumber" autocomplete="passport-number"><br>
    Owner Name: <input type="text" id="passportOwnerName" name="passportOwnerName" autocomplete="passport-owner-name"><br>
    Country: <input type="text" id="passportCountryCode" name="passportCountryCode" autocomplete="passport-country-code"><br>
    Issue Date: <input type="text" id="passportIssueDate" name="passportIssueDate" autocomplete="passport-issue-date"><br>
    Expiration Date: <input type="text" id="passportExpirationDate" name="passportExpirationDate" autocomplete="passport-expiration-date"><br>
    <input type="submit" value="Submit">
  </form>
</body>
</html>
