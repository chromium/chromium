<html>
  <head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    window.capturedEvents = [];
    function recordEvent(e) {
      window.capturedEvents.push({
        type: e.type,
        bubbles: e.bubbles,
        cancelable: e.cancelable,
        key: e.key,
        code: e.code,
        keyCode: e.keyCode,
        which: e.which
      });
    }
    window.onload = function() {
      const inputs = [document.querySelector("input"),
                      document.querySelector("textArea"),
                      document.querySelector("div[contenteditable='true']")];
      inputs.forEach(input => {
        input.addEventListener('input', recordEvent);
        input.addEventListener('change', recordEvent);
        input.addEventListener('keydown', recordEvent);
        input.addEventListener('keypress', recordEvent);
        input.addEventListener('keyup', recordEvent);
      });
    }
  </script>
  </head>
  <body>
    <input style="width: 100px; height: 50px;">
    <textarea style="width: 100px; height: 50px;"></textarea>
    <div contenteditable="true" style="width: 100px; height: 50px;"></div>
  </body>
</html>
