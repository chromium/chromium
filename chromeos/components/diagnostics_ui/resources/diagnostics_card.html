<style include="diagnostics-shared diagnostics-fonts">
  ::slotted([slot=chip]) {
    background-color: var(--google-grey-100);
    border-radius: 16px;
    color: var(--diagnostics-overview-text-color);
    padding: 4px 8px;
  }

  .card-container {
    display: flex;
    flex-direction: column;
    margin-top: 12px;
    width: 650px;
  }

  .card-header {
    @apply --diagnostics-default-font;
    display: flex;
    justify-content: space-between;
    min-height: 25px;
  }

  .card-wrapper {
    border: 1px solid var(--diagnostics-border-color);
    border-radius: 14px;
    margin: 10px 0;
  }

  .data-points {
    border-bottom: 1px solid var(--diagnostics-border-color);
    display: grid;
    grid-template-columns: 1.5fr 0fr 1fr 0fr 1.5fr;
    padding-bottom: 8px;
  }

  .routine-container {
    @apply --diagnostics-default-font;
  }

  .spacing {
    margin: 12px 0px;
    padding-inline-end: 15px;
    padding-inline-start: 15px;
  }

  .top-section {
    border-bottom: 1px solid var(--diagnostics-border-color);
    margin-bottom: 6px;
    margin-top: 12px;
    padding-bottom: 12px;
    padding-inline-end: 15px;
    padding-inline-start: 15px;
  }
</style>
<div class="card-container">
  <div id="title" class="card-header">
    <slot name="title"></slot>
    <slot name="chip"></slot>
  </div>
  <div class="card-wrapper">
    <div class="top-section">
      <slot name="left-panel"></slot>
    </div>
    <div id="body" class="data-points" hidden$="[[hideDataPoints]]">
      <slot name="body"></slot>
    </div>
    <div id="routines" class="routine-container spacing">
      <slot name="routines"></slot>
    </div>
  </div>
</div>
