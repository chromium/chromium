<style include="diagnostics-shared diagnostics-fonts">
  .grid line {
    stroke: lightgrey;
    stroke-opacity: 0.7;
    shape-rendering: crispEdges;
  }

  #chart-legend {
    text-align: center;
  }

  #chart-legend > div {
    display: inline;
    padding: 5px;
  }

  #chart-legend > div > span {
    padding: 2px;
  }

  #plotGroup {
    fill: none;
    stroke-width: 1.5px;
  }

  /* TODO(joonbug): Update with real colors as vars */
  .user-line {
    stroke: blue;
  }

  .system-line {
    stroke: orange;
  }
</style>

<svg id="chart" width$="[[width_]]" height$="[[height_]]">
  <g id="chartGroup">
    <!-- Define chart area and boundaries -->
    <defs>
      <clipPath id="defClip">
        <rect width$="[[graphWidth_]]" height$="[[graphHeight_]]"></rect>
      </clipPath>
    </defs>

    <g id="gridLines" class="grid"></g>
    <g id="plotGroup" clip-path="url(#defClip)">
      <path class="user-line"></path>
      <path class="system-line"></path>
    </g>
  </g>
</svg>
<div id="chart-legend">
  <!-- TODO(joonbug): Add i18n string for percent number format -->
  <div id="legend-user">
    <label>[[i18n('cpuUsageUser')]]</label>
    <span>[[user]]</span>
  </div>
  <div id="legend-system">
    <label>[[i18n('cpuUsageSystem')]]</label>
    <span>[[system]]</span>
  </div>
</div>
