<style>
  #container {
    box-sizing: border-box;
    display: flex;
    flex-flow: row nowrap;
    height: 100%;
    padding: 0 8px 20px 8px;
  }
  img {
    height: 100%;
    width: 224px;
  }
  #textContainer {
    display: flex;
    flex-flow: column nowrap;
  }
</style>
<div id="container">
  <template is="dom-if" if="[[showImage_]]">
    <img src="[[getImageSrc_(image_)]]">
    <div id="textContainer">
      <dom-repeat items="[[image_.attribution]]">
        <template>
          <p>[[item]]</p>
        </template>
      </dom-repeat>
    </div>
  </template>
  <template is="dom-if" if="[[hasError_]]">
    <!-- TODO(b/186668250) real error state -->
    <p id="error">There was an error</p>
  </template>
  <paper-spinner-lite active="[[isLoading_]]"></paper-spinner-lite>
</div>
