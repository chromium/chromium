<style include="untrusted-style">
  .collection-name {
    bottom: 0;
    position: absolute;
    text-align: center;
    width: 100%;
  }
</style>
<iron-list items="[[collections_]]" grid>
  <template>
    <div class="photo-container" data-id$="[[item.id]]"
        on-click="onCollectionClicked_">
      <img src="[[item.preview.url]]">
      <p class="collection-name">[[item.name]]</p>
    </div>
  </template>
</iron-list>
