<style include="common-style untrusted-style">
  :host {
    margin: 12px 0;
  }
</style>
<iron-list items="[[tiles_]]" grid scroll-target="document">
  <template>
    <div class="photo-container" data-id$="[[item.id]]"
      on-click="onCollectionClicked_">
      <div class="padding-fix">
        <template is="dom-if" if="[[item.preview]]">
          <img src="[[item.preview.url]]">
        </template>
        <div class="photo-text-container">
          <p title="[[item.name]]">[[item.name]]</p>
          <p title="[[item.count]]">[[item.count]]</p>
        </div>
        <div hidden$="[[!item.preview]]" class="photo-gradient-mask"></div>
      </div>
    </div>
  </template>
</iron-list>
