syntax = "proto3";

package chromeos.eche_app.proto;

option optimize_for = LITE_RUNTIME;

message ExoMessage {
  oneof payload {
    SignalingRequest request = 1;
    SignalingResponse response = 2;
  }
}

message SignalingRequest {
  bytes data = 1;
}

message SignalingResponse {
  bytes data = 1;
}
