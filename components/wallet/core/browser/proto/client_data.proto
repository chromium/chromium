syntax = "proto2";

package wallet;

import "common.proto";

option optimize_for = LITE_RUNTIME;

// Client data for the pass.
message ClientData {
  // Optional. Holds client-specific data for Chrome.
  optional Any chrome_client_data = 1;
}
