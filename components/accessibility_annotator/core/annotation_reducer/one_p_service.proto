edition = "2024";

package accessibility_annotator;

option optimize_for = LITE_RUNTIME;
option features.utf8_validation = NONE;

message OnePAnnotationsRequest {
  // The natural language user query.
  string query = 1;
}

message OnePAnnotationsResponse {
  // The relevant accessibility annotations as stringified JSON.
  string response = 1;
}
