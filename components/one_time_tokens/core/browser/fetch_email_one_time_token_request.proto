syntax = "proto3";

package google.internal.chrome.passwords.onetimetoken.v1;

option optimize_for = LITE_RUNTIME;

// Request message for FetchEmailOneTimeToken.
message FetchEmailOneTimeTokenRequest {
  // Encrypted reference to the email that contains the OTP.
  bytes encrypted_message_reference = 1;
}
