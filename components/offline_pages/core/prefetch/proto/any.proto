syntax = "proto2";
option optimize_for = LITE_RUNTIME;

package offline_pages.proto;
option java_package = "org.chromium.components.offline_pages.core.prefetch.proto";

message Any {
  optional string type_url = 1;
  optional bytes value = 2;
}
