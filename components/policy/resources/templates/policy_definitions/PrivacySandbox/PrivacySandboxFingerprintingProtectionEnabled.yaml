# This policy is deprecated and should be removed in M146 (crbug.com/454935785).
caption: Choose whether the <ph name="PRIVACY_SANDBOX_NAME">Privacy Sandbox</ph> Fingerprinting Protection feature is to be enabled in Incognito mode.
deprecated: true
default: null
desc: |-
  A policy to control whether the <ph name="PRIVACY_SANDBOX_NAME">Privacy Sandbox</ph> Fingerprinting Protection setting is to be enabled in Incognito mode or disabled for your users.

  If you set this policy to Disabled, then the Fingerprinting Protection feature setting will be turned off for your users.
  If you set this policy to Enabled, your users will have the Fingerprinting Protection feature setting turned on in Incognito mode.
  If the policy is not set, users will be able to turn on or off the Fingerprinting Protection feature for Incognito mode in their UI settings. The default state will be false or disabled, meaning the Fingerprinting Protection feature will be turned off.
example_value: false
features:
  dynamic_refresh: true
  per_profile: true
supported_on:
- android:140-145
- chrome.*:140-145
- chrome_os:140-145
items:
- caption: Enable the <ph name="PRIVACY_SANDBOX_NAME">Privacy Sandbox</ph> Fingerprinting Protection feature in Incognito mode.
  value: true
- caption: Disable the <ph name="PRIVACY_SANDBOX_NAME">Privacy Sandbox</ph> Fingerprinting Protection feature in Incognito mode.
  value: false
- caption: Allow users to turn on or turn off the <ph name="PRIVACY_SANDBOX_NAME">Privacy Sandbox</ph> Fingerprinting Protection setting in Incognito mode on their device.
  value: null
