caption: Control rollout of <ph name="AL_HEADER_NAME">Accept-Language</ph> reduction

desc: |-
  The <ph name="AL_HEADER_NAME">Accept-Language</ph> HTTP request header and the JavaScript <ph name="JS_GETTER_NAME">navigator.languages</ph> getter are planned for reduction for privacy reasons.
  To facilitate testing and ensure compatibility, this policy allows you to enable or disable this reduction rollout.

  If this policy is set to enabled or left unset, <ph name="AL_HEADER_NAME">Accept-Language</ph> reduction rollout will be applied through field trials.
  If this policy is set to disabled, field trials will not be able to activate the reduction rollout.

  For more information about this feature, please visit: https://github.com/explainers-by-googlers/reduce-accept-language.

  NOTE: Only newly-started renderer processes will reflect changes to this policy while the browser is running.

owners:
- victortan@chromium.org
- miketaylr@chromium.org
- potassium-katabolism@google.com

supported_on:
 - chrome.*:136-
 - chrome_os:136-
 - android:136-

features:
  dynamic_refresh: true
  per_profile: true

schema:
  type: boolean
items:
- caption: Enable <ph name="AL_HEADER_NAME">Accept-Language</ph> reduction rollout to be controlled via field trials
  value: true
- caption: Disable <ph name="AL_HEADER_NAME">Accept-Language</ph> reduction rollout to be controlled via field trials
  value: false

default: true

example_value: true

tags: []

type: main
