caption: Determines whether the Chrome Root Store and built-in certificate verifier
  will be used to verify server certificates
default: null
desc: "When this setting is enabled, <ph name=\"PRODUCT_NAME\">$1<ex>Google Chrome</ex></ph>\
  \ will perform verification of server certificates using the built-in certificate\
  \ verifier with the Chrome Root Store as the source of public trust.\n      When\
  \ this setting is disabled, <ph name=\"PRODUCT_NAME\">$1<ex>Google Chrome</ex></ph>\
  \ will not use the Chrome Root Store. Verification may use the system certificate\
  \ verifier, or the builtin verifier if the <ph name=\"BUILT_IN_CERTIFICATE_VERIFIER_ENABLED_POLICY_NAME\"\
  >BuiltinCertificateVerifierEnabled</ph> policy is available and not disabled.\n\
  \      When this setting is not set, the Chrome Root Store or system provided roots\
  \ may be used.\n\n      This policy is planned to be removed in <ph name=\"PRODUCT_NAME\"\
  >$1<ex>Google Chrome</ex></ph> for <ph name=\"MS_WIN_NAME\">Microsoft® Windows®</ph>\
  \ and <ph name=\"MAC_OS_NAME\">macOS</ph> version 111, when support for using the\
  \ platform supplied certificate verifier and roots are planned to be removed.\n\
  \      "
example_value: false
features:
  dynamic_refresh: false
  per_profile: false
items:
- caption: Use the Chrome Root Store.
  value: true
- caption: Do not use the Chrome Root Store.
  value: false
- caption: Chrome Root Store may be used depending on feature launch process.
  value: null
owners:
- mattm@chromium.org
- hchao@chromium.org
schema:
  type: boolean
supported_on:
- chrome.win:105-
- chrome.mac:105-
tags: []
type: main
