caption: Force WebSQL in non-secure contexts to be enabled.
default: false
desc: |-
  WebSQL in non-secure contexts is off by default as of M107 and will be fully removed in M110.
            If this policy is set to false or unset, WebSQL in non-secure contexts will remain on until the end of M106, then off from M107.
            If this policy is set to true, WebSQL in non-secure contexts will be enabled.
example_value: true
features:
  dynamic_refresh: false
  per_profile: true
future_on:
- fuchsia
items:
- caption: Force WebSQL in non-secure contexts to be enabled.
  value: true
- caption: Disable WebSQL in non-secure contexts unless enabled by Chrome flag.
  value: false
owners:
