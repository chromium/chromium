caption: Allow tab organizer

desc: |-
  This policy allows you to control how your organization's data is handled with <ph name="PRODUCT_NAME">$1<ex>Google Chrome</ex></ph>'s Tab organizer. This policy will take precedence over any future blanket policy.

  Setting the policy to "Allowed" will allow feature use for organization.

  Setting the policy to "Allow without data collection" will opt-out of collecting enterprise data for model training. This setting also disables data sharing via the in-feature Feedback dialog, and sending data for human evaluation. As a result, Google does not use enterprise user content (including prompts, inputs, outputs, and source materials) for model training. This would ensure that Google does not use enterprise user data to train or improve its AI models. Google does not save enterprise user content including (prompts, sources, inputs or outputs). Note that these may be stored up to 24 hours to keep situational context. This would ensure that Google does not collect or store any data that is entered into or generated by an AI feature. This includes user inputs, generated outputs, and user feedback.

  Setting the policy to "Disabled" will fully disable feature.
default: 0
example_value: 1
features:
  dynamic_refresh: true
  per_profile: true
items:
- caption: Allow feature use for organization
  name: Allowed
  value: 0
- caption: Allow without data collection
  name: AllowedWithoutLogging
  value: 1
- caption: Fully disable feature
  name: Disabled
  value: 2
owners:
- file://chrome/browser/ui/tabs/OWNERS
- file://components/optimization_guide/OWNERS
schema:
  enum:
  - 0
  - 1
  - 2
  type: integer
tags:
- google-sharing
supported_on:
- chrome.*:121-
- chrome_os:121-
tags: []
type: int-enum
