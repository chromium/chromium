owners:
- ydago@chromium.org
- file://components/policy/OWNERS

caption: Profile separation data migration settings

desc: |-
  This policy controls the behavior if users are allowed to bring existing browsing data into a managed profile created as after a managed account login in the content area.

  If this policy is set to UserOptInData or unset, the user has the choice to bring existing browsing data or not in the managed profile, the checkbox in the profile creation dialog will be visible and unchecked by default.

  If this policy is set to UserOptOutData, the user has the choice to bring existing browsing data or not in the managed profile, the checkbox in the profile creation dialog will be visible and checked by default. This option is only allowed on managed devices.

  If this policy is set to AlwaysSeparateData, the user cannot bring any existing browsing data or not, the checkbox in the profile creation dialog will not be visible.

  Bringing existing browsing data in the managed profile means that the current profile will become managed, no new profile will be created.

  Not bringing existing browsing data in the managed profile means that a new clean profile will be created, and the existing browsing data will stay in an unmanaged profile which will still be accessible to the user via the profile picker.

  This policy requires the <ph name="PROFILE_SEPARATION_SETTINGS_POLICY_NAME">ProfileSeparationSettings</ph> policy to be set to take effect.

future_on:
- chrome.*

features:
  cloud_only: true
  dynamic_refresh: true
  per_profile: true

type: int-enum

schema:
  type: integer
  enum:
  - 1
  - 2
  - 3

items:
- caption: Let users decide to bring existing browsing data into their managed profile
  name: UserOptInData
  value: 1
- caption: Suggest to users to bring their existing data in the managed profile and give them a choice not too
  name: UserOptOutData
  value: 2
- caption: Users cannot bring existing browsing data in their managed profile
  name: AlwaysSeparateData
  value: 3

default: null
example_value: 1
tags: []
