<style>
/*
 * Note: some styles below are duplicated across a few HTML files (policy_row,
 * policy_precedence_row, policy_conflict, policy_table). This is preferable
 * to using a stylesheet, as otherwise the content appears unstyled initially
 * and then flashes to the correct styling after the stylesheet loads.
 */
:host(:not([hidden])) {
  display: block;
  border-top: 1px solid var(--table-border);
}

.row:not([hidden]) {
  display: flex;
}

.row > * {
  background-color: var(--table-row-expanded-background);
  box-sizing: border-box;
  flex: 0 0 10%;
  overflow: hidden;
  padding: 12px;
  text-align: start;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.name {
  border-inline-end: 1px solid var(--table-border);
  flex: 0 0 25%;
}

.value {
  flex: 0 0 25%;
}

.policy.conflict.row .value,
.value.row .value {
  flex-grow: 1;
  font-family: monospace;
  max-height: 200px;
  overflow: auto;
  overflow-wrap: break-word;
  text-overflow: unset;
  white-space: pre-wrap;
}

<if expr="not is_android and not is_ios">
.conflict.row .name {
  text-align: end;
}
</if>

.copy,
.toggle {
  cursor: pointer;
}

.link img {
  height: 12px;
  width: 12px;
}

<if expr="is_android or is_ios">
.policy.conflict.row {
  display: none;
}

.policy.conflict.entry {
  display: block;
}

.row > .name {
  flex: 0 0 35%;
}

.row > .value {
  display: block;
  flex: 1;
}

.copy {
  flex: 0 0 auto;
}
</if>
</style>
<div class="policy conflict row" role="row">
  <div class="name" role="rowheader">$i18n{conflictValue}</div>
  <div class="value" role="cell"></div>
  <div class="source" role="cell"></div>
  <div class="scope" role="cell"></div>
  <div class="level" role="cell"></div>
  <div class="messages" role="cell"></div>
  <div class="copy" role="cell">
    <a is="action-link" class="copy-value link" role="button">
      <img src="chrome://resources/images/icon_copy_content.svg" alt="">
    </a>
  </div>
</div>
<if expr="is_android or is_ios">
  <div class="policy conflict entry" role="rowgroup">
    <div class="value row" role="row">
      <div class="name" role="rowheader">$i18n{conflictValue}</div>
      <div class="value" role="cell"></div>
      <div class="copy" role="cell">
        <a is="action-link" class="copy-value link" role="button">
          <img src="chrome://resources/images/icon_copy_content.svg" alt="">
        </a>
      </div>
    </div>
    <div class="source row" role="row">
      <div class="name" role="rowheader">$i18n{headerSource}</div>
      <div class="value" role="cell"></div>
    </div>
    <div class="scope row" role="row">
      <div class="name" role="rowheader">$i18n{headerScope}</div>
      <div class="value" role="cell"></div>
    </div>
    <div class="level row" role="row">
      <div class="name" role="rowheader">$i18n{headerLevel}</div>
      <div class="value" role="cell"></div>
    </div>
  </div>
</if>
