<!DOCTYPE html>
<html dir="$i18n{textdirection}" lang="$i18n{language}">
<head>
  <meta charset="utf-8">
  <title>Policy Logs</title>
  <meta name="viewport" content="width=device-width">
  <link rel="stylesheet" href="chrome://resources/css/text_defaults.css">
  <link rel="stylesheet" href="../policy_shared_vars.css">

  <style>
    body {
      background: var(--page-background);
      color: var(--text-color);
    }

    h2,
    ul,
    .version-info-table-data {
      word-break: break-word;
    }

    .buttons-row {
      align-items: center;
      display: flex;
      height: 56px;
      flex-wrap: nowrap;
      gap: 8px;
    }

    button {
      align-items: center;
      border-radius: 4px;
      border: 1px solid var(--action-row-button-border);
      background: var(--action-row-button-background);
      box-sizing: border-box;
      cursor: pointer;
      display: inline-flex;
      flex-shrink: 0;
      height: 32px;
      justify-content: center;
      padding: 8px 16px;
      user-select: none;
    }

    button:hover {
      filter: brightness(var(--action-row-button-hover-brightness));
    }

    button:active {
      filter: brightness(var(--action-row-button-active-brightness));
    }

    .label {
      font-weight: bold;
      padding-inline-end: 5px;
      vertical-align: top;
    }

    .label::after {
      content: ':';
    }

    ul {
      list-style-type: none;
    }

    li {
      margin-bottom: 5px;
    }

    /* Lay out #logs-container is a <table> element. */
    #logs-container {
      display: table;
    }

    #logs-container a {
      text-decoration: none;
      color: inherit;
    }

    #logs-container a:hover {
      text-decoration: underline;
    }

    .log-line {
      display: table-row;
      font-family: monospace;
      margin-bottom: 5px;
    }

    .log-column {
      display: table-cell;
      vertical-align: top;
    }

    .timestamp, .severity, .file-and-line {
      color: var(--google-grey-700);
      padding-right: 1ch;
      text-align: right;
      white-space: nowrap;
    }

    @media (prefers-color-scheme: dark) {
      .timestamp, .severity, .file-and-line {
        color: var(--google-grey-500);
        text-align: right;
      }
    }

    .file {
      display: inline-block;
      max-width: 35ch;
      overflow-x: hidden;
      text-decoration: inherit;
      text-overflow: ellipsis;
      vertical-align: bottom;
    }

    @media (max-width: 1000px) {
      .file {
        max-width: 26ch;
      }
    }

    @media (max-width: 800px) {
      /* On mobile, don't lay out #logs-container as a <table>. Instead,
         show the timestamp, severity, and file/line right above the
         message. */
      #logs-container {
        display: block;
      }

      .log-line {
          display: block;
      }

      .log-column {
        display: inline-block;
      }

      .message {
          display: block;
      }
    }

    .message {
      text-align: left;
    }
  </style>
</head>

<body>
    <h1>$i18n{logsTitle}</h1>

    <div class="buttons-row">
      <button id="logs-dump">$i18n{exportLogsJSON}</button>
      <button id="logs-refresh">$i18n{refreshLogs}</button>
    </div>

    <h2>$i18n{versionInfoLabel}</h2>

    <table id="version-info" aria-label="Version Information">
      <tr>
        <td class="label">$i18n{browserName}</td>
        <td id="chrome-version-value" class="version-info-table-data">-</td>
      </tr>

      <tr>
        <td class="label">$i18n{revision}</td>
        <td id="chrome-revision-value" class="version-info-table-data">-</td>
      </tr>

      <tr>
        <td class="label">$i18n{os}</td>
        <td id="os-version-value" class="version-info-table-data">-</td>
      </tr>
    </table>

    <h2>Logs</h2>

    <div id="logs-container" role="grid" aria-label="Logs List"></div>

    <h2>$i18n{variations}</h2>

    <ul id="active-variations-container" aria-label="Active Variations List"></ul>
  <script type="module" src="/logs/policy_logs.js"></script>
</body>
</html>
