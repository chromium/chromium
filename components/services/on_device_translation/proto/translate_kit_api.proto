syntax = "proto2";

package chrome.on_device_translation;

// Optimize generated output for Lite, since it's going to be running on
// end-user devices.
option optimize_for = LITE_RUNTIME;
option java_multiple_files = true;

// The config to initialize the TranslateKit library for Chrome's use.
// Next ID: 3
message TranslateKitConfig {
  // A fully-qualified path string to the directory containing PackageInfo
  // .binarypb files to initialize TranslateKit's SideLoadPlatformManager.
  optional string package_info_dir = 1;

  // A fully-qualified path string to the root directory where translation model
  // exist. TranslateKit's SideLoadPlatformManager will combine it with the
  // relative path parsed from a language's PackageInfo to decide the full
  // runtime path to the language models.
  optional string model_root_dir = 2;
}
