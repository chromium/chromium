syntax = "proto2";
option optimize_for = LITE_RUNTIME;

package chrome_intelligence_modelexecution_proto;

message Descriptor {
  required string descriptor1 = 1;
  required string descriptor2 = 2;
  optional string descriptor3 = 3;
  optional string descriptor4 = 4;
}

message WallpaperSearchRequest {
  oneof info {
    string query = 1;
    Descriptor selector = 2;
  }
}

message WallpaperSearchResponse {
  repeated bytes images = 1;
}
