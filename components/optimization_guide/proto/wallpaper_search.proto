syntax = "proto2";
option optimize_for = LITE_RUNTIME;

package chrome_intelligence_modelexecution_proto;

message Descriptors {
  optional string descriptor_a = 1;
  optional string descriptor_b = 2;
  optional string descriptor_c = 3;
  optional string descriptor_d = 4;
}

message Image {
  optional bytes encoded_image = 1;
}

message WallpaperSearchRequest {
  reserved 1;
  optional Descriptors descriptors = 2;
}

message WallpaperSearchResponse {
  reserved 1;
  repeated Image images = 2;
}
