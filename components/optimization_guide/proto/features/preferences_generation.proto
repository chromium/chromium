syntax = "proto3";

package optimization_guide.proto;

import "components/optimization_guide/proto/model_quality_metadata.proto";

option optimize_for = LITE_RUNTIME;
option java_package = "org.chromium.components.optimization_guide.features.proto";

option java_outer_classname = "PreferencesGenerationProto";

// DO NOT EDIT THIS FILE DIRECTLY!
//
// This file is generated in g3 and then synced to Chrome. Instead, please
// refer to http://go/chrome-intelligence-feature-protos (Google-internal link),
// and then changes will be synced with Chrome automatically.

message PreferencesGenerationLoggingData {
  PreferenceRequest request = 1;

  PreferenceResponse response = 2;

  ModelExecutionInfo model_execution_info = 3;
}

message PreferenceRequest {
  repeated RequestVisit visits = 1;

  PreferenceType request_type = 2;
}

// Data from ChromeHistoryProto.
message RequestVisit {
  // The URL of the visited page.
  string url = 1;

  // The title of the visited page.
  string title = 2;

  // ID of the visit on the originator client.
  // Maps to ChromeHistoryProto.originator_visit_id.
  int64 visit_id = 4;

  // The ID of the visit, on the originator client, that was a referrer for
  // this one, or 0 if no referrer exists.
  // Maps to ChromeHistoryProto.originator_referring_visit_id.
  int64 referring_visit_id = 5;

  // The ID of the visit, on the originator client, that opened this one, or 0
  // if no opener exists.
  // Maps to ChromeHistoryProto.originator_opener_visit_id.
  int64 opener_visit_id = 6;

  reserved 3, 7;
}

message PreferenceResponse {
  repeated CUJPreference cuj_preferences = 1;
}

message CUJPreference {
  string task_category = 1; // e.g. Grocery Shopping, Electronic Shopping

  repeated Preference preferences = 2;
}

message Preference {
  string value = 1;

  Attribution attribution = 2;

  ConfidenceLevel confidence = 3;
}

message Attribution {
  // The visits for later history delete related tracking
  repeated int64 visit_ids = 1;
}

enum PreferenceType {
  PREFERENCE_TYPE_UNSPECIFIED = 0;

  PREFERENCE_TYPE_SITE = 1;
}

enum ConfidenceLevel {
  CONFIDENCE_LEVEL_UNSPECIFIED = 0;

  CONFIDENCE_LEVEL_LOW = 1;

  CONFIDENCE_LEVEL_MEDIUM = 2;

  CONFIDENCE_LEVEL_HIGH = 3;
}
