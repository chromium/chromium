<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  padding: 0;
}
</style>
<script>
  let mutationObserver = null;
  let emptyChangeDetected = false;

  // Create and attach the embed element. Called from the browser test with the
  // content_id. Optional embedId can be provided to give the embed an ID
  // attribute for later targeting.
  function createEmbed(contentId, embedId) {
    const embed = document.createElement('embed');
    embed.setAttribute('data-content-id', contentId);
    embed.setAttribute('type', 'application/x-google-chrome-surface-embed');
    if (embedId !== undefined) {
      embed.id = embedId;
    }
    document.body.appendChild(embed);
  }

  // Get the current data-content-id of a specific embed. If embedId is
  // provided, targets the embed with that ID. Otherwise, targets the first
  // embed.
  function getDataContentId(embedId) {
    let embed;
    if (embedId !== undefined) {
      embed = document.getElementById(embedId);
    } else {
      embed = document.querySelector('embed');
    }
    return embed ? embed.getAttribute('data-content-id') : null;
  }

  // Changes the data-content-id attribute on the embed element.
  // If embedId is provided, targets the embed with that ID. Otherwise, targets
  // the first embed.
  function setDataContentId(contentId, embedId) {
    let embed;
    if (embedId !== undefined) {
      embed = document.getElementById(embedId);
    } else {
      embed = document.querySelector('embed');
    }
    if (embed) {
      embed.setAttribute('data-content-id', contentId);
    }
  }

  // Start monitoring for changes to data-content-id to "0".
  function startMonitoringDataContentId() {
    emptyChangeDetected = false;
    const embed = document.querySelector('embed');
    if (!embed) return;

    mutationObserver = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        if (mutation.type === 'attributes' &&
            mutation.attributeName === 'data-content-id') {
          const newValue = embed.getAttribute('data-content-id');
          if (newValue === '') {
            emptyChangeDetected = true;
          }
        }
      }
    });

    mutationObserver.observe(embed, {
      attributes: true,
      attributeFilter: ['data-content-id']
    });
  }

  // Stop monitoring for data-content-id changes.
  function stopMonitoringDataContentId() {
    if (mutationObserver) {
      mutationObserver.disconnect();
      mutationObserver = null;
    }
  }

  // Check if a data-content-id change to empty was detected.
  function wasEmptyChangeDetected() {
    return emptyChangeDetected;
  }
</script>
</head>
<body>
</body>
</html>
