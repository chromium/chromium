# See https://jj-vcs.github.io/jj/latest/config/ for the schema.

[aliases]
# This allows the script to be run from directories other than the workspace
# root.
"relative-script" = ["util", "exec", "python3", "--", "-c", """
import os, sys
script = os.path.join(os.environ['JJ_WORKSPACE_ROOT'], sys.argv[1])
os.execv(script, [script, *sys.argv[2:]])
"""]

# Note that this will still output a URL even if it has never been uploaded.
"gerrit-url" = [
  "log",
  "--no-graph",
  "-T",
  '"https://chromium-review.googlesource.com/q/" ++ if(trailers.contains_key("Change-Id"), trailers.filter(|t| t.key() == "Change-Id").map(|t| t.value()), "I" ++ change_id.normal_hex() ++ "6a6a6964") ++ "\n"'
]

# cr-* aliases are the equivalent of "porcelain" commands and should not
# be overridden.
# All cr-foo commands will have a corresponding foo command that you can
# override with your preference (eg. sync -> ["cr-sync", "-a"])
"cr-sync" = ["relative-script", "tools/jj/sync.py"]
"sync" = ["cr-sync"]

"cr-upload" = ["relative-script", "tools/jj/upload.py"]
"upload" = ["cr-upload"]

"cr-bug" = ["relative-script", "tools/jj/bug.py"]
"bug" = ["cr-bug"]

# jj workspace add doesn't work because of .gclient.
"cr-new-chromium-workspace" = ["relative-script", "tools/jj/new_workspace.py"]
"new-chromium-workspace" = ["cr-new-chromium-workspace"]

# This makes the UX much nicer.
[workspace]
auto-update-stale = true

[revset-aliases]
"trunk()" = "main@origin"
"immutable_heads()" = "remote_bookmarks() | tags()"

[git]
auto-local-bookmark = false
# This is unrelated to gerrit change IDs.
# It will eventually be supported by gerrit instead of the Change-ID footer.
write-change-id-header = true

# For users of jj-on-piper, this is enabled by default for *all* repos.
# We want chrome's formatters, not google3's.
[fix.tools.google3format]
enabled = false
# If you're not using the google-internal jj, this will complain that
# google3format is an invalid fix tool because it has no command/patterns
command = ["/dev/null"]
patterns = ["null"]

# The source of truth for the following formatters is depot_tools' git_cl.py
# On Windows, depot_tools executables like gn, vpython3, and lucicfg are .bat
# files that won't be found by jj's subprocess invocation without the .bat
# extension. Windows --scope blocks below override commands with .bat variants.
[fix.tools.gn-format]
command = ["gn", "format", "--stdin"]
patterns = [
    "glob:'**/*.gn'",
    "glob:'**/*.gni'",
    "glob:'**/*.typemap'",
]

[fix.tools.java-format]
command = ["third_party/google-java-format/google-java-format", "--aosp", "-"]
patterns = ["glob:'**/*.java'"]

[fix.tools.rust-format]
command = ["third_party/depot_tools/rustfmt.py", "--config-path=.rustfmt.toml"]
patterns = ["glob:'**/*.rs'"]

[fix.tools.clang-format]
command = ["third_party/depot_tools/clang_format.py", "--assume-filename=$path"]
line-range-arg = "--lines=$first:$last"
patterns = [
    "glob:'**/*.cc'",
    "glob:'**/*.cpp'",
    "glob:'**/*.h'",
    "glob:'**/*.m'",
    "glob:'**/*.mm'",
    "glob:'**/*.proto'",
    "glob:'**/*.js'",
    "glob:'**/*.ts'",
]

[fix.tools.py-format]
command = ["tools/jj/formatters/python.py", "$path"]
patterns = ["glob:'**/*.py'"]

[fix.tools.md-format]
command = ["third_party/depot_tools/markdown_format.py", "--from-stdin", "--assume-filename=$path"]
patterns = [
    "glob:'agents/**/*.md'",
    "glob:'.gemini/**/*.md'",
]

[fix.tools.mojom-format]
command = ["vpython3", "mojo/public/tools/mojom/mojom_format.py"]
patterns = [
    "glob:'**/*.mojom'",
    "glob:'**/*.test-mojom'",
]

[fix.tools.lucicfg-format]
command = ["lucicfg", "fmt", "-stdio", "$path"]
patterns = ["glob:'**/*.star'"]

# This formatter is only available on macos
[[--scope]]
--when.platforms = ["macos"]
[--scope.fix.tools.swift-format]
command = ["third_party/depot_tools/swift_format", "format"]
patterns = ["glob:'**/*.swift'"]

[[--scope]]
--when.platforms = ["windows"]
[--scope.aliases]
# os.execv does not truly replace the process on Windows, which breaks jj's
# process tracking. Use subprocess.call to propagate exit codes correctly.
"relative-script" = ["util", "exec", "python3", "--", "-c", """
import os, subprocess, sys
script = os.path.join(os.environ['JJ_WORKSPACE_ROOT'], sys.argv[1])
sys.exit(subprocess.call([sys.executable, script, *sys.argv[2:]]))
"""]
[--scope.fix.tools.gn-format]
command = ["gn.bat", "format", "--stdin"]
[--scope.fix.tools.rust-format]
command = [
  "vpython3.bat",
  "third_party/depot_tools/rustfmt.py",
  "--config-path=.rustfmt.toml",
]
[--scope.fix.tools.clang-format]
command = [
  "vpython3.bat",
  "third_party/depot_tools/clang_format.py",
  "--assume-filename=$path",
]
[--scope.fix.tools.py-format]
command = ["vpython3.bat", "tools/jj/formatters/python.py", "$path"]
[--scope.fix.tools.md-format]
command = [
  "vpython3.bat",
  "third_party/depot_tools/markdown_format.py",
  "--from-stdin",
  "--assume-filename=$path",
]
[--scope.fix.tools.mojom-format]
command = ["vpython3.bat", "mojo/public/tools/mojom/mojom_format.py"]
[--scope.fix.tools.lucicfg-format]
command = ["lucicfg.bat", "fmt", "-stdio", "$path"]

[gerrit]
review-url = "https://chromium-review.googlesource.com"
