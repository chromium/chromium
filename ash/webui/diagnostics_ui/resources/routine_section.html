<style include="diagnostics-shared">
  :host-context(body.jelly-enabled) #additionalMessage {
    font: var(--cros-body-2-font);
  }

  :host-context(body.jelly-enabled) #testStatusText {
    font: var(--cros-body-2-font);
  }

  #additionalMessage {
    color: var(--cros-text-color-primary);
    font-family: var(--diagnostics-roboto-font-family);
    font-size: 13px;
    font-weight: var(--diagnostics-regular-font-weight);
  }

  .button-container {
    padding: 8px 0 4px;
  }

  .learn-more-button {
    border-radius: 4px;
    height: 32px;
    margin-top: 12px;
    padding: 8px 16px;
  }

  :host-context(body.jelly-enabled) .button-container,
  :host-context(body.jelly-enabled) .learn-more-button {
    font: var(--cros-button-2-font);
  }

  .button-container,
  .learn-more-button {
    font-family: var(--diagnostics-roboto-font-family);
    font-size: 13px;
    font-weight: var(--diagnostics-medium-font-weight);
  }

  #messageIcon {
    --iron-icon-height: 20px;
    --iron-icon-width: 20px;
    fill: var(--cros-icon-color-secondary);
    margin-inline-end: 8px;
  }

  .result-list {
    margin: 20px 0;
  }

  .routine-container {
    display: flex;
    justify-content: space-between;
  }

  .routine-section-container {
    display: flex;
    flex-direction: column;
    /* Ensure assistive tech reads children in CSS order when
       a parent overrides visual order via ::part() + order. */
    reading-flow: flex-visual;
  }

  .routine-status-container {
    display: flex;
    flex-direction: column;
  }

  #testStatusBadge {
    margin-bottom: 4px;
  }

  #testStatusText {
    color: var(--cros-text-color-secondary);
    font-family: var(--diagnostics-roboto-font-family);
    font-size: 13px;
    font-weight: var(--diagnostics-regular-font-weight);
    padding-inline-start: 6px;
  }

  #toggleReportButton,
  #toggleDetailsButton {
    margin-inline-end: 8px;
  }

  .container-spacing {
    margin-bottom: 16px;
    margin-top: 12px;
    padding-inline: 20px;
  }

  :host-context(body.jelly-enabled) .detail-message {
    font: var(--cros-body-2-font);
  }

  .details-list {
    /* Cap at ~5 detail lines (13px font + line spacing) to keep the
       run/stop controls visible without scrolling. */
    max-height: 150px;
    overflow-y: auto;
    margin: 20px 0;
  }

  .detail-message {
    color: var(--cros-text-color-primary);
    font-family: var(--diagnostics-roboto-font-family);
    font-size: 13px;
    font-weight: var(--diagnostics-regular-font-weight);
    white-space: pre-wrap;
  }
</style>
<div class="routine-section-container container-spacing"
    hidden$="[[hideRoutineSection(routines.*)]]">
  <div id="routineSection" part="controls" class="routine-container">
    <div class="routine-status-container">
      <text-badge id="testStatusBadge" badge-type="[[badgeType]]"
          hidden$="[[isStatusHidden(executionStatus)]]"
          value="[[badgeText]]">
      </text-badge>
      <span id="testStatusText"
          hidden$="[[isStatusHidden(executionStatus)]]">
        [[statusText]]
        <span id="learnMoreText" class="link-text"
            hidden$="[[isLearnMoreHidden(executionStatus)]]"
            on-click="onLearnMoreClicked">
          [[i18n('learnMoreShort')]]
        </span>
      </span>
    </div>
    <div class="button-container">
        <iron-icon id="messageIcon" icon="diagnostics:info"
            hidden$="[[isAdditionalMessageHidden(additionalMessage)]]">
        </iron-icon>
        <paper-tooltip for="messageIcon" aria-hidden="true" id="additionalMessage">
          [[additionalMessage]]
        </paper-tooltip>
      <cr-button id="toggleReportButton" on-click="onToggleReportClicked"
          hidden$="[[isReportButtonHidden(hideReportButton, executionStatus, routines.*)]]">
        [[getReportToggleButtonText(opened)]]
      </cr-button>
      <cr-button id="toggleDetailsButton" on-click="onToggleDetailsClicked"
          hidden$="[[isDetailsButtonHidden(showRoutineDetails, detailMessagesHTML.*)]]">
        [[getDetailsToggleButtonText(detailsOpened)]]
      </cr-button>
      <cr-button id="runTestsButton"
          hidden$="[[isRunTestsButtonHidden(testSuiteStatus,
              executionStatus)]]"
          on-click="runTests"
          disabled="[[isRunTestsButtonDisabled(testSuiteStatus,
                                                additionalMessage)]]">
        [[runTestsButtonText]]
      </cr-button>
      <cr-button id="stopTestsButton"
          hidden$="[[isStopTestsButtonHidden(executionStatus)]]"
          on-click="stopTests">
        [[i18n('stopTestButtonText')]]
      </cr-button>
    </div>
  </div>
  <iron-collapse id="collapse" part="results" opened="{{opened}}">
    <div class="result-list">
      <routine-result-list id="resultList"
          hide-vertical-lines="[[hideVerticalLines]]"
          using-routine-groups="[[usingRoutineGroups]]">
      </routine-result-list>
    </div>
    <cr-button id="learnMoreButton" class="learn-more-button"
        on-click="onLearnMoreClicked"
        hidden$="[[isLearnMoreButtonHidden(hideLearnMore, isLoggedIn)]]">
      [[i18n('learnMore')]]
    </cr-button>
  </iron-collapse>
  <!-- Detail messages are TrustedHTML produced by sanitizeInnerHtml()
       from plain-text blocks supplied via RoutineResultInfo.details. -->
  <iron-collapse id="detailsCollapse" part="details" opened="{{detailsOpened}}">
    <template is="dom-if" if="[[hasDetailMessages(detailMessagesHTML.*)]]" restamp>
      <div class="details-list grey-container">
        <template is="dom-repeat" items="[[detailMessagesHTML]]">
          <div class="detail-message" inner-h-t-m-l="[[item]]"></div>
        </template>
      </div>
    </template>
  </iron-collapse>
</div>
