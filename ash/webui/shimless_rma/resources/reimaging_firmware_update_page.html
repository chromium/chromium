<style include="cr-shared-style shimless-rma-shared">
</style>
<base-page>
  <div slot="left-pane">
    <iron-icon icon="shimless-icon:warning" class="warning-icon"
        hidden="[[!shouldShowWarning_]]">
    </iron-icon>
    <h1>[[i18n('firmwareUpdatePageTitleText')]]</h1>
    <div id="firmwareUpdateStatus" class="instructions">
      [[getStatusString_(status_)]]
    </div>
  </div>
  <div slot="right-pane">
    <iron-icon icon="[[getIcon_(status_)]]" class="large-icon"
        hidden$="[[shouldShowSpinner_]]">
    </iron-icon>
    <paper-spinner-lite class="large-spinner" hidden$="[[!shouldShowSpinner_]]"
        active>
    </paper-spinner-lite>
  </div>
</base-page>
