<style include="cr-shared-style shimless-rma-shared">
  #pageWrapper {
    align-items: stretch;
    display: flex;
    flex-direction: row;
    height: calc(var(--window-height) - var(--footer-height)
        - var(--header-height));
    width: 100%;
  }

  :host([equal-panes]) #leftPane {
    width: 50%;
  }

  :host([equal-panes]) #rightPane {
    width: 50%;
  }

  :host([left-pane-only]) #leftPane {
    margin-inline-end: 0;
    width: 100%;
  }

  :host([left-pane-only]) #rightPane {
    width: 0;
  }

  #leftPane {
    box-sizing: border-box;
    margin-inline-end: 80px;
    width: 40%;
  }

  #rightPane {
    box-sizing: border-box;
    width: 60%;
  }

  #optionalIcon {
    height: 112px;
  }
</style>
<div id="pageWrapper">
  <div id="leftPane">
    <div id="optionalIcon">
      <slot name="optional-icon"></slot>
    </div>
    <slot name="left-pane"></slot>
  </div>
  <div id="rightPane">
    <slot name="right-pane"></slot>
  </div>
</div>
