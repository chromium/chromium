<style include="cr-shared-style shimless-rma-shared">
  iron-icon {
    height: 200px;
    width: 300px;
  }
</style>

<base-page orientation="column">
  <div slot="header">
    <h1>[[i18n('runCalibrationTitleText')]]</h1>
    <div id="calibration">
      <span>[[calibrationStatusMessage_]]</span>

    <span hidden$="[[!calibrationComplete_]]">[[i18n('runCalibrationCompleteText')]]</span>

  <div slot="body">
    <!-- TODO(gavindodd): Replace with accelerometer calibration image -->
    <iron-icon icon="shimless:shimless-placeholder"></iron-icon>
  </div>
</base-page>
