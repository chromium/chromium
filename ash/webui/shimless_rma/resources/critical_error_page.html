<style include="cr-shared-style shimless-rma-shared">
  .large-icon {
    height: 200px;
    width: 300px;
  }

  #exitToLoginButton {
    border-color: var(--google-blue-600);
    border-radius: 12px;
  }

  #recoverFirmwareButton {
    border-color: var(--google-blue-600);
    border-radius: 12px;
  }
</style>
<base-page>
  <div slot="left-pane">
    <iron-icon slot="optional-icon" icon="shimless-icon:warning"
        class="warning-icon">
    </iron-icon>
    <h1>[[i18n('criticalErrorTitleText')]]</h1>
    <div class="instructions">[[i18n('criticalErrorMessageText')]]</div>
    <div id="writeProtectStatus">[[statusString_]]</div>
    <cr-button id="exitToLoginButton" on-click="onExitToLoginButtonClicked_"
        disabled="[[allButtonsDisabled]]">
      [[i18n('criticalErrorRebootText')]]
    </cr-button>
    <cr-button id="rebootButton" on-click="onRebootButtonClicked_"
        disabled="[[allButtonsDisabled]]">
      [[i18n('criticalErrorRecoverFirmwareText')]]
    </cr-button>
  </div>
  <div slot="right-pane">
    <!-- TODO(gavindodd): Replace with correct graphic -->
    <iron-icon icon="shimless:shimless-placeholder" class="large-icon">
    </iron-icon>
  </div>
</base-page>
