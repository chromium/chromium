<style include="cr-shared-style shimless-rma-shared">
  iron-icon {
    height: 200px;
    width: 300px;
  }
</style>

<base-page orientation="column">
  <div slot="header">
    <!-- TODO(joonbug): Update strings for i18n -->
    <h1>Make sure Chrome OS is up to date</h1>
    <p>Update to the latest version of Chrome OS for an optimized repair process.</p>
    <p id="versionInfo">{{currentVersionText_}}</p>
    <div id="progressMessage">
      <paper-spinner-lite hidden$="[[!updateInProgress_]]" active>
      </paper-spinner-lite>
      [[updateProgressMessage_]]
    </div>
    <p id="networkUnavailable" hidden$="{{networkAvailable}}">
      To check if OS is up to date, connect to the internet in previous screen
    </p>
    <cr-button disabled="[[updateInProgress_]]"
        hidden$="[[!updateAvailable_]]"
        id="performUpdate" on-click="onUpdateButtonClicked_">
      Update to version [[updateVersion_]] and restart
    </cr-button>
  </div>
  <div slot="body">
    <!-- TODO(joonbug): Replace with real image -->
    <iron-icon icon="shimless:shimless-placeholder"></iron-icon>
  </div>
</base-page>
