<style>
  :root {
    --grid-gap: 3px;
    --key-travel: 3px;
  }

  .keyboard {
    display: inline-flex;
    height: 200px;
    width: 100%;
  }

  .main-cluster {
    display: grid;
    flex-grow: 1;
    grid-gap: var(--grid-gap);
    grid-template-columns: repeat(29, 1fr);
    grid-template-rows: 1fr repeat(5, 2fr);
  }

  keyboard-key {
    --keyboard-key-travel: var(--key-travel);
    grid-column: span 2;
  }

  .left {
    --keyboard-key-glyph-alignment: left;
  }

  .right {
    --keyboard-key-glyph-alignment: right;
  }

  #topRow {
    display: flex;
    grid-column: 1 / -1;
  }

  #topRow keyboard-key {
    flex-basis: 0;
    flex-grow: 1;
    margin-right: var(--grid-gap);
  }

  #topRow keyboard-key:last-child {
    margin-right: 0;
  }

  #arrowKeyCluster {
    display: grid;
    grid-column: span 6;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }

  #arrowKeyCluster keyboard-key {
    grid-column: span 1;
    grid-row: 2;
  }

  #arrowKeyCluster keyboard-key:first-child {
    grid-column: 2;
    grid-row: 1;
  }

  /* Default (ANSI) key sizes */

  #backspaceKey,
  #tabKey,
  #enterKey {
    grid-column: span 3;
  }

  #searchKey,
  #rightShiftKey,
  #leftAltKey {
    grid-column: span 4;
  }

  #leftShiftKey,
  #leftCtrlKey {
    grid-column: span 5;
  }

  #spacebar {
    grid-column: span 10;
  }
</style>
<div class="keyboard">
  <div class="main-cluster">
    <div id="topRow">
      <keyboard-key main-glyph="esc"></keyboard-key>
      <!-- TODO(crbug.com/1207678): Use icons for the top row keys. -->
