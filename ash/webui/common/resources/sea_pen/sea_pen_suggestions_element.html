<style include="common cros-button-style">
  #container {
    align-items: center;
    color: var(--cros-text-color-primary);
    display: flex;
    height: 32px;
    margin-top: 12px;
    overflow: hidden;
  }

  #container #suggestionSelector {
    align-items: center;
    display: flex;
    height: 100%;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: start;
    width: 100%;
  }

  #container cr-button {
    background-color: inherit;
    border: 1px solid var(--cros-sys-on_surface);
    border-radius: 8px;
    color: var(--cros-sys-on_surface);
    font-family: var(--cros-button-1-font-family);
    font-size: var(--cros-button-1-font-size);
    height: 32px;
    padding: 6px 12px;
  }

  #title {
    color: var(--cros-sys-on_surface);
    font-family: var(--cros-button-1-font-family);
    line-height: var(--cros-button-1-line-height);
    font-size: var(--cros-button-1-font-size);
    font-weight: var(--cros-button-1-font-weight);
    margin-inline-end: 10px;
  }
</style>
<div id="container">
  <div id="title">Styles:</div>
  <iron-selector
      id="suggestionSelector"
      selected="0"
      role="radiogroup">
    <template is="dom-repeat" items="[[suggestions]]" as="suggestion">
      <cr-button
          class="suggestion"
          on-click="onClickSuggestion_">
        [[suggestion]]
      </cr-button>
    </template>
  </iron-selector>
</div>
