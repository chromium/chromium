<style include="common cros-button-style">
  #container {
    align-items: center;
    color: var(--cros-text-color-primary);
    display: flex;
    max-height: unset;
    overflow: hidden;
  }

  #container #suggestionSelector {
    align-items: center;
    display: flex;
    height: 100%;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    /* Leave 4px of padding for chip outlines. */
    padding: 4px;
    width: 100%;
  }

  #container cr-button {
    background-color: var(--cros-bg-color);
    border-radius: 12px;
    height: 32px;
    padding: 6px 12px 6px 8px;
  }
</style>
<div id="container">
  <iron-selector
      id="suggestionSelector"
      selected="0"
      role="radiogroup">
    <template is="dom-repeat" items="[[suggestions]]" as="suggestion">
      <cr-button class="suggestion">
        [[suggestion]]
      </cr-button>
    </template>
  </iron-selector>
</div>
