<style include="common cros-button-style">
  #tabStrip {
    flex: 0 0 auto;
    margin:
      /*top=*/4px
      /*horizontal=*/calc(var(--personalization-app-grid-item-spacing) / 2)
      /*bottom=*/calc(var(--personalization-app-grid-item-spacing) / 2);
    width: 100%;
  }

  #tabStrip cr-button {
    border: 0;
    border-radius: 16px;
  }

  #tabStrip cr-button + cr-button {
    margin-inline-start: 8px;
  }

  #tabStrip cr-button[aria-pressed='false'] {
    background-color: unset;
    color: var(--cros-text-color-secondary);
  }

  #tabStrip cr-button[aria-pressed='false']:hover {
    background-color: var(--cros-sys-hover_on_subtle);
  }
</style>
<div id="tabStrip">
  <!-- TODO(b/347324352): disable Sample Prompts tab and hide Results tab
    when first routing to Freeform page. -->
  <cr-button id="resultsTab"
      aria-pressed="[[isResultsTabSelected_(selectedTab)]]"
      on-click="onTabSelected_">
    <div class="text">Results</div>
  </cr-button>
  <cr-button id="samplePromptsTab"
      aria-pressed="[[isSamplePromptsTabSelected_(selectedTab)]]"
      on-click="onTabSelected_">
    <div class="text">Sample prompts</div>
  </cr-button>
</div>
