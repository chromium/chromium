<style include="wallpaper common sea-pen cros-button-style">
  #grid {
    overflow-y: auto;
  }

  wallpaper-grid-item {
    --wallpaper-grid-item-width: 100%;
  }

  wallpaper-grid-item::part(item) {
    border-radius: 45px;
  }

  wallpaper-grid-item::part(text) {
    overflow: visible;
    position: relative;
    top: 26px;
    white-space: normal;
    width: calc(100% - 38px);
  }

  wallpaper-grid-item:not(:hover) + cr-icon-button.add-icon {
    display: none;
  }

  wallpaper-grid-item:hover + cr-icon-button.add-icon {
    --cr-icon-button-fill-color: white;
    --cr-icon-button-icon-size: 20px;
    background-color: inherit;
    display: block;
    /* The icon button itself is 36 pixels. Subtract half of that to center the icon. */
    left: calc(50% - 18px);
    margin: 0;
    position: absolute;
    top: 32px;
    z-index: 1;
  }

  .container {
    /* Subtract 0.34px to fix subpixel rounding issues with iron-list. This
     * ensures all grid items in a row add up to at least 1px smaller than the
     * parent width. */
    width: calc(100% / 3 - 0.34px);
  }
</style>
<iron-list id="grid"
    items="[[samples]]"
    as="sample"
    grid
    role="listbox">
  <template>
    <div class="container">
      <wallpaper-grid-item
          on-wallpaper-grid-item-selected="onClickSample_"
          primary-text="[[sample.prompt]]"
          src="[[sample.preview]]">
      </wallpaper-grid-item>
      <cr-icon-button class="add-icon" tabindex="-1" iron-icon="personalization-shared:plus">
      </cr-icon-button>
    </div>
  </template>
</iron-list>
