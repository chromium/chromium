<style include="common cros-button-style">
  .main {
    height: 100%;
    margin-inline-start: 8px;
  }

  #placeholder {
    height: 40px;
  }

  #template {
    align-items: center;
    color: var(--cros-text-color-primary);
    display: flex;
    font: var(--cros-display-6_regular-font);
    gap: 4px;
    height: 40%;
    justify-content: center;
  }

  #template .unselected {
    color: var(--cros-text-color-disabled);
  }

  .clickable.selected {
    border-bottom: 2px dotted var(--cros-text-color-primary);
  }

  .clickable.unselected {
    border-bottom: 2px dotted var(--cros-text-color-disabled);
  }

  #options {
    display: flex;
    gap: 8px;
    height: 30%;
    justify-content: center;
  }

  #searchButtons {
    height: 30%;
    display: flex;
    justify-content: center;
  }

  #searchButtons cr-button {
    margin: 0 4px;
  }

  cr-button[aria-pressed='false'] iron-icon {
    display: none;
  }

  cr-button[aria-pressed='true'] iron-icon {
    --iron-icon-height: 20px;
    --iron-icon-width: 20px;
    display: block;
  }

  cr-button {
    font: var(--cros-button-2-font);
  }

  #options cr-button.unselected-option {
    background-color: var(--cros-sys-system_on_base);
    color: var(--cros-sys-on_surface);
  }
</style>
<div class="main">
  <div id="template">
    <template is="dom-repeat" items="[[templateText_]]" as="word">
      <div>
        <template is="dom-if" if="[[isChip_(word)]]">
          <div class$="[[computeChipClassName_(word, selectedChipText_)]]" on-click="onClickChip_">
            [[getChipDefaultValue_(word)]]
          </div>
        </template>
        <template is="dom-if" if="[[!isChip_(word)]]">
          <div class$="[[computeTextClassName_(selectedChipText_)]]">[[word]]</div>
        </template>
      </div>
    </template>
  </div>
  <div id="options">
    <template is="dom-repeat" items="[[options_]]" as="option">
      <cr-button
          class$="[[getOptionClass_(option, selectedChipText_)]]"
          on-click="onClickOption_"
          value$="[[option.value]]"
          aria-pressed$="[[isOptionSelected_(option, selectedChipText_)]]">
        <iron-icon icon="personalization:circle_checkmark" slot="prefix-icon"></iron-icon>
        [[option.translation]]
      </cr-button>
    </template>
  </div>
  <div id="searchButtons">
    <cr-button class="inspire" value$="[[option.value]]">
      <iron-icon icon="personalization:circle_checkmark" slot="prefix-icon"></iron-icon>
      <!-- TODO(b/308200616) Add finalized text. -->
      Inspire me
    </cr-button>
    <cr-button class="action-button" value$="[[option.value]]">
      <iron-icon icon="sea-pen:photo-spark" slot="prefix-icon"></iron-icon>
      <!-- TODO(b/308200616) Add finalized text. -->
      Create
    </cr-button>
  </div>
</div>
