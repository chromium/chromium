<style include="common cros-button-style">
  .main {
    height: 100%;
    margin-inline-start: 8px;
  }

  #placeholder {
    height: 40px;
  }

  #template {
    align-items: start;
    border-bottom-color: var(--cros-text-color-primary);
    color: var(--cros-text-color-primary);
    display: flex;
    font: var(--cros-display-6_regular-font);
    height: 40%;
    justify-content: center;
    padding: 2px 0;
  }

  #template .unselected {
    border-bottom-color: var(--cros-text-color-disabled);
    color: var(--cros-text-color-disabled);
  }

  .chip-container {
    cursor: pointer;
    display: grid;
    grid-template-areas: 'chip';
  }

  .template-text {
    padding: 0 4px;
  }

  .chip-text {
    border: 2px solid transparent;
    border-radius: 8px;
    bottom: 2px;
    grid-area: chip;
    padding: 0 4px;
    position: relative;
  }

  .chip-text:hover {
    background-color: var(--cros-sys-hover_on_subtle);
  }

  .chip-text:focus {
    background-color: var(--cros-sys-ripple_primary);
    border: 2px solid var(--cros-sys-focus_ring);
  }

  .underline {
    border-bottom: 2px dotted;
    grid-area: chip;
    /* Add one pixel to move the underline below the border. */
    height: calc(100% + 1px);
    justify-self: center;
    /* Subtract 8 pixels so as to not underline the padding from .chip-text. */
    width: calc(100% - 8px);
    z-index: -1;
  }

  #options {
    display: flex;
    height: 30%;
    justify-content: center;
  }

  /* This makes the options scrollable. */
  #optionSubcontainer {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px;
  }

  #searchButtons {
    height: 30%;
    display: flex;
    justify-content: center;
  }

  #searchButtons cr-button {
    margin: 0 4px;
  }

  cr-button[aria-pressed='false'] iron-icon {
    display: none;
  }

  cr-button[aria-pressed='true'] iron-icon {
    --iron-icon-height: 20px;
    --iron-icon-width: 20px;
    display: block;
  }

  cr-button {
    font: var(--cros-button-2-font);
  }

  #options cr-button.unselected-option {
    background-color: var(--cros-sys-system_on_base);
    color: var(--cros-sys-on_surface);
  }
</style>
<div class="main">
  <div id="template">
    <template is="dom-repeat" items="[[templateTokens_]]" as="token">
      <template is="dom-if" if="[[isChip_(token)]]">
        <div class$="chip-container [[getChipClassName_(token, selectedChip_)]]">
          <div class="underline"></div>
          <div class="chip-text" tabindex="0" on-click="onClickChip_" on-keypress="onClickChip_">
            [[token.translation]]
          </div>
        </div>
      </template>
      <template is="dom-if" if="[[!isChip_(token)]]">
        <div class$="template-text [[getTextClassName_(selectedChip_)]]">
          [[token]]
        </div>
      </template>
    </template>
  </div>
  <div id="options">
    <div id="optionSubcontainer">
      <template is="dom-repeat" items="[[options_]]" as="option">
        <cr-button
            class$="[[getOptionClass_(option, selectedChip_.translation)]]"
            on-click="onClickOption_"
            aria-pressed$="[[isOptionSelected_(option, selectedChip_.translation)]]">
          <iron-icon icon="personalization:circle_checkmark" slot="prefix-icon"></iron-icon>
          [[option.translation]]
        </cr-button>
      </template>
    </div>
  </div>
  <div id="searchButtons">
    <cr-button id="inspire" on-click="onClickInspire_">
      <iron-icon icon="sea-pen:inspire" slot="prefix-icon"></iron-icon>
      $i18n{seaPenInspireMeButton}
    </cr-button>
    <cr-button
        id="searchButton"
        class="action-button"
        on-click="onClickSearchButton_">
      <iron-icon icon$="[[getSearchButtonIcon_(path)]]" slot="prefix-icon"></iron-icon>
      [[getSearchButtonText_(path)]]
    </cr-button>
  </div>
</div>
