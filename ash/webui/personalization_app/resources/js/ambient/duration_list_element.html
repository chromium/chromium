<style include="common">
  cr-radio-group {
    width: 100%;
  }
  cr-radio-button {
    height: 48px;
    padding: 0 var(--cr-section-padding);
  }
  cr-radio-button + cr-radio-button {
    border-top: var(--cr-separator-line);
  }
</style>
<div>
  <h3 class="ambient-subpage-element-title">
    Show screen saver[temp]
  </h3>
  <div>
    <cr-radio-group selected="{{selectedDuration_}}">
      <cr-radio-button
          name="[[durations_.kFiveMinutes]]"
          label="for 5 minutes[temp]">
      </cr-radio-button>
      <cr-radio-button
          name="[[durations_.kTenMinutes]]"
          label="for 10 minutes[temp]">
      </cr-radio-button>
      <cr-radio-button
          name="[[durations_.kThirtyMinutes]]"
          label="for 30 minutes[temp]">
      </cr-radio-button>
      <cr-radio-button
          name="[[durations_.kOneHour]]"
          label="for 1 hour[temp]">
      </cr-radio-button>
      <cr-radio-button
          name="[[durations_.kForever]]"
          label="forever[temp]">
      </cr-radio-button>
    </cr-radio-group>
  </div>
</div>
