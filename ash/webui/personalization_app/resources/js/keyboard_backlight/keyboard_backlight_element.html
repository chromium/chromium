<style include="common cros-button-style">
  :host {
    --color-container-size: 48px;
  }

  #container {
    display: grid;
    grid-template-areas:
      '. label   .'
      '. options .'
      '. .       .';
    grid-template-columns: 12px 1fr 20px;
    grid-template-rows: auto 1fr 20px;
  }

  @media (max-width: 700px) {
    #container.preview-container {
      grid-template-rows: auto 1fr 8px;
    }

    #container > #selector {
      column-gap: 11px;
    }

    #selector > #wallpaperColorDescription {
      margin-inline-start: -6px;
    }
  }

  #keyboardBacklightLabel {
    align-items: center;
    background: none;
    border: none;
    display: flex;
    flex-flow: row nowrap;
    grid-area: label;
    justify-content: space-between;
    margin-block-start: 20px;
    margin-inline-start: 8px;
  }

  #keyboardBacklightLabel > p {
    color: var(--cros-text-color-primary);
    font: var(--personalization-app-label-font);
    margin: 0;
  }

  #selector {
    display: flex;
    flex-flow: row wrap;
    grid-area: options;
    margin-top: 14px;
    position: relative;
  }

  .divider {
    align-self: center;
    border-inline-start: 1px solid var(--cros-separator-color);
    height: 20px;
  }

  .selectable:focus-visible {
    border-radius: 50%;
    outline: 2px solid var(--cros-focus-ring-color);
    outline-offset: -2px;
  }

  #toast {
    cursor: default;
    display: flex;
    flex-direction: column;
    position: absolute;
    top: var(--color-container-size);
  }

  #toastDot {
    background-color: var(--cros-button-background-color-primary);
    border-radius: 100%;
    height: 8px;
    margin-block-end: 5px;
    margin-inline-start: 20px;
    width: 8px;
  }

  #toastContent {
    align-items: center;
    background-color: var(--cros-button-background-color-primary);
    border-radius: 20px;
    display: flex;
    flex-direction: row;
    padding: 8px 0;
  }

  #toastContent > svg {
    fill: var(--cros-button-label-color-primary);
    padding: 0 14px;
  }

  #toastContent span {
    color: var(--cros-button-label-color-primary);
    font: var(--cros-body-2-font);
    margin-inline-end: 14px;
  }

  #wallpaperColorDescription {
    color: var(--cros-text-color-secondary);
    font-size: 12px;
    height: 48px;
    line-height: 48px;
    margin-inline-start: 5.5px;
  }

  #zoneCustomizationButton {
    align-self: center;
    display: flex;
    margin-inline-start: auto;
  }

  #zoneCustomizationButton:not([aria-pressed='true']) iron-icon {
    display: none;
  }

  #zoneCustomizationButton[aria-pressed='true'] .text {
    margin-inline-start: 8px;
  }
</style>
<div id="container" class="preview-container">
  <div id="keyboardBacklightLabel">
    <p class="title">$i18n{keyboardBacklightTitle}</p>
  </div>
  <iron-a11y-keys id="keys" keys="left right enter" on-keys-pressed="onKeysPress_">
  </iron-a11y-keys>
  <iron-selector id="selector" selected="0" selectable=".selectable"
      selected-item="{{ironSelectedColor_}}"
      role="radiogroup" aria-describedby="keyboardBacklightLabel">
    <template is="dom-if" if="[[!isMultiZoneRgbKeyboardSupported_]]">
      <div id$="[[wallpaperColorId_]]"
          class$="[[getWallpaperColorContainerClass_(backlightColor_)]]"
          tabindex="0"
          on-click="onWallpaperColorSelected_"
          on-keypress="onWallpaperColorSelected_"
          aria-label="$i18n{wallpaperColor}"
          aria-checked$="[[getWallpaperColorAriaChecked_(backlightColor_)]]"
          title$="[[getWallpaperColorTitle_()]]"
          role="radio">
        <color-icon color-id="[[wallpaperColorId_]]"></color-icon>
        <template is="dom-if" if="[[shouldShowNudge_]]">
          <div id="toast">
            <div id="toastDot"></div>
            <div id="toastContent">
              <svg width="16" height="14" viewBox="0 0 16 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.375 4.375L6.5 0.25L4.625 4.375L0.5 6.25L4.625 8.125L6.5 12.25L8.375 8.125L12.5 6.25L8.375 4.375ZM12.5 7.75L11.5625 9.8125L9.5 10.75L11.5625 11.6875L12.5 13.75L13.4375 11.6875L15.5 10.75L13.4375 9.8125L12.5 7.75Z"></path>
              </svg>
              <span>$i18n{wallpaperColorNudgeText}</span>
            </div>
          </div>
        </template>
      </div>
    </template>
    <template is="dom-if" if="[[!isMultiZoneRgbKeyboardSupported_]]">
      <div class="divider"></div>
    </template>
    <template is="dom-repeat" items="[[presetColorIds_]]" as="presetColorId">
      <div id$="[[presetColorId]]"
          class$="[[getPresetColorContainerClass_(presetColorId, presetColors_, backlightColor_)]]"
          on-click="onPresetColorSelected_" on-keypress="onPresetColorSelected_"
          aria-label$="[[getPresetColorAriaLabel_(presetColorId)]]"
          role="radio"
          aria-checked$="[[getPresetColorAriaChecked_(presetColorId, presetColors_, backlightColor_)]]"
          title$="[[getPresetColorAriaLabel_(presetColorId)]]">
        <color-icon color-id="[[presetColorId]]"></color-icon>
      </div>
    </template>
    <div id$="[[rainbowColorId_]]"
        class$="[[getRainbowColorContainerClass_(backlightColor_)]]"
        tabindex="0"
        on-click="onRainbowColorSelected_" on-keypress="onRainbowColorSelected_"
        aria-label="$i18n{rainbowColor}" role="radio"
        aria-checked$="[[getRainbowColorAriaChecked_(backlightColor_)]]"
        title="$i18n{rainbowColor}">
      <color-icon color-id="[[rainbowColorId_]]"></color-icon>
    </div>
    <template is="dom-if" if="[[isMultiZoneRgbKeyboardSupported_]]">
      <div id$="[[wallpaperColorId_]]"
          class$="[[getWallpaperColorContainerClass_(backlightColor_)]]"
          tabindex="0"
          on-click="onWallpaperColorSelected_"
          on-keypress="onWallpaperColorSelected_"
          aria-label="$i18n{wallpaperColor}"
          aria-checked$="[[getWallpaperColorAriaChecked_(backlightColor_)]]"
          title$="[[getWallpaperColorTitle_()]]"
          role="radio">
        <color-icon color-id="[[wallpaperColorId_]]"></color-icon>
        <template is="dom-if" if="[[shouldShowNudge_]]">
          <div id="toast">
            <div id="toastDot"></div>
            <div id="toastContent">
              <svg width="16" height="14" viewBox="0 0 16 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.375 4.375L6.5 0.25L4.625 4.375L0.5 6.25L4.625 8.125L6.5 12.25L8.375 8.125L12.5 6.25L8.375 4.375ZM12.5 7.75L11.5625 9.8125L9.5 10.75L11.5625 11.6875L12.5 13.75L13.4375 11.6875L15.5 10.75L13.4375 9.8125L12.5 7.75Z"></path>
              </svg>
              <span>$i18n{wallpaperColorNudgeText}</span>
            </div>
          </div>
        </template>
      </div>
      <div id="wallpaperColorDescription">
        $i18n{wallpaperColorDescription}
      </div>
      <cr-button id="zoneCustomizationButton" on-click="showZoneCustomizationDialog_"
          class="secondary"
          aria-pressed$="[[getZoneCustomizationButtonAriaPressed_(currentBacklightState_)]]">
        <iron-icon icon="personalization:circle_checkmark"></iron-icon>
        <div class="text">$i18n{zoneCustomize}</div>
      </cr-button>
    </template>
  </iron-selector>
  <cr-lazy-render id="zoneCustomizationRender">
    <template>
      <zone-customization></zone-customization>
    </template>
  </cr-lazy-render>
</div>
