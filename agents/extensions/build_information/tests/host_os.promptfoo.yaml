prompts:
  - 'What is the OS of the current host?'

# The provider is our custom Python script.
providers:
  - id: python:../../../testing/gemini_provider.py
    config:
      timeoutSeconds: 120
      templates:
        - "agents/prompts/common.minimal.md"

# The test cases will run on the output returned by our Python script.
tests:
  - description: 'Host OS determination'
    assert:
      - type: icontains
        value: 'linux'
