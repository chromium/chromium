# 1. Allow standard built-in and investigation tools
[[rule]]
toolName = [
    "read_file",
    "replace",
    "write_file",
    "remote_code_search",
    "codebase_investigator",
    "run_debugging_agent"
]
decision = "allow"
priority = 100

# 2. Specifically trap and deny grep, instructing the AI to use rg
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["grep"]
decision = "deny"
priority = 200 # Higher priority overrides the allowlist
deny_message = "grep is forbidden. You must use rg (ripgrep) instead."

# 3. Allow specifically approved shell commands via command prefixes
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
    "fdfind",
    "rg",
    "autoninja",
    "tools/autotest.py",
    "./tools/autotest.py",
    "cat",
    "git diff",
    "git log",
    "git show",
    "git restore",
    "git checkout",
    "git status",
    "git grep",
    "head",
    "ls",
    "tail",
    "git cl format",
    "touch gemini_out/commit_message.md",
    "touch gemini_out/summary.json",
    "mkdir -p gemini_out"
]
decision = "allow"
priority = 100

# 4. Catch-all deny for any shell command not in the allowlist above
[[rule]]
toolName = "run_shell_command"
decision = "deny"
priority = 50
deny_message = "This shell command is not in the strict allowlist."
