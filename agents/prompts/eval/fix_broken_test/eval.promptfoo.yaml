description: |
  Fix a broken DummyTest
prompts:
  - 'file://prompt.md'
providers:
  - id: python:../../../testing/gemini_provider.py
    config:
      timeoutSeconds: 1200
      changes:
        - apply: agents/prompts/eval/fix_broken_test/broken_test.patch
tests:
  - assert:
    - type: python
      value: |
        import subprocess
        result = subprocess.run(['out/Default/blink_unittests', '--gtest_filter=*DummyTest*'],
                            capture_output=True,
                            check=True,
                            text=True)
        return (result.returncode == 0 and
                'CSSCalculationValue.DummyTest' in result.stdout)
