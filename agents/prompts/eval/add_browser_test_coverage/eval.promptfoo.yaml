description: Generate a browser test from a description and existing tests.
owner: bryankim@google.com
prompts:
  - 'file://prompt.md'
providers:
  - id: python:../../../testing/gemini_provider.py
    config:
      timeoutSeconds: 1200
tests:
  - assert:
    - type: python
      value: file://../../../testing/asserts/check_changes.py:check_files_changed
      config:
        files:
        - content/browser/usb/usb_browsertest.cc
    - type: python
      value: file://../../../testing/asserts/check_gtests.py
      config:
        binary: content_browsertests
        filter: 'WebUsbTest.*Open*:WebUsbTest.*Close*'
    - type: llm-rubric
      value: file://autorater_prompt.md
    metadata:
      pass_k_threshold: 1
      runs_per_test: 5
      precompile_targets:
      - content_browsertests
