<style>
  :host {
    display: block;
    outline: none;
  }

  .container {
    align-items: center;
    cursor: default;
    display: flex;
    overflow: hidden;
    padding-bottom: 6px;
    padding-inline-end: 16px;
    padding-inline-start: 12px;
    padding-top: 6px;
    position: relative;
  }

  #contents,
  #description {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #separator {
    white-space: pre;
  }
</style>
<div class="container">
  <span id="contents" inner-h-t-m-l="[[contentsHtml_]]"></span>
  <span id="separator" class="dim">[[separatorText_]]</span>
  <span id="description" inner-h-t-m-l="[[descriptionHtml_]]"></span>
</template>
