<style>
  :host {
    background-position: center;
    background-repeat: no-repeat;
    flex-shrink: 0;
    height: var(--favicon-size);
    margin-inline: 8px 24px;
    width: var(--favicon-size);
  }

  :host([in-side-panel_]) {
    margin-inline: 8px 16px;
  }

  #page-image {
    height: auto;
    /* TODO(tommycli): This is just a hack to get the page image to a visible
       size without disturbing the layout. Replace with real sizing logic. */
    width: 300%;
  }
</style>

<template is="dom-if" if="[[imageUrl]]">
  <img id="page-image" is="cr-auto-img" auto-src="[[imageUrl.url]]">
</template>
