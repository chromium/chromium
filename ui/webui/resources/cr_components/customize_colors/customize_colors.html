<style>
  cr-grid {
    --cr-column-width: 1fr;
    --cr-grid-gap: 8px;
    box-sizing: border-box;
    display: block;
    padding: 0 16px;
    width: 100%;
  }

  @media (prefers-color-scheme: dark) {
    #defaultColor {
      --customize-color-border-color: #323639;
    }
  }

  :host-context([chrome-refresh-2023]) customize-color {
    background-color: var(
        --color-side-panel-customize-chrome-color-picker-option-background);
    border-radius: 12px;
  }
</style>
<cr-grid columns="4" role="radiogroup"
    aria-label="$i18n{colorsContainerLabel}">
  <customize-color
      id="defaultColor"
      background-color="[[defaultColor_.background]]"
      base-color="[[defaultColor_.base]]"
      foreground-color="[[defaultColor_.foreground]]"
      title="$i18n{defaultColorName}"
      aria-label="$i18n{defaultColorName}"
      role="radio"
      basic-color>
  </customize-color>
  <customize-color
      id="greyDefaultColor"
      background-color="[[greyDefaultColor_.background]]"
      base-color="[[greyDefaultColor_.base]]"
      foreground-color="[[greyDefaultColor_.foreground]]"
      title="$i18n{greyDefaultColorName}"
      aria-label="$i18n{greyDefaultColorName}"
      role="radio"
      basic-color>
  </customize-color>
</cr-grid>
