<style>
  :host .tree-row {
    align-items: center;
    background-color: rgba(255, 255, 255, 0);
    border: 1px solid rgba(255, 255, 255, 0); /* transparent white */
    border-radius: 2px;
    color: black;
    cursor: default;
    display: flex;
    line-height: 28px;
    padding: 0 3px;
    position: relative;
    user-select: none;
    white-space: nowrap;
  }

  .expand-icon {
    background: url(../images/tree_triangle.svg) no-repeat center center;
    background-size: 8px 5.5px;
    height: 16px;
    min-width: 16px;
    opacity: .6;
    transform: rotate(-90deg);
    transition: all 150ms;
    width: 16px;
  }

  :host-context([dir=rtl]) .expand-icon {
    transform: rotate(90deg);
  }

  :host([expanded]) > .tree-row > .expand-icon {
    background-image: url(../images/tree_triangle.svg);
    opacity: .5;
    transform: rotate(0);
  }

  .tree-row .expand-icon {
    visibility: hidden;
  }

  .tree-row[may-have-children] .expand-icon {
    visibility: visible;
  }

  .tree-row[has-children=false] .expand-icon {
    visibility: hidden;
  }

  .tree-row:hover {
    background-color: hsl(214, 91%, 97%);
    border-color: hsl(214, 91%, 85%);
    z-index: 1;
  }

  /* WebKit has a bug with attribute selectors so we apply selected to the tree
   * row as well. https://bugs.webkit.org/show_bug.cgi?id=12519. */
  .tree-row[selected] {
    background-image: -webkit-linear-gradient(rgba(255, 255, 255, 0.8),
                                              rgba(255,255,255,0));
  }

  .tree-row[selected] {
    background-color: hsl(0, 0%, 90%);
    border-color: hsl(0, 0%, 85%);
    z-index: 2;
  }

  .tree-row[selected]:hover,
  tree:focus .tree-row[selected] {
    background-color: hsl(214, 91%, 89%);
    border-color: rgb(125, 162, 206);
  }

  .tree-children[expanded] {
    display: block;
  }

  .tree-children {
    display: none;
  }

  :host .tree-row > * {
    box-sizing: border-box;
    display: inline-block;
  }

  .tree-label-icon {
    background-position: 0 50%;
    background-repeat: no-repeat;
    height: 20px;
    min-width: 20px;
    width: 20px;
  }

  .tree-label {
    white-space: pre;
  }

  .tree-label-icon,
  .tree-row[may-have-children] > .tree-label-icon {
    background-image: url(chrome://theme/IDR_FOLDER_CLOSED);
  }

  <if expr="is_macosx or is_ios">
  @media (prefers-color-scheme: dark) {
    .tree-label-icon,
    .tree-row[may-have-children] > .tree-label-icon {
      background-image: url(chrome://theme/IDR_FOLDER_CLOSED_WHITE);
    }
  }
  </if>

  <if expr="not is_macosx and not is_ios">
  :host([expanded]) > .tree-row > .tree-label-icon {
    background-image: url(chrome://theme/IDR_FOLDER_OPEN);
  }
  </if>

  :host-context([dir=rtl]) .tree-label-icon,
  :host-context([dir=rtl]) .tree-row[may-have-children] > .tree-label-icon,
  :host-context([dir=rtl]) :host([expanded]) > .tree-row > .tree-label-icon {
    transform: scaleX(-1);
  }

  :host([icon-visibility=hidden]) .tree-label-icon {
    display: none;
  }

  :host([icon-visibility=parent]) .tree-label-icon,
  :host([icon-visibility=parent]) .tree-row[has-children=false] > .tree-label-icon {
    background-image: none;
  }

  /* We need to ensure that even empty labels take up space */
  .tree-label:empty::after {
    content: ' ';
    white-space: pre;
  }

  .tree-rename > .tree-row > .tree-label {
    -webkit-user-modify: read-write-plaintext-only;
    background: white;
    color: black;
    outline: 1px solid black;
    user-select: auto;
  }

  :host([editing]) input {
    /* Do not inherit the line-height */
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    margin: -2px -8px -2px -3px;
  <if expr="not is_macosx and not is_ios">
    outline: none;
  </if>
    padding: 1px 7px 1px 1px;
  }

  :host-context([dir=rtl]) :host([editing]) input {
    margin: -2px -3px -2px -8px;
    padding: 1px 1px 1px 7px;
  }

  @media(forced-colors) {
    .tree-row[selected],
    .tree-row:hover,
    .tree-row[selected]:hover {
      background-color: Highlight;
      background-image: none;
      color: HighlightText;
      forced-color-adjust: none;
    }
  }
</style>
<div class="tree-row">
  <span class="expand-icon"></span>
  <span class="tree-label-icon"></span>
  <span class="tree-label"></span>
</div>
<div class="tree-children" role="group"></div>
