<div id="background"></div>
<div id="stateBackground"></div>
<div id="content">
  ${this.isSpinnerShown_ ? html`
    <paper-spinner-lite active></paper-spinner-lite>` : ''}
    <cr-icon-button id="icon" iron-icon="cr:search" title="${this.label}"
        dir="ltr" tabindex="${this.iconTabIndex_}"
        aria-hidden="${this.iconAriaHidden_}"
        @click="${this.onSearchIconClicked_}" ?disabled="${this.disabled}">
  </cr-icon-button>
  <div id="searchTerm">
    <label id="prompt" for="searchInput" aria-hidden="true">${this.label}</label>
    <input id="searchInput"
        aria-labelledby="prompt"
        autocapitalize="off"
        autocomplete="off"
        type="search"
        @input="${this.onSearchTermInput}"
        @search="${this.onSearchTermSearch}"
        @keydown="${this.onSearchTermKeydown_}"
        @focus="${this.onInputFocus_}"
        @blur="${this.onInputBlur_}"
        ?autofocus="${this.autofocus}"
        spellcheck="false"
        ?disabled="${this.disabled}">
  </div>
  ${this.hasSearchText ? html`
    <cr-icon-button id="clearSearch" iron-icon="cr:cancel"
        title="${this.clearLabel}" @click="${this.clearSearch_}"
        ?disabled="${this.disabled}"></cr-icon-button>` : ''}
</div>
