<busconfig>
  <policy user="chronos">
    <allow own="org.chromium.VmManagementService"/>
  </policy>

  <!-- Allow vm_concierge to send messages to the service -->
  <policy user="crosvm">
    <allow send_destination="org.chromium.VmManagementService"
           send_interface="org.chromium.VmManagementServiceInterface"
           send_member="SetCrostiniVmType"/>
  </policy>
</busconfig>
