<style include="cr-shared-style">
  :host {
    color: var(--cr-primary-text-color);
    display: block;
    font-size: 0.8125rem;  /* 13px */
  }

  cr-toolbar {
    --cr-toolbar-field-width: var(--history-cluster-width);
  }

  #container {
    height: calc(100% - var(--cr-toolbar-height));
    overflow-x: hidden;
    overflow-y: scroll;
  }

  #header {
    align-items: center;
    display: flex;
    margin: var(--history-cluster-padding) auto 0;
    width: var(--history-cluster-width);
  }

  #title {
    display: flex;
    flex-direction: column;
  }

  #title #description {
    color: var(--cr-secondary-text-color);
    font-size: 0.75rem;  /* 12px */
    line-height: 20px;
  }

  #title #text {
    font-size: 2.25rem;  /* 36px */
    line-height: 42px;
  }

  #clusters {
    margin: var(--history-cluster-padding) auto;
    width: var(--history-cluster-width);
  }

  history-cluster + history-cluster {
    margin-top: var(--history-cluster-padding);
  }
</style>
<clusters-router query="{{query_}}"></clusters-router>
<cr-toolbar page-name="History Clusters" clear-label="$i18n{clearLabel}"
    search-prompt="$i18n{searchPrompt}" on-search-changed="onSearchChanged_">
</cr-toolbar>
<div id="container">
  <div id="header" hidden="[[!result_.title]]">
    <div id="title">
      <span id="description">$i18n{titleDescription}</span>
      <span id="text">[[result_.title]]</span>
    </div>
  </div>
  <div id="clusters" on-remove-visits="onRemoveVisits_"
      on-remove-empty-cluster-element="onRemoveEmptyClusterElement_">
    <template is="dom-repeat" items="[[result_.clusters]]">
      <history-cluster cluster="[[item]]"></history-cluster>
    </template>
  </div>
</div>
<iron-scroll-threshold id="scroll-threshold" scroll-target="container"
    on-lower-threshold="onScrolledToBottom_">
</iron-scroll-threshold>

<cr-lazy-render id="confirmationDialog">
  <template>
    <cr-dialog consume-keydown-event on-cancel="onConfirmationDialogCancel_">
      <div slot="title">$i18n{removeSelected}</div>
      <div slot="body">$i18n{removeWarning}</div>
      <div slot="button-container">
        <cr-button class="cancel-button" on-click="onCancelButtonClick_">
          $i18n{cancel}
        </cr-button>
        <cr-button class="action-button" on-click="onRemoveButtonClick_">
          $i18n{remove}
        </cr-button>
      </div>
    </cr-dialog>
  </template>
</cr-lazy-render>
