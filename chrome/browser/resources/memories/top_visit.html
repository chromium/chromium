<style>
  :host {
    --indentation: 52px;
    --search-query-margin: 10px;
    display: block;
    padding: 10px 0;
    position: relative;
  }

  #vertical-line {
    --vertical-line-width: 2px;
    border-inline-start: var(--vertical-line-width) solid var(--image-background-color);
    height: 100%;
    left: calc((var(--visit-row-favicon-size) - var(--vertical-line-width)) / 2);
    position: absolute;
  }

  :host-context([dir='rtl']) #vertical-line {
    left: unset;
    right: calc((var(--visit-row-favicon-size) - var(--vertical-line-width)) / 2);
  }

  :host(:last-of-type) #vertical-line {
    display: none;
  }

  cr-expand-button {
    --cr-active-background-color: transparent;
    --cr-hover-background-color: transparent;
    --cr-section-vertical-padding: 0;
  }

  #related-visits,
  #related-searches {
    margin-inline-start: var(--indentation);
  }

  #related-visits {
    margin-bottom: var(--search-query-margin);
  }

  #related-visits visit-row {
    padding: 4px 0;
  }

  #related-searches {
    align-items: center;
    display: flex;
    flex-direction: row;
    margin-top: calc(-1 * var(--search-query-margin));
  }

  #related-searches-label {
    color: var(--cr-secondary-text-color);
    margin-inline-end: 16px;
    margin-top: var(--search-query-margin);
  }

  #search-queries {
    display: flex;
    flex-wrap: wrap;
  }

  search-query {
    margin-top: var(--search-query-margin);
  }

  search-query:not(:last-of-type) {
    margin-inline-end: var(--search-query-margin);
  }
</style>
<div id="vertical-line"></div>
<template is="dom-if" if="[[visit.relatedVisits.length]]">
  <cr-expand-button expanded="{{expanded_}}">
    <visit-row is-top-visit visit="[[visit]]" on-visit-tap="onVisitTap_">
    </visit-row>
  </cr-expand-button>
  <iron-collapse opened="[[expanded_]]">
    <div id="related-visits">
      <template is="dom-repeat" items="[[visit.relatedVisits]]">
        <visit-row visit="[[item]]"></visit-row>
      </template>
    </div>
    <div id="related-searches" hidden="[[!visit.relatedSearches.length]]">
      <div id="related-searches-label">$i18n{relatedSearchesLabel}</div>
      <div id="search-queries">
        <template is="dom-repeat" items="[[visit.relatedSearches]]">
          <search-query search-query="[[item]]"></search-query>
        </template>
      </div>
    </div>
  </iron-collapse>
</template>
<template is="dom-if" if="[[!visit.relatedVisits.length]]">
  <visit-row is-top-visit visit="[[visit]]"></visit-row>
</template>
