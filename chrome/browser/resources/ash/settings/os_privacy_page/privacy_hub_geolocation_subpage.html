<style include="settings-shared">
  h2 {
    padding-inline-start: var(--cr-section-padding);
  }

  settings-dropdown-menu {
    --md-select-width: 100%;
  }
</style>


<div

    class="settings-box first">

<div class="settings-box">

    Apps

</div>

  </h2>
