<style include="settings-shared">
  #container {
    align-items: center;
    display: flex;
    height: 48px;
    width: 100%;
  }

  #appData {
    align-items: center;
    display: flex;
    flex-direction: row;
    width: 100%;
  }

  #appIcon {
    height: 32px;
    margin-inline-end: 20px;
    width: 32px;
  }

  cr-policy-indicator {
    margin-inline-end: var(--cr-controlled-by-spacing);
  }
</style>
<div id="container" on-click="onPermissionRowClick_" actionable>
  <div id="appData">
    <img id="appIcon" src="chrome://app-icon/[[app.id]]/64"
        alt="[[app.name]] app icon." aria-hidden="true">
    <div id="appNameAndPermissionText">
      <div id="appName">[[app.name]]</div>
      <div id="permissionText" class="secondary">[[permissionText_]]</div>
    </div>
  </div>
  <template is="dom-if" if="[[isPermissionManaged_]]" restamp>
    <cr-policy-indicator indicator-type="devicePolicy"></cr-policy-indicator>
  </template>
  <cr-toggle id="permissionToggle"
      checked="[[checked_]]"
      on-click="onPermissionRowClick_"
      disabled="[[isPermissionManaged_]]"
      aria-labelledby="appName">
  </cr-toggle>
</div>
