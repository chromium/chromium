<style include="settings-shared">
  :host-context(body.revamp-wayfinding-enabled):host {
    --settings-content-backdrop-bg-color: var(--cros-sys-surface1);
    --settings-content-backdrop-margin-bottom: 16px;

    /* The content backdrop should take up the remaining vertical space,
     * accounting for 16px of bottom spacing (margin-bottom). */
    --settings-content-backdrop-min-height: calc(100vh
        - var(--settings-toolbar-height)
        - var(--settings-container-padding-top)
        - var(--settings-content-backdrop-margin-bottom));
  }

  @media (prefers-color-scheme: dark) {
    :host-context(body.revamp-wayfinding-enabled):host {
      --settings-content-backdrop-bg-color: var(--cros-sys-app_base);
    }
  }

  /* L1 and L2+ page content backdrop style */
  :host-context(body.revamp-wayfinding-enabled) ::slotted(.iron-selected) {
    background-color: var(--settings-content-backdrop-bg-color);
    border-radius: 20px;
    box-sizing: border-box;
    margin-bottom: var(--settings-content-backdrop-margin-bottom);
    min-height: var(--settings-content-backdrop-min-height);
    padding-bottom: 16px;
    padding-inline-end: 16px;
    padding-inline-start: 16px;
  }

  /* L1 page-specific style */
  :host-context(body.revamp-wayfinding-enabled)
      ::slotted(div[route-path="default"]) {
    padding-top: 8px;
  }
</style>

<iron-pages id="animatedPages" attr-for-selected="route-path"
    on-iron-select="onIronSelect_">
  <slot></slot>
</iron-pages>
