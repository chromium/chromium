<style include="settings-shared">
  :host {
    --cr-section-indent-width: 60px;
  }

  h2 {
    padding-inline-start: var(--cr-section-padding);
  }

  settings-toggle-button,
  cr-link-row {
    padding-inline-end: var(--cr-section-padding);
    padding-inline-start: var(--cr-section-padding);
  }
</style>

    we can use cr-slider-value-changed. -->

<h2 class="sub-item">Left click</h2>
<div class="settings-box first">
  <div class="start settings-box-text" aria-hidden="true">
    Face gesture
  </div>
  <settings-dropdown-menu
      id="leftClickDropdown"
      menu-options="[[leftClickMenuOptions_]]"
      pref="{{leftClickPref_}}"
      label="Facial gesture">
  </settings-dropdown-menu>
</div>
<h2 class="hr">Right click</h2>
<div class="settings-box first">
  <div class="start settings-box-text" aria-hidden="true">
    Face gesture
  </div>
  <settings-dropdown-menu
      id="rightClickDropdown"
      menu-options="[[rightClickMenuOptions_]]"
      pref="{{rightClickPref_}}"
      label="Facial gesture">
  </settings-dropdown-menu>
</div>
<h2 class="hr">Reset cursor to center</h2>
<div class="settings-box first">
  <div class="start settings-box-text" aria-hidden="true">
    Face gesture
  </div>
  <settings-dropdown-menu
      id="resetCursorDropdown"
      menu-options="[[resetCursorMenuOptions_]]"
      pref="{{resetCursorPref_}}"
      label="Facial gesture">
  </settings-dropdown-menu>
</div>
<h2 class="hr">Toggle dictation</h2>
<div class="settings-box first">
  <div class="start settings-box-text" aria-hidden="true">
    Face gesture
  </div>
  <settings-dropdown-menu
      id="toggleDictationDropdown"
      menu-options="[[toggleDictationMenuOptions_]]"
      pref="{{toggleDictationPref_}}"
      label="Facial gesture">
  </settings-dropdown-menu>
</div>
<h2>Recognition confidence</h2>
<div class="settings-box first">
  <div class="start settings-box-text" aria-hidden="true">
    Brows down
  </div>
  <settings-slider
    id="[[browsDownSlider]]"
    pref="{{browsDownPref_}}"
    min="1" max="100"
    label-aria="Brows down"
    label-min="$i18n{sliderLabel1}"
    label-max="$i18n{sliderLabel100}">
  </settings-slider>
</div>
