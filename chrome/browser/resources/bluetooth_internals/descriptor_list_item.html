<style>
  :host {
    --brief-content-background-color: var(--darker-primary-color);
  }

  .info-container > h4,
  .info-container > div {
    margin: 1em;
  }

  /* Value Control */
  .value-control > div {
    display: flex;
    margin: 4px 0;
  }

  .value-control > div > input {
    flex-grow: 1;
  }

  .value-control > div:nth-of-type(2) {
    justify-content: flex-end;
  }

  h3 {
    font-weight: normal;
    line-height: 1;
    user-select: none;
  }
</style>
<expandable-list-item>
  <div slot="brief-content">
    <div>Descriptor:</div>
    <div class="header-value"></div>
  </div>
  <div slot="expanded-content" class="info-container">
    <h4>Descriptor Info</h4>
    <object-field-set show-all hidden></object-field-set>
    <h4>Value</h4>
  </div>
</expandable-list-item>
