<style include="signin-dialog-shared">
  :host {
    color: var(--cr-primary-text-color);
    display: block;
  }

  cr-button {
    padding-inline-end: 16px;
    padding-inline-start: 16px;
  }

  .action-container {
    bottom: 0;
    box-sizing: border-box;
    position: absolute;
    width: 100%;
  }

  #illustrationContainer {
    height: 168px;
    margin-bottom: 32px;
    position: relative;
    width: 100%;
  }

  #illustration {
    background: url(./images/work_profile_confirmation_illustration.svg);
    background-size: 100% 100%;
    height: 100%;
    position: absolute;
    top: 0;
    width: 100%;
  }

  @media (prefers-color-scheme: dark) {
    #illustration {
      background-image:
          url(./images/work_profile_confirmation_illustration_dark.svg);
    }
  }

  #illustrationContainer > img {
    border-radius: 50%;
    height: 68px;
    left: 0;
    margin: auto;
    position: absolute;
    right: 0;
    top: 96px;
    width: 68px;
  }

  .heading {
    font-weight: normal;
    margin-bottom: 32px;
    padding: 0 24px;
    text-align: center;
  }

  #content-container {
    /* Saves space for button row. */
    padding-bottom: 96px;
    position: relative;
    width: 100%;
  }

  .message-container {
    color: var(--cr-secondary-text-color);
    line-height: 20px;
    margin-bottom: 16px;
    padding: 0 24px;
  }

  @media (prefers-color-scheme: light) {
    #grey-banner {
      background: var(--paper-grey-50);
      height: 128px;
      top: 0;
      width: 100%;
    }
  }
</style>


<div id="illustrationContainer">
  <div id="grey-banner"></div>
  <div id="illustration"></div>
  <img src="[[accountImageSrc_]]">
</div>
<div id="content-container">
  <h1 id="workProfileConfirmationHeading" class="heading">
    $i18n{workProfileConfirmationTitle}
  </h1>
  <div class="message-container secondary"
      inner-h-t-m-l="[[i18nAdvanced('workProfileConfirmationInfo')]]">
  </div>
  <!-- Todo add learn more -->
  <div class="action-container">
    <cr-button id="cancelButton" on-click="onCancel_">
      $i18n{workProfileConfirmationCancelLabel}
    </cr-button>
    <cr-button class="action-button" id="confirmButton"
        on-click="onConfirm_" autofocus>
      $i18n{workProfileConfirmationConfirmLabel}
    </cr-button>
  </div>
</div>
