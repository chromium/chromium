<!DOCTYPE HTML>
<html dir="$i18n{textdirection}" lang="$i18n{language}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$i18n{title}</title>
    <link rel="stylesheet" href="//resources/css/text_defaults_md.css">
    <link rel="stylesheet" href="//theme/colors.css?sets=chrome">
    <style>
      html, body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        overscroll-behavior-x: contain;
        padding: 0;
        width: 100%;
      }

      /* This is only used for first load. */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: rgba(16, 18, 23, 1);
        }
        body[use-stratus-dark-mode-colors="true"] {
          background-color: rgba(34, 36, 43, 1);
        }
      }

      body {
        align-items: stretch;
        display: flex;
        flex-direction: column;
      }

      contextual-tasks-app {
        flex-grow: 1;
      }
    </style>
  </head>
  <body use-stratus-dark-mode-colors="$i18n{useStratusDarkModeColorsAttr}">
    <contextual-tasks-app></contextual-tasks-app>
    <script type="module" src="app.js"></script>
  </body>
</html>
