<div id="container">
  <div id="transcription"
      ?hidden="${!this.transcription || !this.captionsVisible}">
    <span id="transcription-text">${this.transcription}</span>
  </div>
  <div id="main-content">
    <div id="mock-buttons-column"
        ?hidden="${this.mockButtons.length === 0 &&
                   this.sequences.length === 0}">
      <!--
        If there's no microphone present, show a button to inject a pre-canned
        audio message to make development easier.
      -->
      ${this.mockButtons.map((button, index) => html`
        <div class="inject-audio" data-index="${index}"
            @click="${this.onInjectAudioClick}">
          ${button.name}
        </div>
      `)}
      ${this.sequences.map((sequence, index) => html`
        <div class="inject-audio sequence" data-index="${index}"
            @click="${this.onSequenceClick}">
          Seq: ${sequence.name}
        </div>
      `)}
    </div>
    ${this.initializationState !== 'initialized' || !this.usePersona
    ? html`
      <div id="initializerState"
          .className=${this.initializationState}
          ?hidden=${!this.usePersona}>
      </div >`
    : html`
      <video id="talking" .src="${this.speakingBlobUrl}"
          ?hidden="${this.uiState !== 'speaking'}"
          autoplay loop muted playsinline>
      </video>
      <video id="listening" .src="${this.listeningBlobUrl}"
          ?hidden="${this.uiState !== 'listening'}"
          autoplay loop muted playsinline>
      </video>
    `}
  </div>
</div>
