<div id="container">
  <div id="mock-buttons-column" ?hidden="${this.mockButtons.length === 0}">
    <!--
      If there's no microphone present, show a button to inject a pre-canned
      audio message to make development easier.
    -->
    ${this.mockButtons.map((button, index) => html`
      <div class="inject-audio" data-index="${index}"
          @click="${this.onInjectAudioClick}">
        ${button.name}
      </div>
    `)}
  </div>
  <div id="main-content">
    <div id="transcription" ?hidden="${!this.transcription}">
      <span id="transcription-text">${this.transcription}</span>
    </div>
    <div id="persona-container">
      <!--
        TODO(bokan) settle on either "talking" or "speaking", "listening" or
        "idle"
      -->
      ${this.useStateButton
      ? html`
        <button id="stateButton" .className=${this.uiState}>
        </button>`
      : html`
        <video id="talking" .src="${this.talkingBlobUrl}"
            ?hidden="${this.uiState !== 'speaking'}"
            autoplay loop muted playsinline>
        </video>
        <video id="listening" .src="${this.listeningBlobUrl}"
            ?hidden="${this.uiState !== 'idle'}"
            autoplay loop muted playsinline>
        </video>
      `}
    </div>
  </div>
</div>
