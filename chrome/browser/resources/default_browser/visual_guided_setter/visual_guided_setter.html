<!DOCTYPE html>
<html dir="$i18n{textdirection}" lang="$i18n{language}">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <title>$i18n{title}</title>
  <link rel="stylesheet" href="chrome://theme/colors.css?sets=ui,chrome">
  <link rel="stylesheet" href="chrome://resources/css/text_defaults.css">
  <link rel="stylesheet" href="visual_guided_setter.css">
</head>
<body>
  <div id="container" role="main">
    <header id="header">
      <img id="icon" src="chrome_logo.svg" alt="" aria-hidden="true">
      <h1 id="header-title">$i18n{headerTitle}</h1>
    </header>

    <div id="content">
      <div id="illustration-container" aria-hidden="true"></div>

      <section id="instruction-container" aria-labelledby="content-title">
        <h2 id="content-title">$i18n{contentTitle}</h2>
        <p class="description">$i18n{contentDescription}</p>

        <ol class="instructions">
          <li id="setp-1">$i18nRaw{instructionStep1}</li>
          <li id="step-2">$i18nRaw{instructionStep2}</li>
        </ol>

        <div id="arrow-anchor" aria-hidden="true"></div>
      </section>
    </div>
  </div>

  <script type="module" src="visual_guided_setter.js"></script>
</body>
</html>
