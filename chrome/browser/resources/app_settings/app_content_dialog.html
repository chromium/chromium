<cr-dialog id="dialog" close-text="${this.i18n('close')}" show-on-attach
    show-close-button>
  <div slot="title">${this.i18n('appManagementAppContentLabel')}</div>
  <div slot="body">${this.i18n('appManagementAppContentDialogSublabel')}</div>
  <div id="dialogBody" slot="body" scrollable>
    ${this.app.scopeExtensions.map(item => html`
      <div class="list-item">
        ${item}
      </div>
    `)}
  </div>
</cr-dialog>
