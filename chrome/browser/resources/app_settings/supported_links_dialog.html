<cr-dialog id="dialog" close-text="${this.i18n('close')}" show-on-attach
    show-close-button>
  <div slot="title">${this.i18n('appManagementIntentSettingsDialogTitle')}</div>
  <div id="dialogBody" slot="body" scrollable>
    <div id="list">
      ${this.app.supportedLinks.map(item => html`
        <div class="list-item">${item}</div>
      `)}
    </div>
  </div>
</cr-dialog>
