<style>
  :host {
    --view-min-size: 620px;
    color: var(--cr-primary-text-color);
  }

  cr-view-manager {
    display: flex;
    font-size: 100%;
    margin: 0;
  }

  [slot='view'] {
    min-height: var(--view-min-size);
    min-width: var(--view-min-size);
  }

  p {
    margin: 0;
  }

  h1 {
    font-size: 3em;
    font-weight: 500;
    line-height: 44px;
    margin: 24px 0 16px;
  }

  h3 {
    color: var(--cr-secondary-text-color);
    font-size: 1.67em;
    font-weight: 400;
    line-height: 24px;
    margin: 0 0 24px;
  }

  h6 {
    font-size: 1.25em;
    font-weight: 500;
    line-height: 32px;
    margin: 0 0 4px;
  }

  iron-icon {
    --iron-icon-fill-color: var(--icon-color);
    --iron-icon-height: 36px;
    --iron-icon-width: 36px;
    margin-bottom: 16px;
  }

  #central-view-container {
    align-items: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    left: 50%;
    position: absolute;
    text-align: center ;
    top: 50%;
    transform: translate(-50%, -50%);
  }

  #product-logo {
    height: 90px;
    width: 90px;
  }

  #benefit-cards-container {
    display: flex;
    flex-direction: row;
    gap: 12px;
  }

  .benefit-card {
    align-items: center;
    background: var(--benefit-card-background-color);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    height: 172px;
    justify-content: center;
    padding: 24px;
    text-align: center;
    width: 236px;
  }

  #benefit-card-description {
    color: var(--benefit-card-description-color);
    font-size: 1.08em;
    font-weight: 400;
    line-height: 20px;
  }

  #button-container {
    bottom: 24px;
    display: flex;
    flex-direction: row;
    gap: 8px;
    position: fixed;
    right: 24px;
  }

  #button-container > cr-button {
    font-size: 1.08em;
    min-width: 133px;
  }

  #signInPromo {
    --accept-sign-in-button-color: var(--google-blue-600);
    --accept-sign-in-button-text-color: white;
    --benefit-card-background-color: var(--google-grey-50);
    --benefit-card-description-color: var(--cr-secondary-text-color);
    --icon-color: var(--google-blue-600);
    --left-background-image-url: url(images/left_background.svg);
    --right-background-image-url: url(images/right_background.svg);
    font-family: 'Google Sans', Roboto, sans-serif;
  }

  .background-image {
    position: fixed;
    top: 0;
    width: calc(100vw * 17/100);
  }

  #left-background-image {
    content: var(--left-background-image-url);
    left: 0;
  }

  #right-background-image {
    content: var(--right-background-image-url);
    right: 0;
  }

  @media (prefers-color-scheme: dark) {
    #signInPromo {
      --accept-sign-in-button-color: var(--google-blue-300);
      --accept-sign-in-button-text-color: var(--google-grey-900);
      --benefit-card-background-color: var(--google-grey-800);
      --benefit-card-description-color: white;
      --icon-color: var(--google-blue-300);
      --left-background-image-url: url(images/left_background_dark_mode.svg);
      --right-background-image-url: url(images/right_background_dark_mode.svg);
    }
  }
</style>

<cr-view-manager id="viewManager">
  <!-- TODO(crbug.com/1347507): On load, transition to "splash" and trigger the
       animation -->
  <div id="splash" slot="view">
    <!-- TODO(crbug.com/1347507): Use <cr_lottie> -->
    🏐 Faster. Safer. Yours.
  </div>

  <!-- TODO(crbug.com/1347507): Implement this as an element?-->
  <div id="signInPromo" slot="view">
    <img class="background-image" id="left-background-image">
    <img class="background-image" id="right-background-image">
    <div id="central-view-container">
      <img id="product-logo" src="product-logo.png">
      <h1>$i18n{pageTitle}</h1>
      <h3>$i18n{pageSubtitle}</h3>
      <div id="benefit-cards-container">
        <template is="dom-repeat" items="[[benefitCards_]]">
          <div class="benefit-card">
            <iron-icon icon="[[item.iconName]]"></iron-icon>
            <h6>[[item.title]]</h6>
            <p id="benefit-card-description">[[item.description]]</p>
          </div>
        </template>
      </div>
    </div>

    <div id="button-container">
      <cr-button id="declineSignInButton" on-click="onContinueWithoutAccountClick_">$i18n{declineSignInButtonTitle}</cr-button>
      <cr-button class="action-button" id="acceptSignInButton" on-click="onContinueWithAccountClick_">$i18n{acceptSignInButtonTitle}
      </cr-button>
    </div>
  </div>
</cr-view-manager>
