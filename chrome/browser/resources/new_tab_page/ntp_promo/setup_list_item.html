  <cr-icon id="bodyIcon" class="${this.completed ? 'completed' : ''}"
      icon="${this.completed ? 'cr:check' : 'ntp-promo:' + this.bodyIconName}">
  </cr-icon>
  <p id="bodyText" class="${this.completed ? 'completed' : ''}">
    ${this.bodyText}
  </p>
  <cr-icon-button ?hidden="${this.completed}" id="actionButton"
      iron-icon="cr:chevron-right"
      aria-label="${this.actionButtonText}"
      @click="${this.onButtonClick_}">
  </cr-icon-button>
