<div id="backing" @click="${this.onClick_}"
    class="${this.completed ? 'completed' : 'pending'}"
    aria-label="${this.actionButtonText}" tabindex="0"
    role="button" ?aria-disabled="${this.completed}"
    >
  <cr-icon id="bodyIcon" class="${this.completed ? 'completed' : ''}"
    icon="${this.completed ? 'cr:check' : 'ntp-promo:' + this.bodyIconName}">
  </cr-icon>
  <p id="bodyText">
    ${this.bodyText}
  </p>
  <cr-icon ?hidden="${this.completed}" id="actionIcon" icon="cr:chevron-right"
    icon="cr:chevron-right"></cr-icon>
  </cr-icon>
</div>
