<div id="titleAndDismissContainer">
  <h2 id="title">$i18n{mobilePromoHeader}</h2>
  <cr-icon-button id="dismissButton" class="icon-clear"
      aria-label="$i18n{close}" title="$i18n{close}">
  </cr-icon-button>
</div>
<div id="descriptionAndQrCodeContainer">
  <div id="description">$i18n{mobilePromoDescription}</div>
  <div id="qrCodeContainer">
    <img id="qrCode" src="data:image/webp;base64,${this.qrCode_}"
        ?hidden="${!this.qrCode_}">
  </div>
</div>
