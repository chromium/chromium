<style>
  :host {
    display: block;
    height: 100%;
    width: 100%;
  }

  #files {
    display: flex;
  }

  .file {
    color: var(--cr-primary-text-color);
    display: block;
    flex-shrink: 0;
    margin-inline-start: 16px;
    text-decoration: none;
    width: 165px;
  }

  .file-icon-container {
    align-items: center;
    background: var(--google-grey-refresh-100);
    border-radius: 4px;
    display: flex;
    height: 136px;
    justify-content: center;
    margin-bottom: 8px;
  }

  .file-icon {
    max-height: 80px;
    width: 80px;
  }

  .file-description {
    color: var(--cr-secondary-text-color);
  }

  .file-info {
    display: flex;
  }

  .user-image {
    max-height: 30px;
  }
</style>
<ntp-module-header
    disable-text="[[i18nRecursive('',
                                  'modulesDisableButtonText',
                                  'modulesDriveSentence')]]"
    on-disable-button-click="onDisableButtonClick_">
  $i18n{modulesDriveTitle}
</ntp-module-header>
<div id="files">
  <template id="fileRepeat" is="dom-repeat" on-dom-change="onDomChange_"
      items="[[files]]">
    <a class="file" href="[[item.itemUrl.url]]" on-click="onFileClick_"
        on-auxclick="onFileClick_">
      <div class="file-icon-container">
        <img
            is="ntp-img"
            class="file-icon"
            draggable="false"
            auto-src="[[getImageSrc_(item)]]">
        </img>
      </div>
      <div class="file-info">
        <template is="dom-if" if="[[item.untrustedPhotoUrl.url]]">
          <img
              is="ntp-img"
              class="user-image"
              draggable="false"
              auto-src="[[item.untrustedPhotoUrl.url]]">
          </img>
        </template>
        <div>
          <div class="file-title">[[item.title]]</div>
          <div class="file-description">[[item.justificationText]]</div>
        </div>
      </div>
    </a>
  </template>
</div>
