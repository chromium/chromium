<style>
  :host {
    /* Colors: */
    --memory-background-color: rgba(0, 0, 0, 0.1);
    --memory-title-color: rgb(255, 255, 255);
    /* Other: */
    --memory-shadow: 0 1px 2px rgba(60, 64, 67, 0.3),
        0 2px 6px 2px rgba(60, 64, 67, 0.15);
  }

  @media (prefers-color-scheme: dark) {
    :host {
      /* Other: */
      --memory-shadow: 0px 2px 6px 2px rgba(0, 0, 0, 0.15),
          0px 1px 2px rgba(0, 0, 0, 0.3);
    }
  }

  :host {
    display: block;
    height: 100%;
    width: 100%;
  }

  ntp-module-header {
    margin-bottom: 8px;
  }

  #memories {
    display: flex;
    flex: 1;
    flex-direction: row;
    flex-wrap: nowrap;
    margin: 16px;
    margin-inline-end: 4px;
  }

  .card {
    border-radius: 8px;
    display: flex;
    flex-grow: 1;
    flex-shrink: 1;
    height: 164px;
    margin-inline-end: 12px;
    max-width: 258px;
    min-width: 123px;
    overflow: hidden;
    position: relative;
  }

  .memory {
    background: var(--memory-background-color);
    box-shadow: var(--memory-shadow);
  }

  .memory::before {
    background: linear-gradient(180deg,
                              rgba(0, 0, 0, 0) 47.92%,
                              rgb(0, 0, 0) 100%);
    bottom: 0;
    content: ' ';
    left: 0;
    opacity: 0.54;
    position: absolute;
    right: 0;
    top: 0;
  }

  .memory-title {
    align-items: flex-end;
    bottom: 0;
    color: var(--memory-title-color);
    display: flex;
    font-size: 16px;
    left: 0;
    letter-spacing: 0.1px;
    line-height: 24px;
    margin: 5px 12px;
    position: absolute;
    right: 0;
    top: 0;
  }

  .memory-img {
    min-height: 100%;
    min-width: 100%;
    object-fit: cover;
  }

  #exploreCard {
    align-items: center;
    border: 1px solid var(--ntp-border-color);
    flex-direction: column;
    justify-content: center;
    text-decoration: none;
  }

  #exploreIconContainer {
    align-content: center;
    background: var(--ntp-selected-light-background-color);
    border-radius: 4px;
    display: grid;
    height: 24px;
    justify-content: center;
    width: 24px;
  }

  #exploreIcon {
    -webkit-mask-image: url(modules/photos/icons/explore_icon.svg);
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-size: 100%;
    background: var(--ntp-selected-border-color);
    height: 16px;
    width: 16px;
  }

  #exploreText {
    color: var(--cr-primary-text-color);
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    margin: 8px 32px;
    text-align: center;
  }

  ntp-info-dialog a {
    color: var(--cr-link-color);
    cursor: pointer;
    text-decoration: none;
  }

  ntp-info-dialog a:focus {
    border-radius: 2px;
    box-shadow: var(--ntp-focus-shadow);
    outline: none;
  }
</style>
<ntp-module-header
    show-info-button on-info-button-click="onInfoButtonClick_"
    show-dismiss-button on-dismiss-button-click="onDismissButtonClick_"
    dismiss-text="[[i18n('modulesPhotosMemoriesHideToday')]]"
    on-disable-button-click="onDisableButtonClick_"
    disable-text="[[i18n('modulesPhotosMemoriesDisable')]]">
  [[i18n('modulesPhotosTitle')]]
</ntp-module-header>
<div id="memories">
  <template id="memoryRepeat" is="dom-repeat" items="[[memories]]">
    <a class="memory card" href="[[item.itemUrl.url]]">
      <img class="memory-img" is="cr-auto-img"
          auto-src="[[resizeImageUrl_(item.coverUrl.url, memories.length)]]"
          draggable="false"></img>
      <div class="memory-title">[[item.title]]</div>
    </a>
  </template>
  <template id="exploreCardElement" is="dom-if" if="[[showExploreMore_]]">
    <a href="https://photos.google.com" target="_blank" id="exploreCard" class="card">
      <div id="exploreIconContainer">
        <div id="exploreIcon"></div>
      </div>
      <div id="exploreText">
        [[i18n('modulesPhotosMemoriesExplore')]]
      </div>
    </a>
  </template>
</div>
<cr-lazy-render id="infoDialogRender">
  <template>
    <ntp-info-dialog inner-h-t-m-l="[[i18nAdvanced('modulesPhotosInfo')]]">
    </ntp-info-dialog>
  </template>
</cr-lazy-render>
