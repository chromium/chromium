<style>
  .tile-item {
    border: 1px solid var(--ntp-border-color);
    border-radius: 8px;
    color: var(--cr-primary-text-color);
    height: 146px;
    margin: 16px 8px;
    text-decoration: none;
    width: 114px;
  }

  .tile-item-title {
    color: var(--ntp-theme-text-color);
    display: block;
    font-size: 12px;
    height: 20px;
    margin-inline-end: auto;
    margin-inline-start: auto;
    margin-top: 6px;
    text-align: center;
    width: 72px;
  }

  .tile-item-title #merchant {
    font-weight: 400;
    max-width: 54px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: var(--ntp-theme-text-shadow);
    white-space: nowrap;
  }

  .tile-item-title #itemCount {
    color: var(--cr-secondary-text-color);
  }

  .favicon-image {
    border-radius: 2px;
    display: block;
    height: 24px;
    margin-inline-end: auto;
    margin-inline-start: auto;
    margin-top: 16px;
    width: 24px;
  }

  .cart-grid {
    --cr-grid-gap: 0;
  }

  .thumbnail-container {
    height: auto;
    margin-top: 12px;
    text-align: center;
    width: auto;
  }

  .thumbnail-container ul {
    list-style-type: none;
    margin-inline-start: -24px;
    padding: 0;
  }

  .thumbnail-container li {
    display: inline;
    margin-inline-end: -24px;
  }

  .thumbnail-img {
    border: 2px solid white;
    border-radius: 50%;
    height: 46px;
    object-fit: cover;
    width: 46px;
  }

  #thumbnail-fallback {
    height: 48px;
    width: 102px;
  }

</style>
<cr-grid class="cart-grid" id="tiles" columns="4">
  <template id="tileList" is="dom-repeat" items="[[tiles]]">
    <a class="tile-item" title="[[item.merchant]]" href="[[item.cartUrl]]">
      <img class="favicon-image" is="ntp-img"
        auto-src="[[getFaviconUrl_(item.cartUrl)]]"></img>
      <div class="tile-item-title">
        <span id="merchant">[[item.merchant]]</span>
        <template is="dom-if" if="[[item.imageUrls.length]]">
          <span id="itemCount">&nbsp•&nbsp[[item.imageUrls.length]]</span>
        </template>
      </div>
      <div class="thumbnail-container">
        <template is="dom-if"
          if="[[!shouldShowFallback_(item.imageUrls.length)]]">
          <ul>
            <template id="thumbnailGrid"
            is="dom-repeat" items="[[getImagesToShow_(item.imageUrls)]]">
              <li>
                <img class="thumbnail-img" is="ntp-img"
                auto-src="[[item]]"></img>
              </li>
            </template>
          </ul>
        </template>
        <template is="dom-if"
          if="[[shouldShowFallback_(item.imageUrls.length)]]">
          <img id="thumbnail-fallback" 
          src="chrome://new-tab-page/icons/cart.svg">
        </template>
      </div>
    </a>
  </template>
</cr-grid>
