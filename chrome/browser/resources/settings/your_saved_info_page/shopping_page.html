<style include="settings-shared your-saved-info-shared">

  .card {
    overflow: hidden;
  }

</style>

<settings-subpage page-title="$i18n{shoppingCardTitle}" class="multi-card">
  <div class="card">
    <settings-toggle-button id="optInToggle"
        disabled="[[optInToggleDisabled_(
            enhancedAutofillEligibleUser_, enhancedAutofillOptedIn_,
            autofillAddOtherDatatypesPrefIsEnabled_,
            prefs.autofill.profile_enabled.value)]]"
        on-settings-boolean-control-change="onOptInToggleChange_"
        no-extension-indicator
        label="$i18n{shoppingOptInToggleLabel}"
        sub-label="$i18n{shoppingOptInToggleSubLabel}">
    </settings-toggle-button>
  </div>

  <!-- Entities list card -->
  <div class="card">
    <!-- TODO(crbug.com/493434633): Replace with custom list. -->
    <settings-autofill-ai-entries-list
        list-title="$i18n{shoppingCardTitle}"
        allowed-entity-types="[[getAllowedEntityTypes_()]]"
        prefs="{{prefs}}">
    </settings-autofill-ai-entries-list>
  </div>
</settings-subpage>
