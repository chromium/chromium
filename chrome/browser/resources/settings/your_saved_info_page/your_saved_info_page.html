<style include="settings-shared">
#title {
  color: var(--cr-primary-text-color);
  font-size: 1.375rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  margin-bottom: 8px;
  margin-top: 24px;
  outline: none;
  text-align: center;
}

#subtitle {
  font-size: 0.813rem;
  line-height: 1.25rem;
  margin: 8px auto 4px auto;
  max-width: 400px;
  text-align: center;
}

.section-header {
  color: var(--cr-primary-text-color);
  font-size: 0.88rem;
  font-weight: 400;
  letter-spacing: 0.02em;
  margin-bottom: 12px;
  margin-top: var(--cr-section-vertical-margin);
  outline: none;
  padding-bottom: 4px;
  padding-top: 8px;
}
</style>

<h1 id="title">$i18n{yourSavedInfoPageTitle}</h1>
<div id="subtitle" class="secondary">$i18n{yourSavedInfoPageDescription}</div>
<settings-account-card prefs="{{prefs}}">
</settings-account-card>

<h2 id="yourSavedInfoPageTitle" class="section-header">
  $i18n{yourSavedInfoPageTitle}
</h2>

<settings-section page-title="$i18n{yourSavedInfoRelatedServicesTitle}">
  <div route-path="default">
    <cr-link-row
      id="passwordManagerButton"
      label="$i18n{localPasswordManager}"
      on-click="onPasswordManagerExternalLinkClick"
      start-icon="cr20:password"
      external
    >
    </cr-link-row>
    <cr-link-row
      id="walletButton"
      label="$i18n{googleWalletTitle}"
      on-click="onGoogleWalletExternalLinkClick"
      start-icon="settings20:wallet"
      external
    >
    </cr-link-row>
    <cr-link-row
      id="profileButton"
      label="$i18n{googleAccount}"
      on-click="onGoogleAccountExternalLinkClick"
      start-icon="settings20:googleg"
      external
    >
    </cr-link-row>
  </div>
</settings-section>
