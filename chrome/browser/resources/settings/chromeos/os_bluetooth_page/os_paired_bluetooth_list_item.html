<style include="settings-shared">
  .secondary {
    padding-top: 3px;
  }

  :host([is-low-battery_]) .secondary {
    --iron-icon-fill-color: var(--google-red-600);
    color: var(--google-red-600);
  }

  :host(:not([is-low-battery_])) .secondary {
    --iron-icon-fill-color: var(--google-grey-600);
    color: var(--google-grey-700);
  }

  #batteryIcon {
    --iron-icon-height: 16px;
    --iron-icon-width: 16px;
    margin-inline-end: -2px;
    padding-bottom: 2px;
  }
</style>
<div focus-row-container>
  <!-- TODO(crbug.com/1010321): Add a11y label. -->
  <div class="list-item"
      focus-row-control
      focus-type="rowWrapper"
      role="button"
      selectable>
    <iron-icon id="deviceTypeIcon"
        icon="os-settings:[[getDeviceTypeIcon_(device)]]">
    </iron-icon>
    <div class="middle" aria-hidden="true">
      <div id="deviceName">[[getDeviceName_(device)]]</div>
      <template is="dom-if"
          if="[[isBatteryPercentageAvailable_]]" restamp>
        <div id="batteryContainer" class="secondary">
          <iron-icon id="batteryIcon" icon="[[getBatteryIcon_(device)]]">
          </iron-icon>
          <span id="batteryPercentage">
            [[getBatteryPercentageString_(device)]]
          </span>
        </div>
      </template>
    </div>
    <div>
      <!-- TODO(crbug.com/1010321): Add click listener. -->
      <cr-icon-button class="subpage-arrow"
          focus-row-control
          focus-type="subpageButton">
      </cr-icon-button>
    </div>
  </div>
</div>
