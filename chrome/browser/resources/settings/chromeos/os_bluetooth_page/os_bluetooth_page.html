<style include="settings-shared iron-flex">
  :host {
    display: flex;
    justify-content: flex-end;
    padding-inline-end: 20px;
  }
</style>
<settings-animated-pages id="pages" section="bluetooth">
  <div route-path="default">
    <!-- TODO(crbug.com/1010321): Move to bluetooth summary page -->
    <div id="bluetoothSummary" class="settings-box two-line no-padding">
      <cr-icon-button class="subpage-arrow layout end"
          on-click="onSubpageArrowTap_"
          aria-label="$i18n{bluetoothPageTitle}"
          aria-roledescription="$i18n{subpageArrowRoleDescription}">
      </cr-icon-button>
    </div>
  </div>
  <template is="dom-if" route-path="/bluetoothDevices">
    <settings-subpage page-title="$i18n{bluetoothPageTitle}">
      <os-settings-bluetooth-devices-subpage>
      </os-settings-bluetooth-devices-subpage>
    </settings-subpage>
  </template>
</settings-animated-pages>
