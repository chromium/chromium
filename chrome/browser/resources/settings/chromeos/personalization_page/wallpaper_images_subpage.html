<dom-module id="settings-wallpaper-page">
  <template>
    <style include="cr-shared-style settings-shared">
    </style>
    <paper-spinner-lite active="[[loading_]]"></paper-spinner-lite>
    <p hidden="[[!error_]]" id="error">$i18n{wallpaperCollectionsError}</p>
    <template is="dom-if" if="[[success_]]">
      <iron-list items="[[images_]]">
        <template>
          <a class="wallpaper-image-link" href$="[[item.url]]" target="_blank">
            [[index]]
          </a>
        </template>
      </iron-list>
    </template>
  </template>
  <script src="wallpaper_images_subpage.js"></script>
</dom-module>
