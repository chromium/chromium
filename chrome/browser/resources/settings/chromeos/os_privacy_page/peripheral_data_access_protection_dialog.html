<link rel="import" href="chrome://resources/html/polymer.html">

<link rel="import" href="chrome://resources/cr_elements/cr_button/cr_button.html">
<link rel="import" href="chrome://resources/cr_elements/cr_dialog/cr_dialog.html">
<link rel="import" href="chrome://resources/html/load_time_data.html">
<link rel="import" href="chrome://resources/polymer/v1_0/paper-progress/paper-progress.html">
<link rel="import" href="../../prefs/prefs_behavior.html">
<link rel="import" href="../../settings_shared_css.html">

<dom-module id="settings-peripheral-data-access-protection-dialog">
  <template>
    <style include="settings-shared">
      paper-progress {
        --paper-progress-active-color: var(--google-blue-600);
        padding-bottom: 40px;
        width: auto;
      }

      #disablingDescription {
        padding-bottom: 20px;
      }

      cr-dialog::part(dialog) {
        width: 370px;
      }
    </style>

    <cr-dialog id="warningDialog" on-close="handleDialogClosed_"
        show-on-attach>
      <div slot="title">
        <div hidden="[[!showDisablingDialog_]]">
          $i18n{peripheralDataAccessProtectionDisablingTitle}
        </div>
        <div hidden="[[showDisablingDialog_]]">
          $i18n{peripheralDataAccessProtectionWarningTitle}
        </div>
      </div>
      <div slot="body">
        <template is="dom-if" if="[[showDisablingDialog_]]">
          <div id="disablingDescription">
            $i18n{peripheralDataAccessProtectionDisablingDescription}
          </div>
          <paper-progress indeterminate=true></paper-progress>
        </template>
        <div hidden="[[showDisablingDialog_]]">
          $i18n{peripheralDataAccessProtectionWarningDescription}
        </div>
      </div>
      <template is="dom-if" if="[[!showDisablingDialog_]]">
        <div slot="button-container">
          <cr-button class="cancel-button" on-click="onCancelButtonClicked_">
              $i18n{peripheralDataAccessProtectionCancelButton}
          </cr-button>
          <cr-button id="disable-confirmation" class="action-button"
              on-click="onDisableClicked_">
              $i18n{peripheralDataAccessProtectionDisableButton}
          </cr-button>
        </div>
      </template>
    </cr-dialog>

  </template>
  <script src="peripheral_data_access_protection_dialog.js"></script>
</dom-module>
