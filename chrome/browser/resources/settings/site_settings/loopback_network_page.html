<style include="settings-shared site-settings-shared"></style>
<settings-subpage page-title="$i18n{siteSettingsLoopbackNetwork}"
    search-label="$i18n{siteSettingsAllSitesFilter}"
    search-icon="settings20:filter-list"
    search-term="{{searchTerm}}" route-path$="[[routePath]]">
  <div class="content-settings-header secondary">
    $i18n{siteSettingsLoopbackNetworkDescription}
  </div>
  <settings-category-default-radio-group
      category="[[contentSettingsTypesEnum_.LOOPBACK_NETWORK]]"
      ask-option-label="$i18n{siteSettingsLoopbackNetworkAsk}"
      ask-option-icon="settings20:desktop-windows"
      block-option-label="$i18n{siteSettingsLoopbackNetworkBlock}"
      block-option-icon="settings20:desktop-access-disabled">
  </settings-category-default-radio-group>
  <category-setting-exceptions
      category="[[contentSettingsTypesEnum_.LOOPBACK_NETWORK]]"
      block-header=
          "$i18n{siteSettingsLoopbackNetworkBlockedExceptions}"
      allow-header=
          "$i18n{siteSettingsLoopbackNetworkAllowedExceptions}"
      search-filter="[[searchTerm]]">
  </category-setting-exceptions>
</settings-subpage>
