<style include="settings-shared">

  #radioSection {
    padding: 0 var(--cr-section-padding);
  }

  #radioGroupSubLabel {
    padding-bottom: 10px;
  }

  settings-collapse-radio-button {
    --settings-collapse-toggle-min-height: var(--cr-section-min-height);
  }

  settings-collapse-radio-button.two-line {
    --settings-collapse-toggle-min-height:
        var(--cr-section-two-line-min-height);
  }

  settings-collapse-radio-button:not(:first-of-type) {
    --settings-collapse-separator-line: var(--cr-separator-line);
  }
</style>
<div id="radioSection">
  <h2>[[header]]</h2>
  <div id="radioGroupSubLabel" class="secondary">
    [[description]]
  </div>
  <settings-radio-group
      id="settingsCategoryDefaultRadioGroup"
      pref="{{pref_}}"
      selectable-elements="settings-collapse-radio-button"
      on-change="onSelectedRadioChanged_"
      group-aria-label="[[header]]">
    <settings-collapse-radio-button
        id="allowRadioOption"
        class$="[[getButtonClass_(allowOptionSubLabel)]]"
        name="[[contentSettingEnum_.ALLOW]]"
        pref="[[pref_]]"
        label="[[allowOptionLabel]]"
        sub-label="[[allowOptionSubLabel]]"
        disabled$="[[isRadioGroupDisabled_(category)]]"
        icon="[[allowOptionIcon]]"
        hidden="[[!allowOptionLabel]]"
        no-collapse>
    </settings-collapse-radio-button>
    <settings-collapse-radio-button
        id="askRadioOption"
        class$="[[getButtonClass_(askOptionSubLabel)]]"
        name="[[contentSettingEnum_.ASK]]"
        pref="[[pref_]]"
        label="[[askOptionLabel]]"
        sub-label="[[askOptionSubLabel]]"
        disabled$="[[isRadioGroupDisabled_(category)]]"
        icon="[[askOptionIcon]]"
        hidden="[[!askOptionLabel]]"
        no-collapse>
    </settings-collapse-radio-button>
    <settings-collapse-radio-button
        id="blockRadioOption"
        class$="[[getButtonClass_(blockOptionSubLabel)]]"
        name="[[contentSettingEnum_.BLOCK]]"
        pref="[[pref_]]"
        label="[[blockOptionLabel]]"
        sub-label="[[blockOptionSubLabel]]"
        disabled$="[[isRadioGroupDisabled_(category)]]"
        icon="[[blockOptionIcon]]"
        hidden="[[!blockOptionLabel]]"
        no-collapse>
    </settings-collapse-radio-button>
  </settings-radio-group>
</div>
