<style include="cr-shared-style settings-shared">
  site-favicon {
    /** Pad the difference between --cr-link-row-icon-width and
        site-favicon width to align with link rows */
    padding-inline-end: 24px;
  }

  .display-name {
    flex: 1;
    max-width: 100%;
  }

  .header-with-icon {
    align-items: center;
    display: flex;
  }

  .header-with-icon h2 {
    padding-bottom: 5px;
    padding-top: 15px;
  }

  .header-group-wrapper {
    margin-inline-start: 15px;
  }

  .notification-permissions-list {
    margin-inline-start: 32px;
  }

  #headerIcon {
    background-color: rgb(236, 243, 254);
    border-radius: 50%;
    fill: rgb(27, 110, 243);
    height: 20px;
    padding: 6px;
    width: 20px;
  }

  @media (prefers-color-scheme: dark) {
    #headerIcon {
      background-color: rgb(44, 58, 79);
      fill: rgb(123, 170, 247);
  }
}
</style>
<div class="header-with-icon">
  <iron-icon role="img" icon="settings:notifications-none" id="headerIcon">
  </iron-icon>
  <div class="header-group-wrapper">
    <h2>$i18n{safetyCheckNotificationPermissionReviewPrimaryLabel}</h2>
    <div class="secondary">
      $i18n{safetyCheckNotificationPermissionReviewSecondaryLabel}
    </div>
  </div>
</div>
<div class="notification-permissions-list">
  <template id="notificationPermissionReviewList" is="dom-repeat"
      items="[[notificationPermissionReviewList_]]">
    <div class$="cr-row [[getClassForIndex_(index)]]">
      <site-favicon url="[[item.origin]]"></site-favicon>
      <div id="displayName_[[index]]" class="display-name cr-padded-text">
        <div class="site-representation">
          <span class="url-directionality">[[getDisplayName_(item)]]</span>
        </div>
        <div class="second-line secondary">[[item.notificationInfoString]]
        </div>
      </div>
      <cr-icon-button iron-icon="cr20:block" id="block"
          on-click="onBlockNotificationPermissionClick_"
          aria-label$="[[getDisplayName_(item)]]"
          aria-describedby$="displayName_[[index]]"
          focus-row-control focus-type="show-detail"
          on-pointerenter="onShowTooltip_" actionable></cr-icon-button>
      <cr-icon-button id="actionMenuButton" class="icon-more-vert"
          on-click="onShowActionMenuClick_"
          title="$i18n{moreActions}" focus-row-control focus-type="menu">
      </cr-icon-button>
    </div>
  </template>
</div>
<paper-tooltip id="tooltip"
    fit-to-visible-bounds manual-mode position="top">
  $i18n{safetyCheckNotificationPermissionReviewDontAllowLabel}
</paper-tooltip>
<cr-lazy-render id="actionMenu">
  <template>
    <cr-action-menu role-description="$i18n{menu}">
      <button class="dropdown-item" id="ignore" on-click="onIgnoreClick_">
        $i18n{safetyCheckNotificationPermissionReviewIgnoreLabel}
      </button>
      <button class="dropdown-item" id="reset" on-click="onResetClick_">
        $i18n{safetyCheckNotificationPermissionReviewResetLabel}
      </button>
    </cr-action-menu>
  </template>
</cr-lazy-render>
<cr-toast id="undoToast" duration="5000">
  <div id="undoNotification">
    [[getUndoNotificationText_(lastUserAction_, lastOrigin_)]]
  </div>
  <cr-button aria-label="$i18n{undoDescription}"
      on-click="onUndoButtonClick_">
      $i18n{safetyCheckNotificationPermissionReviewUndo}
  </cr-button>
</cr-toast>
