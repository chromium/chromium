<style include="settings-shared">
  cr-view-manager [hidden-by-search],
  cr-view-manager[show-all] [slot=view][data-parent-view-id] {
    display: none;
  }

  /* Necessary to display multiple cr-view-manager views (in this case "cards")
     at the same time. */
  cr-view-manager [slot=view]:not(.closing) {
    position: initial;
  }
</style>

<cr-view-manager id="viewManager" class="cr-centered-card-container"
    show-all$="[[shouldShowAll]]">
  <settings-search-page slot="view" id="parent" prefs="{{prefs}}"
      route-path$="[[routes_.SEARCH.path]]">
  </settings-search-page>

  <template is="dom-if" if="[[searchSettingsUpdateEnabled_]]" restamp>
    <settings-site-shortcuts-page slot="view" id="siteShortcuts"
        prefs="[[prefs]]">
    </settings-site-shortcuts-page>

    <settings-feature-shortcuts-page slot="view" id="featureShortcuts"
        prefs="[[prefs]]">
    </settings-feature-shortcuts-page>

    <settings-keyboard-shortcut-page slot="view" id="keyboardShortcut"
        prefs="{{prefs}}">
    </settings-keyboard-shortcut-page>
  </template>

  <template is="dom-if" if="[[!searchSettingsUpdateEnabled_]]" restamp>
    <settings-search-engines-page slot="view" id="searchEngines"
        data-parent-view-id="parent" prefs="{{prefs}}"
        route-path$="[[routes_.SEARCH_ENGINES.path]]">
    </settings-search-engines-page>
  </template>
</cr-view-manager>
