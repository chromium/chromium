<style include="settings-shared">
  :host {
    display: block;
  }

  cr-expand-button {
    --cr-section-vertical-padding: 0px;
  }

  cr-expand-button::part(icon) {
    margin-block: 0;
    /* This decreases the amount of space the expand icon takes up
       in the row's grid without changing its visual size or the
       aspect ratio of its tab focus ring. */
    margin-inline: -3px -8px;
    padding: 0;
  }

  #content-wrapper {
    display: flex;
    flex-direction: row;
    align-items: center;
    width: 100%;
  }

  #labelWrapper {
    padding: 12px 0;
  }

  #icon cr-icon {
    --iron-icon-fill-color: var(--google-red-600);
    flex-shrink: 0;
  }

  /* Style for empty icon (takes up no space) or removal of icon */
  #icon {
    display: flex;
    justify-content: center;
    margin-inline-end: 0;
    opacity: 0;
    width: 0;
  }

  #icon.enable-transition {
    transition: margin-inline-end 400ms cubic-bezier(0.42, 0, 0.73, 1),
        opacity 500ms linear, width 400ms cubic-bezier(0.42, 0, 0.73, 1);
  }

  /* Style for icon and transition for insertion of icon */
  :host([icon]:not([icon=''])[icon-visible]) #icon {
    margin-inline-end: var(--cr-icon-button-margin-end, 16px);
    opacity: 1;
    width: var(--cr-icon-size, 20px);
  }

  #stateLabel {
    margin-inline-end: 11px;
  }

  #toggleButton {
    --cr-section-min-height: 16px;
    align-self: stretch;
    padding: 0 11px;
    width: auto;
  }

  ::slotted(*) {
    padding: 0 36px;
  }
</style>
<cr-expand-button class="cr-row" id="expandButton" expanded="{{expanded}}">
  <div id="content-wrapper">
    <span id="icon" aria-hidden="true">
      <cr-icon slot="icon" icon="[[icon]]"></cr-icon>
    </span>
    <div class="flex" id="labelWrapper">
      [[label]]
      <div class="cr-secondary-text">[[subLabel]]</div>
    </div>
    <template is="dom-if" if="[[!expanded]]">
      <div class="cr-secondary-text" id="stateLabel">
        [[currentStateLabel_]]
      </div>
    </template>
    <template is="dom-if" if="[[expanded]]" restamp>
      <settings-toggle-button id="toggleButton" pref="{{pref}}"
          numeric-unchecked-values="[[numericUncheckedValues]]"
          numeric-checked-value="[[numericCheckedValue]]"
          on-change="onToggleButtonChange_" no-hover>
      </settings-toggle-button>
    </template>
  </div>
</cr-expand-button>
<cr-collapse opened="[[expanded]]">
  <slot name="collapse"></slot>
</cr-collapse>
