<style include="cr-shared-style md-select">
  :host {
    display: block;
  }

  /* Indentation for the nested content of the 3rd radio button */
  .settings-box.indent {
    padding-inline-start: var(--cr-button-height);
    padding-top: 0;
  }

  controlled-radio-button {
    column-gap: 16px;
    padding-block-start: var(--cr-section-vertical-padding, 12px);
    padding-inline: 20px;
  }

  controlled-radio-button:last-of-type {
    padding-block-end: var(--cr-section-vertical-padding, 12px);
  }

  controlled-radio-button::part(labelWrapper) {
    align-items: center;
    display: flex;
  }

  controlled-radio-button[toggle-unchecked]::part(labelWrapper),
  controlled-radio-button[disabled]::part(labelWrapper) {
    color: var(--cr-secondary-text-color);
  }

  controlled-radio-button[toggle-unchecked]::part(disc) {
    --cr-radio-button-checked-color: var(--color-radio-foreground-disabled,
        var(--cr-fallback-color-disabled-foreground));
    --cr-radio-button-unchecked-color:
        var(--color-radio-foreground-disabled,
            var(--cr-fallback-color-disabled-foreground));
    opacity: var(--cr-disabled-opacity);
  }

  controlled-radio-button::part(policy-indicator) {
    display: none;
  }

  /* Make the dropdown take full width of its container */
  #resolverSelect {
    width: 100%;
  }

  #privacyPolicy {
    display: none;
    margin-top: 8px;
  }

  /* Style the link appearing within the privacyPolicy's localized content. */
  #privacyPolicy a {
    color: var(--cr-link-color);
  }

  #secureDnsInputContainer {
    margin-top: calc(var(--cr-section-padding) / 2);
  }

  .flex-column {
    display: flex;
    flex-direction: column;
    width: 100%;
  }
</style>

<security-page-feature-row
    id="featureRow"
    pref="{{secureDnsTogglePref_}}"
    label="$i18n{securitySecureDnsTitle}"
    sub-label="$i18n{securitySecureDnsDescription}"
    on-toggle-button-change="onToggleButtonChange_"
    numeric-unchecked-values="[[secureDnsModeUncheckedValues_]]"
    icon="settings20:warning_outline"
    icon-visible="[[isSecureDnsWarningIconVisible_]]"
    state-text-map="[[secureDnsStateTextMap_]]"
    current-state-override-key="[[computedStateKey_]]">
  <div slot="collapse">
    <cr-radio-group id="radioGroup"
        selectable="controlled-radio-button"
        selected="{{selectedMode_}}"
        on-selected-changed="onRadioGroupChange_">
      <controlled-radio-button
          id="automaticRadioButton"
          name="[[resolverTypeEnum_.AUTOMATIC]]"
          pref="[[prefs.dns_over_https.mode]]"
          label="$i18n{securitySecureDnsDefault}"
          toggle-unchecked$="[[!secureDnsTogglePref_.value]]">
      </controlled-radio-button>
      <controlled-radio-button
          id="fallbackRadioButton"
          name="[[resolverTypeEnum_.FALLBACK]]"
          pref="[[prefs.dns_over_https.automatic_mode_fallback_to_doh]]"
          label="$i18n{securitySecureDnsFallback}"
          toggle-unchecked$="[[!secureDnsTogglePref_.value]]">
      </controlled-radio-button>
      <controlled-radio-button
          id="customRadioButton"
          name="[[resolverTypeEnum_.CUSTOM]]"
          pref="[[prefs.dns_over_https.templates]]"
          label="$i18n{securitySecureDnsCustom}"
          toggle-unchecked$="[[!secureDnsTogglePref_.value]]">
        <div class="settings-box indent">
          <div class="flex-column">
            <select id="resolverSelect"
                class="md-select"
                aria-label="$i18n{secureDnsSecureDropdownModeDescription}"
                on-change="onResolverSelectChange_">
              <option value="[[resolverTypeEnum_.CUSTOM]]">
                $i18n{secureDnsCustomProviderDescription}
              </option>
              <template is="dom-repeat" items="[[resolverOptions_]]">
                <option data-resolver-type$="[[resolverTypeEnum_.CUSTOM]]"
                    value="[[index]]">
                  [[item.name]]
                </option>
              </template>
            </select>
            <div id="privacyPolicy" class="cr-secondary-text"
                inner-h-t-m-l="[[privacyPolicyString_]]">
            </div>
            <div id="secureDnsInputContainer" hidden$="[[!showCustomInput_]]">
              <secure-dns-input id="secureDnsInput"
                  value="[[secureDnsInputValue_]]"
                  on-value-update="onSecureDnsInputValueUpdate_">
              </secure-dns-input>
            </div>
          </div>
        </div>
      </controlled-radio-button>
    </cr-radio-group>
  </div>
</security-page-feature-row>
