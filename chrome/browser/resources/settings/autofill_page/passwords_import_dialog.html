<style include="settings-shared">
  .flex {
    display: flex;
  }

  iron-icon {
    margin-inline-end: 10px;
  }

  .success-icon {
    fill: var(--cr-checked-color);
  }

  #tipBox {
    align-items: center;
    background: var(--google-grey-50);
    border: 1px solid var(--google-grey-200);
    border-radius: 4px;
    margin-top: 16px;
    padding: 8px;
  }

  @media (prefers-color-scheme: dark) {
    #tipBox {
      background: var(--google-grey-900);
      border: 1px solid var(--google-grey-700);
    }
  }
</style>

<cr-dialog id="dialog" close-text="$i18n{close}" show-on-attach>
  <div slot="title" id="title">$i18n{importPasswordsTitle}</div>
  <div slot="body">
    <div class="flex">
      <template is="dom-if"
          if="[[isState_(importDialogStateEnum_.SUCCESS, dialogState)]]">
        <iron-icon class="success-icon" icon="settings:check-circle">
        </iron-icon>
      </template>
      <div id="descriptionText">[[descriptionText_]]</div>
    </div>
    <template is="dom-if"
        if="[[isState_(importDialogStateEnum_.SUCCESS, dialogState)]]">
      <div id="tipBox" class="flex">
        <iron-icon icon="cr:info-outline"></iron-icon>
        <div id="successTip" inner-h-t-m-l="[[getSuccessTip_(results_)]]"></div>
      </div>
    </template>
  </div>
  <div slot="button-container">
    <template is="dom-if"
        if="[[isState_(importDialogStateEnum_.START, dialogState)]]">
      <cr-button id="cancel" class="cancel-button" on-click="onCancelClick_">
        $i18n{cancel}
      </cr-button>
      <cr-button id="chooseFile" class="action-button"
          on-click="onChooseFileClick_">
        $i18n{importPasswordsChooseFile}
      </cr-button>
    </template>
    <template is="dom-if"
        if="[[isState_(importDialogStateEnum_.SUCCESS, dialogState)]]">
      <cr-button id="done" class="action-button" on-click="onCloseClick_">
        $i18n{done}
      </cr-button>
    </template>
  </div>
</cr-dialog>
