<style include="settings-shared">
  .separator {
    margin: 0 4px;
  }

  .separator + settings-toggle-button {
    margin-inline-end: 12px;
  }

  cr-icon {
    flex-shrink: 0;
  }

  .cr-padded-text {
    flex: 1;
  }
</style>

<settings-section page-title="$i18n{stsSettingsEntrypointGoogleSearchAiMode}">
  <div class="settings-row first">
    <cr-link-row label="$i18n{stsSettingsOption1ShareOpenTabsForEveryThreadV2}"
        on-click="onLearnMoreRowClick_" external>
      <div slot="sub-label">
        <span>$i18n{stsSettingsOption1ChooseHowRelevantOpenTabsCanBeUsedV2}</span>
        <a href="https://support.google.com/chrome?p=ai_mode_search"
            aria-label="$i18n{stsSettingsOption1LearnMore}"
            aria-description="$i18n{opensInNewTab}"
            on-click="onLearnMoreClick_" target="_blank">
          $i18n{stsSettingsOption1LearnMore}
        </a>
      </div>
    </cr-link-row>
    <div class="separator"></div>
    <settings-toggle-button
        id="shareTabsEveryThreadToggle"
        aria-label="$i18n{stsSettingsOption1ShareOpenTabsForEveryThreadV2}"
        pref="{{prefs.contextual_tasks.share_open_tabs_every_thread}}">
    </settings-toggle-button>
  </div>
  <div class="hr"></div>
  <div class="cr-row continuation">
    <div class="cr-padded-text">
      $i18n{stsSettingsOption1NeverShareTheseSites}
      <div class="secondary">
        $i18n{stsSettingsOption1SitesAddedHereWontBeReferencedV2}
      </div>
    </div>
    <cr-button id="addSiteButton" on-click="onAddSiteClick_">
      $i18n{add}
    </cr-button>
  </div>
  <div id="noSitesAddedLabel" class="list-frame"
      hidden$="[[hasSites_(siteList_.*)]]">
    <div class="list-item">
      <div class="flex secondary">
        No sites added
      </div>
    </div>
  </div>
  <div id="siteList" class="list-frame" role="list">
    <template is="dom-repeat" items="[[siteList_]]">
      <div class="list-item" role="listitem">
        <div class="start cr-padded-text">[[item]]</div>
        <cr-icon-button
            class="icon-more-vert"
            aria-label="More actions"
            on-click="onMenuClick_"
            title="More actions">
        </cr-icon-button>
      </div>
    </template>
  </div>

  <cr-lazy-render id="menu">
    <template>
      <cr-action-menu>
        <button id="edit" class="dropdown-item" role="menuitem"
            on-click="onEditClick_">
          $i18n{edit}
        </button>
        <button id="delete" class="dropdown-item" role="menuitem"
            on-click="onRemoveSiteClick_">
          $i18n{remove}
        </button>
      </cr-action-menu>
    </template>
  </cr-lazy-render>

  <template is="dom-if" if="[[showAddSiteDialog_]]" restamp>
    <ai-site-add-dialog on-close="onAddSiteDialogClose_"
        on-add-site="onAddSite_" site="[[siteToEdit_]]">
    </ai-site-add-dialog>
  </template>
</settings-section>
