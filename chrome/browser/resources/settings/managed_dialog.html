<style>
  iron-icon {
    height: 20px;
    padding-inline-end: 10px;
    width: 20px;
  }

  div.body-container {
    padding-inline-start: 35px;
  }
</style>

<cr-dialog id="dialog" close-text="$i18n{close}" show-on-attach>
  <div slot="title">
    <iron-icon icon="cr:domain" role="img"
        aria-label="$i18n{controlledSettingPolicy}">
    </iron-icon>
    [[title]]
  </div>
  <div slot="body">
    <div class="body-container">[[body]]</div>
  </div>
  <div slot="button-container">
    <cr-button class="action-button" on-click="onOkClick_">$i18n{ok}</cr-button>
  </div>
</cr-dialog>
