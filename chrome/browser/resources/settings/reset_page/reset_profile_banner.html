<style include="settings-shared">
  #prefs {
    /* This style only affects the bullet points list below. */
    padding-inline-start: 40px;
  }

  #learnMore {
    margin-inline-end: auto;
  }
</style>
<cr-dialog id="dialog" close-text="$i18n{close}"
    ignore-popstate on-cancel="onCancel_">
  <div slot="title">$i18n{resetAutomatedDialogTitle}</div>
  <div slot="body">
    $i18n{resetAutomatedDialogBody}
    <div id="tamperedPrefsList" hidden="[[!showTamperedPrefsList]]">
      <ul id="prefs">
        <template is="dom-repeat" items="[[tamperedPrefs]]">
          <li>[[item]]</li>
        </template>
      </ul>
    </div>
  </div>
  <div slot="button-container">
    <cr-button id="learnMore"
        aria-label="$i18n{resetLearnMoreAccessibilityText}"
        on-click="onLearnMoreClick_">
      $i18n{learnMore}
    </cr-button>
    <cr-button class="action-button" id="confirm" on-click="onConfirmClick_">
      $i18n{gotIt}
    </cr-button>
  </div>
</cr-dialog>
