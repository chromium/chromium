<!DOCTYPE html>
<html dir="$i18n{textdirection}" lang="$i18n{language}">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="chrome://theme/colors.css?sets=ui,chrome">
  <title>$i18n{skillsTitle}</title>
  <link rel="icon" type="image/png" sizes="24x24" href="../favicon.png">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    webview {
      display: block;
      border: none;
      width: 100%;
      height: 100%;
    }

    @media (prefers-color-scheme: dark) {
      html {
        background: var(--md-background-color);
      }
    }

    html:not([webui-refresh-2026]) {
      body {
        background-color: var(--color-sys-base);
      }
    }
  </style>
</head>
<body>
  <webview id="webview" autosize="on"></webview>
</body>
</html>
