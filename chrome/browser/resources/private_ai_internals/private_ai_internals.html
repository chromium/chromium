<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Private AI internals</title>
    <link rel="stylesheet" href="private_ai_internals.css">
    <script type="module" src="private_ai_internals.js"></script>
  </head>
  <body>
    <div id="main-container">
      <div id="left-column">
        <div>
          <label>
            Server URL:
            <input type="text" id="privateAiServerUrl"
                   value="$i18n{default_url}">
          </label>
        </div>
        <div>
          <label>
            API Key:
            <input type="text" id="privateAiServerApiKey"
                   value="$i18n{default_api_key}">
          </label>
        </div>
        <div>
          <label>
            <input type="checkbox" id="use-token-attestation-checkbox">
            Use Token Attestation
          </label>
        </div>
        <div id="proxy-url-container" class="hidden">
          <label>
            Proxy URL:
            <input type="text" id="privateAiProxyUrl"
                   value="$i18n{default_proxy_url}">
          </label>
        </div>

        <button id="create-connection-button">Connect</button>
        <button id="disconnect-button" class="hidden">Disconnect</button>

        <div id="console" class="hidden">
          <div id="console-header" class="console-header">Debug console</div>
          <div id="console-container">
          </div>
          <div id="input-container">
            <textarea id="request-input"
                   placeholder="Type your request..."></textarea>
            <button id="send-button">Send</button>
          </div>
        </div>
      </div>

      <div id="logs">
        <div class="console-header">Logs</div>
        <div id="logs-container">
        </div>
      </div>
    </div>
  </body>
</html>
