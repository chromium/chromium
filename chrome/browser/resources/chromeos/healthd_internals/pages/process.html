<style include="healthd-internals-shared cr-shared-style">
  #pageHeader {
    height: 20px;
  }

  #settingsContainer {
    display: flex;
    height: 60px;
    width: 100%;
    overflow-x: auto;
    gap: 32px;
    margin: 0 32px;
    align-items: center;
  }

  .setting-with-label-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  label {
    color: var(--cr-primary-text-color);
  }

  cr-input {
    width: 250px;
    --cr-input-error-display: none;
  }

  #tableContainer {
    height: calc(95vh - 80px);
    width: 100%;
    overflow: auto;
  }

  table {
    overflow: auto;
    border-collapse: collapse;
    margin: 0 auto;
    border: 1px solid var(--cr-primary-text-color);
    margin: 0px 16px 16px 16px;
  }

  thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background-color: var(--cr-menu-background-color);
  }

  th, td {
    color: var(--cr-primary-text-color);
    border: 1px solid var(--cr-primary-text-color);
    padding: 8px;
    text-align: center;
    max-width: 100px;
    word-wrap: break-word;
  }

  .command-column {
    text-align: left;
    max-width: 600px;
  }
</style>


<h1 id="pageHeader">Processes</h1>

<div id="settingsContainer">
  <div class="setting-with-label-container">
    <label>Filter</label>
    <cr-input type="text" value="{{filterQuery}}" placeholder="Enter query...">
    </cr-input>
  </div>
</div>

<div id="tableContainer"><table>
  <thead>
    <tr>
      <th>Process ID</th>
      <th>Name</th>
      <th>Priority</th>
      <th>Nice</th>
      <th>Process State</th>
      <th>Threads Number</th>
      <th>User ID</th>
      <th>Parent ID</th>
      <th>Group ID</th>
      <th>Resident Memory (KiB)</th>
      <th>Uptime Ticks</th>
      <th>Count of read syscall</th>
      <th>Count of write syscall</th>
      <th class="command-column">Command</th>
    </tr>
  </thead>
  <tbody>
    <template is="dom-repeat" items="[[displayedData]]">
      <tr>
        <td>[[item.processId]]</td>
        <td>[[item.name]]</td>
        <td>[[item.priority]]</td>
        <td>[[item.nice]]</td>
        <td>[[item.state]]</td>
        <td>[[item.threadsNumber]]</td>
        <td>[[item.userId]]</td>
        <td>[[item.parentProcessId]]</td>
        <td>[[item.processGroupId]]</td>
        <td>[[item.residentMemoryKib]]</td>
        <td>[[item.uptimeTicks]]</td>
        <td>[[item.readSystemCallsCount]]</td>
        <td>[[item.writeSystemCallsCount]]</td>
        <td class="command-column">[[item.command]]</td>
      </tr>
    </template>
  </tbody>
</table></div>
