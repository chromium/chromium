<dom-module id="oobe-common">
  <template>
    <style>
      <include src="../oobe_flex_layout.css">
      <include src="../oobe_fonts.css">
      <include src="../oobe_links.css">

      /* Classes can-scroll is-scrolled scrolled-to-bottom are set by
         OobeScrollableBehavior. */
      .scrollable.can-scroll:not(.is-scrolled):not(.scrolled-to-bottom) {
        background: linear-gradient(0deg,
                        rgba(var(--google-grey-refresh-100-rgb), 1) 0,
                        rgba(var(--google-grey-refresh-100-rgb), 0) 8px);

      }
      .scrollable.can-scroll.is-scrolled:not(.scrolled-to-bottom) {
        background: linear-gradient(0deg,
                        rgba(var(--google-grey-refresh-100-rgb), 1) 0,
                        rgba(var(--google-grey-refresh-100-rgb), 0) 8px),
                    linear-gradient(180deg,
                        rgba(var(--google-grey-refresh-100-rgb), 1) 0,
                        rgba(var(--google-grey-refresh-100-rgb), 0) 8px);
      }
      .scrollable.is-scrolled.scrolled-to-bottom {
        background: linear-gradient(180deg,
                        rgba(var(--google-grey-refresh-100-rgb), 1) 0,
                        rgba(var(--google-grey-refresh-100-rgb), 0) 8px);
      }
    </style>
  </template>
</dom-module>

<dom-module id="oobe-dialog-host">
  <template>
    <style include="oobe-common">
      <include src="../oobe_dialog_host.css">
    </style>
  </template>
</dom-module>
