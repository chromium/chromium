<style include="cr-shared-style">

#tutorial {
  background: #FFF;
  bottom: 0;
  left: 0;
  margin-bottom: 80px;
  margin-top: 80px;
  position: fixed;
  right: 0;
  top: 0;
}

#lessonMenu,
#lessonContainer {
  margin: auto;
  text-align: start;
  width: 800px;
}

#lessonShortcuts {
  background: #FFF;
  border-radius: 4px;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 2px 6px rgba(0, 0, 0, 0.15);
  font-size: 22px;
}

#lessonShortcuts {
  max-height: 400px;
  overflow: scroll;
}

cr-button,
cr-link-row {
  font-family: 'Roboto';
  font-weight: medium;
}

h1 {
  font-family: 'Google Sans', 'Roboto';
  font-size: 32px;
  font-weight: medium;
  line-height: 40px;
  margin-bottom: 32px;
}

cr-button {
  font-size: 16px;
  font-style: normal;
  line-height: 24px;
  margin-bottom: 40px;
  margin-inline-end: 8px;
  margin-inline-start: 8px;
  margin-top: 40px;
}

</style>

<div id="tutorial">

<main-menu
    header_="tutorial_main_menu_header"
    header-description_="tutorial_main_menu_header_description"
    button-data_="[[ mainMenuButtonData_ ]]"
    active-screen="[[ activeScreen ]]"
    on-button-clicked="onMainMenuButtonClicked_">
</main-menu>

<div id="lessonMenu"
    hidden$="[[ shouldHideLessonMenu(activeScreen) ]]">
  <h1 id="lessonMenuHeader"
      tabindex="-1" aria-describedby="lessonMenuHeaderHint">
    [[ computeLessonMenuHeader(curriculum) ]]
  </h1>
  <div id="lessonMenuHeaderHint" hidden>
    [[ getMsg('tutorial_lesson_menu_header_description') ]]
  </div>
  <div id="lessonShortcuts"></div>
</div>

<div id="lessonContainer"
    hidden$="[[ shouldHideLessonContainer(activeScreen) ]]">

  <!-- Use lessonData object to create all lessons -->
  <template id="lessonTemplate" is="dom-repeat" items="[[ lessonData ]]"
      as="lesson" index-as="index">
    <tutorial-lesson
    lesson-num="[[ index ]]"
    title="[[ lesson.title ]]"
    content="[[ lesson.content ]]"
    medium="[[ lesson.medium ]]"
    curriculums="[[ lesson.curriculums ]]"
    practice-title="[[ lesson.practiceTitle ]]"
    practice-instructions="[[ lesson.practiceInstructions ]]"
    practice-file="[[ lesson.practiceFile ]]"
    practice-state="[[ lesson.practiceState ]]"
    events="[[ lesson.events ]]"
    actions="[[ lesson.actions ]]"
    auto-interactive="[[ lesson.autoInteractive ]]"
    active-lesson-num="[[ activeLessonNum ]]">
    </tutorial-lesson>
  </template>
</div>

<navigation-buttons
    active-screen="[[ activeScreen ]]"
    active-lesson-index="[[ activeLessonIndex ]]"
    curriculum="[[ curriculum ]]"
    num-lessons="[[ numLessons ]]"
    on-next-lesson-button-clicked="showNextLesson"
    on-previous-lesson-button-clicked="showPreviousLesson"
    on-restart-quick-orientation-button-clicked="showFirstLesson"
    on-lesson-menu-button-clicked="showLessonMenu"
    on-main-menu-button-clicked="showMainMenu"
    on-exit-button-clicked="exit">
</navigation-buttons>

</div>
