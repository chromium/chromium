<link rel="import" href="chrome://resources/html/polymer.html">

<link rel="import" href="chrome://resources/cr_elements/cr_toggle/cr_toggle.html">

<link rel="import" href="../components/common_styles/common_styles.html">

<link rel="import" href="./assistant_common_styles.html">

<dom-module id="setting-zippy">
  <template>
    <style include="oobe-common-styles assistant-common-styles">
      #container {
        padding-top: 8px;
      }

      .sub-title {
        color: var(--cros-text-color-primary);
      }

      .content {
        padding-top: 4px;
      }

      #description {
        padding: 4px 0 16px 0;
      }

      .icon {
        min-width: 36px;
      }

      .icon-view {
        display: block;
        height: 20px;
        width: 20px;
      }

      .line {
        background-color: var(--cros-color-primary);
      }

      .toggle {
        padding-inline-end: 20px;
      }

      .indent {
        padding: 0 0 6px 36px;
      }

      #container[cardStyle] {
        border-radius: 8px;
        box-shadow: var(--cr-elevation-1);
        margin: 10px 10px 10px 0;
        padding: 20px 0 20px 16px;
      }

      #container[cardStyle] .sub-title {
        font-family: var(--oobe-header-font-family);
        font-size: 15px;
        font-weight: 500;
        line-height: 22px;
      }

      #container[cardStyle] #description {
        line-height: 20px;
        padding: 0;
      }

      #container[cardStyle] .icon {
        background: var(--cros-highlight-color);
        border-radius: 50%;
        height: 40px;
        margin-inline-end: 16px;
        margin-top: 4px;
        min-width: 40px;
      }

      #container[cardStyle] .icon-view {
        margin: 10px;
      }
    </style>
    <div id="container" class="flex layout horizontal"
        cardStyle$="[[cardStyle]]">
      <div class="icon">
        <webview class="icon-view" src="[[iconSrc]]" tabindex="-1"></webview>
      </div>
      <div>
        <div class="sub-title">
          <slot name="title"></slot>
        </div>
        <div id="description" class="content">
          <slot name="content"></slot>
        </div>
      </div>
      <div class="toggle">
        <slot name="toggle"></slot>
      </div>
    </div>
    <div class="line" hidden="[[hideLine]]"></div>
  </template>
  <script src="setting_zippy.js"></script>
</dom-module>
