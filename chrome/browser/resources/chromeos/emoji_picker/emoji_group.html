<style>
  :root {
    --emoji-per-row: 7;
    --emoji-height: 32px;
  }

  .emoji-group-emoji {
    display: flex;
    flex-wrap: wrap;
  }
  .emoji-button {
    font-size: 17px;
    height: var(--emoji-height);
    line-height: var(--emoji-height);
    text-align: center;
    width: calc(100% / var(--emoji-per-row));
  }
  .emoji-button.variants {
    /* 4px grey triangle in bottom-right. 
     * 315 degrees means starting at bottom-right towards top-left.
     */
    background: linear-gradient(
        315deg, var(--google-grey-refresh-500) 4px, 
        transparent 4px, transparent);
  }
</style>

<div class="emoji-group">
  <div class="emoji-group-heading">[[data.group]]</div>
  <div class="emoji-group-emoji">
    <template is="dom-repeat" items="[[data.emoji]]">
      <div class$="[[_className(item.alternates)]]" on-click="onClickEmoji">
        [[_renderEmoji(item.base)]]
      </div>
    </template>
  </div>
</div>
