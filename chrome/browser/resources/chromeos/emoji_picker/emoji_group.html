<style>
  :root {
    --emoji-per-row: 7;
    --emoji-size: 32px;
  }

  :host {
    margin-top: 10px;
  }

  .emoji-group-heading {
    color: var(--cr-secondary-text-color);
    font-size: 10pt;
  }

  .emoji-group-emoji {
    display: grid;
    grid-auto-rows: max-content;
    grid-template-columns: repeat(var(--emoji-per-row), 1fr);
    justify-items: center;
  }
</style>

<div class="emoji-group-heading">[[data.group]]</div>
<div class="emoji-group-emoji">
  <template is="dom-repeat" items="[[data.emoji]]">
    <emoji-button emoji="[[item.base]]" variants="[[item.alternates]]">
    </emoji-button>
  </template>
</div>
