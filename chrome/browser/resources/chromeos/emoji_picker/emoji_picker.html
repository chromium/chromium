<style>
  :host {
    /* values overriden in Javascript from constants.js */
    --emoji-picker-height: 0;
    --emoji-picker-padding: 0;
    --emoji-picker-width: 0;
    --emoji-size: 0;
    --emoji-per-row: 0;
  }

  :host {
    display: flex;
    flex-direction: column;
    font-family: 'Roboto', sans-serif;
    height: calc(var(--emoji-picker-height) - 2 * var(--emoji-picker-padding));
    margin-top: 0;
    padding: var(--emoji-picker-padding);
    padding-bottom: 0;
    width: calc(var(--emoji-picker-width) - 2 * var(--emoji-picker-padding));
  }

  #searchContainer,
  #listContainer {
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    overflow-y: hidden;
    width: 100%;
  }

  #tabs {
    display: flex;
    flex-shrink: 0;
    overflow-x: scroll;
    scroll-behavior: smooth;
    width: 100%;
  }
  #tabs::-webkit-scrollbar {
    display: none;
  }

  #tabs::-webkit-scrollbar {
    display: none;
  }

  #groups {
    flex-grow: 1;
    overflow-y: scroll;
  }

  .chevron {
    background-color: var(--cr-card-background-color);
    height: 36px;
    margin: 0;
    padding: 0;
    position: absolute;
    width: 36px;
    z-index: 2;
  }

  #rightChevron {
    left: calc(36px*8 + var(--emoji-picker-padding));
  }

  #leftChevron {
    display: none;
    left: 10px;
  }

  .divider {
    border-top: 1px solid var(--cr-secondary-text-color);
  }

  .sr-only {
    color: transparent;
    position: absolute;
    z-index: -2;
  }

  #bar {
    background-color: var(--cr-checked-color);
    border-top-left-radius: 2px;
    border-top-right-radius: 2px;
    flex-shrink: 0;
    height: 2px;
    position: relative;
    transition: all 200ms;
    width: 36px;
  }
</style>

<div class="sr-only" aria-live="polite">
  Insert emoji by activating them. Close with escape.
  Some emoji have variants which can be opened with context menu.
  Use the emoji group buttons or headings to jump to emoji groups.
</div>

<div id="message" class="sr-only" aria-live="polite"></div>

<emoji-search
    id$="searchContainer"
    emoji-data="[[emojiData]]"
    search="{{search}}">
</emoji-search>

<div id="listContainer">

  <div class="sr-only" role="heading" aria-level="1">Emoji Group Buttons</div>

  <div id="tabs" on-scroll="onGroupsScroll">
    <cr-icon-button
      id="leftChevron"
      class="chevron"
      on-click="onLeftChevronClick"
      iron-icon="emoji_picker:keyboard_arrow_left"
      >
      </cr-icon-button>
    <template is="dom-repeat" items="[[emojiGroupTabs]]">
      <emoji-group-button
          data-group$="[[item.groupId]]" group-id="[[item.groupId]]"
          active="[[item.active]]" icon="[[item.icon]]"
          name="[[item.name]]">
      </emoji-group-button>
    </template>
    <!--Fake group button to increase maximum scrolling, need an icon to render
      as invisible-->
      <emoji-group-button id="fake" icon="[[emojiGroupTabs[0].icon]]">
      </emoji-group-button>
      <emoji-group-button id="fake" icon="[[emojiGroupTabs[0].icon]]">
      </emoji-group-button>
      <emoji-group-button id="fake" icon="[[emojiGroupTabs[0].icon]]">
      </emoji-group-button>
      <emoji-group-button id="fake" icon="[[emojiGroupTabs[0].icon]]">
      </emoji-group-button>
      <emoji-group-button id="RightChevronScrollTarget"
        icon="[[emojiGroupTabs[0].icon]]">
      </emoji-group-button>
   <cr-icon-button
    id="rightChevron"
      class="chevron"
    on-click="onRightChevronClick"
    iron-icon="emoji_picker:keyboard_arrow_right"
    >
    </cr-icon-button>
  </div>

  <div class="sr-only" role="heading" aria-level="1">Emoji Groups</div>

  <div id="bar" on-transitionend="onBarTransitionEnd"></div>
  <div class="divider"></div>

  <div id="groups" on-scroll="onEmojiScroll">
    <!--
      history is the "recently used" group and is populated in code,
      whereas the other groups are created from the emoji metadata.
    -->
    <div data-group="history">
      <template is="dom-if" if="[[history.emoji.length]]">
        <emoji-group data="[[history]]"></emoji-group>
      </template>
    </div>
    <template is="dom-repeat" items="[[emojiData]]">
      <div data-group$="[[index]]">
        <emoji-group data="[[item]]"></emoji-group>
      </div>
    </template>
  </div>

</div>
