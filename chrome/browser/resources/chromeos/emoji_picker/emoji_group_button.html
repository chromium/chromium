<style>
  :host {
    display: flex;
    flex-direction: column;
  }

  cr-icon-button {
    font-size: 32px;
    height: 36px;
    margin: 0;
    padding: 0;
    width: 36px;
  }

  cr-icon-button.emoji-group-active {
    --cr-icon-button-fill-color: var(--cr-checked-color);
  }

  div {
    background-color: transparent;
    border-radius: 2px;
    height: 4px;
    width: 100%;
  }

  div.emoji-group-active {
    background-color: var(--cr-checked-color);
  }
</style>

<cr-icon-button iron-icon="[[icon]]"
    class$="[[_className(active)]]" on-click="handleClick">
</cr-icon-button>
<div class$="[[_className(active)]]" on-click="handleClick"></div>
