<!doctype html>
<html dir="$i18n{textdirection}" lang="$i18n{language}">

<head>
  <include src="../login/components/oobe_icons.html">
  <link rel="stylesheet" href="chrome://resources/css/text_defaults.css">

  <script src="chrome://resources/js/cr.js"></script>
  <script src="chrome://resources/js/cr/event_target.js"></script>
  <script src="chrome://resources/js/load_time_data.js"></script>
  <script src="chrome://resources/js/assert.js"></script>
  <script src="chrome://resources/js/util.js"></script>
  <script src="chrome://lock-reauth/authenticator.js"></script>

  <script type="module" src="chrome://lock-reauth/lock_screen_reauth.js"></script>

  <dom-module id="lock-reauth">
    <template>
      <style>
        :host {
          padding: 0;
          margin: 0;
          top: 0;
          left: 0;
          position: fixed;
          width: 100%;
          height: 100%;
        }

        .content-wrapper {
          display: flex;
          flex-direction: column;
          height: 100%;
          width: 100%;
        }

        #body {
          display: flex;
          flex-direction: column;
          flex-grow: 1;
          align-self: stretch;
          width: 100%;
          height: 100%;
        }

        #saml-container {
          display: flex;
          justify-content: flex-end;
        }

        #saml-close-button {
          --cr-icon-button-margin-end: 0;
          --cr-icon-button-margin-start: 0;
        }

        #signin-frame {
          flex: 1;
          width: 100%;
          height: 100%;
        }

        .title-icon {
          --iron-icon-height: 32px;
          --iron-icon-width: 32px;
          /* #1a73e8 */
          --iron-icon-fill-color: rgb(26, 115, 232);
        }

        .header {
          background: white;
          padding-bottom: 0;
          padding-inline-end: 64px;
          padding-inline-start: 64px;
          padding-top: 64px;
          flex: 1;
        }

        .title {
          color: var(--cr-primary-text-color);
          font-size: 28px;
          font-weight: 400;
          padding-top: 30px;
          margin: 0;
        }

        .subtitle {
          color: var(--cr-secondary-text-color);
          font-size: 13px;
          font-weight: 400;
          padding-top: 8px;
          margin: 0;
        }

        #button-container {
          display: flex;
          justify-content: flex-end;
          flex-shrink: 0;
          padding: 40px;
        }

        [hidden] {
          display: none;
        }
      </style>
      <div class="content-wrapper" hidden="[[!isVerifyUser_]]" role="dialog"
          aria-modal="true"
          aria-label="$i18n{loginWelcomeMessage}">
        <div class="header">
          <iron-icon class="title-icon" icon="oobe-64:alert"></iron-icon>
          <div class="title">
            $i18n{loginWelcomeMessage}
          </div>
          <div class="subtitle">
            $i18n{lockScreenReauthSubtitile}
          </div>
        </div>
        <div id="button-container" class="flex layout horizontal">
          <cr-button id="cancelButton" class="cancel-button" on-click="onCloseTap_">
            $i18n{lockScreenCancelButton}
          </cr-button>
          <cr-button id="nextButton" class="action-button" on-click="onVerify_">
            $i18n{lockScreenVerifyButton}
          </cr-button>
        </div>
      </div>

      <div class="content-wrapper" hidden="[[!isErrorDisplayed_]]" role="dialog"
          aria-modal="true"
          aria-label="$i18n{loginWelcomeMessageWithError}">
        <div class="header">
          <iron-icon class="title-icon" icon="oobe-64:alert"></iron-icon>
          <div class="title">
            $i18n{loginWelcomeMessageWithError}
          </div>
          <div class="subtitle">
            $i18n{lockScreenReauthSubtitileWithError}
          </div>
        </div>
        <div id="button-container" class="flex layout horizontal">
          <cr-button id="cancelButton" class="cancel-button" on-click="onCloseTap_">
            $i18n{lockScreenCancelButton}
          </cr-button>
          <cr-button id="nextButton" class="action-button" on-click="onVerify_">
            $i18n{lockScreenVerifyAgainButton}
          </cr-button>
        </div>
      </div>

      <div id="body" hidden="[[isButtonsEnabled_]]">
        <div id="saml-container">
          <cr-icon-button id="saml-close-button" iron-icon="cr:close" on-click="onCloseTap_"
              aria-label="$i18n{lockScreenCloseButton}">
          </cr-icon-button>
        </div>
        <webview id="signin-frame" name="signin-frame" class="flex">
        </webview>
      </div>
    </template>
  </dom-module>
</head>

<body>
  <lock-reauth id="main-element">
  </lock-reauth>
</body>

</html>
