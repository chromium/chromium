<style include="sp-shared-style">
  sp-heading {
    margin: 0 0 8px;
  }

  .content {
    margin: 16px 16px 8px;
  }

  #btnContainer {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }

  .sp-hr {
    margin: 16px 0;
  }

  cr-grid {
    --cr-column-width: 1fr;
    --cr-grid-gap: 10px;
    --cr-grid-width: 100%;
    display: block;
  }

  .tile {
    background-color: var(--color-sys-surface2);
    border-radius: 12px;
    outline-width: 0;
    overflow: hidden;
    place-self: stretch;
  }

  :host-context(.focus-outline-visible) .tile:focus {
    box-shadow: 0 0 0 2px var(--cr-focus-outline-color);
  }

  .result {
    cursor: pointer;
  }

  .result img {
    height: 100%;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
  }

  .image-container {
    padding-top: 100%;
    position: relative;
    width: 100%;
  }

  .image-container img {
    position: absolute;
  }

  @media (forced-colors: active) {
    :host-context(.focus-outline-visible) .tile:focus {
      /* Set outline to hcm (high contrast mode) value. */
      outline: var(--cr-focus-outline-hcm);
    }
  }
</style>
<div class="sp-card">
  <sp-heading id="heading" on-back-button-click="onBackClick_"
      back-button-aria-label="$i18n{backButton}"
      back-button-title="$i18n{backButton}">
    <h2 slot="heading">Wallpaper Search</h2>
  </sp-heading>
  <div class="content">
    <cr-input
        id="queryInput"
        type="text"
        placeholder="Query"
        value="{{query_}}">
    </cr-input>
    <div id="btnContainer">
      <cr-button
          id="submitButton"
          on-click="onSearchClick_"
          class="action-button">
        Search
      </cr-button>
    </div>
    <hr class="sp-hr">
    <cr-grid columns="3" disable-arrow-navigation>
      <template is="dom-repeat" id="resultsRepeat" items="[[results_]]">
        <div class="tile result" tabindex="0" role="button">
          <div class="image-container">
            <img src="data:image/png;base64,[[item]]">
            </img>
          </div>
        </div>
      </template>
      <template is="dom-repeat" id="emptyRepeat" items="[[emptyContainers_]]">
        <div class="tile empty">
          <div class="image-container"></div>
        </div>
      </template>
    <cr-grid>
  </div>
</div>
