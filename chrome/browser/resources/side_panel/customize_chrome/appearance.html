<style include="cr-hidden-style cr-button cr-icons">
  #editThemeButton {
    margin: 0 16px 24px;
    width: calc(100% - 32px);
  }

  #setClassicChromeButton {
    box-sizing: border-box;
    color: var(--cr-primary-text-color);
    cursor: pointer;
    display: flex;
    font-size: 13px;
    font-weight: 400;
    justify-content: space-between;
    line-height: 20px;
    margin-top: 8px;
    padding: 18px 16px;
    width: 100%;
  }

  #setClassicChromeButton:hover {
    background-color: var(--cr-hover-background-color);
  }

  #setClassicChromeButton:focus {
    background-color: var(--cr-menu-background-focus-color);
    outline: none;
  }

  #imageIcon {
    --cr-icon-color: var(--ink-color-action);
    --cr-icon-image: url(icons/image.svg);
    --cr-icon-size: 12px;
    height: 12px;
    margin-inline-end: 8px;
    margin-inline-start: 0;
    width: 12px;
  }

  #resetIcon {
    --cr-icon-color: var(--cr-primary-text-color);
    --cr-icon-image: url(icons/reset.svg);
    --cr-icon-size: 18px;
    height: 18px;
    margin: 0;
    width: 18px;
  }
</style>
<customize-chrome-theme-snapshot></customize-chrome-theme-snapshot>
<cr-button id="editThemeButton" on-click="onEditThemeClicked_"
    class="action-button">
  <div id="imageIcon" class="cr-icon"></div>
  $i18n{changeTheme}
</cr-button>
<customize-chrome-colors></customize-chrome-colors>
<div hidden$="[[!showClassicChromeButton_]]" id="setClassicChromeButton"
    on-click="onSetClassicChromeClicked_" role="button" tabindex="0">
  $i18n{resetToClassicChrome}
  <div id="resetIcon" class="cr-icon"></div>
</div>
