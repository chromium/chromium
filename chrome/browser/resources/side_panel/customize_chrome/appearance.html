<style include="cr-hidden-style cr-icons">
  #editThemeButton {
    margin: 0 16px 24px;
    width: calc(100% - 32px);
  }

  #imageIcon {
    --cr-icon-color: var(--ink-color-action);
    --cr-icon-image: url(icons/image.svg);
    --cr-icon-size: 12px;
    height: 12px;
    margin-inline-end: 8px;
    margin-inline-start: 0;
    width: 12px;
  }

  #setClassicChromeButton {
    --cr-icon-image: url(icons/reset.svg);
  }
</style>
<customize-chrome-theme-snapshot></customize-chrome-theme-snapshot>
<cr-button id="editThemeButton" on-click="onEditThemeClicked_"
    class="action-button">
  <div id="imageIcon" class="cr-icon"></div>
  $i18n{changeTheme}
</cr-button>
<customize-chrome-colors></customize-chrome-colors>
<customize-chrome-hover-button hidden$="[[!showClassicChromeButton_]]"
  id="setClassicChromeButton" label="$i18n{resetToClassicChrome}"
  on-click="onSetClassicChromeClicked_">
</customize-chrome-hover-button>
