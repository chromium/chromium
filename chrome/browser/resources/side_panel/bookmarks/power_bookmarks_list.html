<style include="cr-hidden-style sp-shared-style">
  :host {
    --back-button-size: 14px;
  }

  :host([drop-position='into']) power-bookmark-row {
    background: var(--cr-hover-background-color);
  }

  sp-empty-state {
    padding-top: 40px;
  }

  #folderEmptyState {
    padding-bottom: 40px;
  }

  sp-heading {
    margin: 8px 14px;
  }
</style>
<div id="scroller" class="sp-scroller">
  <div class="sp-card">
    <power-bookmarks-list-header hidden$="[[!sectionVisibility_.heading]]"
        active-folder="[[getActiveFolder(activeFolderPath.*)]]"
        compact="[[compact_]]" disable-edit="[[!hasShownBookmarks]]"
        editing="[[editing]]"
        on-sort-changed="onSortChanged_"
        on-back-clicked="onBackClicked_"
        on-view-toggled="onViewToggled_">
    </power-bookmarks-list-header>

    <template is="dom-if" if="[[!sectionVisibility_.bookmarksList]]">
      <div hidden="[[!sectionVisibility_.newFolderButton]]">
        <power-bookmarks-add-folder-button
            disabled="[[editing]]"
            compact$="[[compact_]]"
            on-click="onAddNewFolderClicked_">
        </power-bookmarks-add-folder-button>
      </div>
    </template>

    <sp-empty-state id="folderEmptyState"
        hidden="[[!sectionVisibility_.folderEmptyState]]"
        image-path="./images/bookmarks_empty.svg"
        dark-image-path="./images/bookmarks_empty_dark.svg"
        heading="$i18n{emptyTitleFolder}"
        body="$i18n{emptyBodyFolder}">
    </sp-empty-state>

    <div id="bookmarks" class="bookmarks"
        hidden="[[!sectionVisibility_.bookmarksList]]"
        role="[[getBookmarksListRole_(editing)]]"
        aria-multiselectable="[[editing]]" scrollable>
      <power-bookmarks-add-folder-button
          hidden="[[!sectionVisibility_.newFolderButton]]"
          disabled="[[editing]]"
          compact$="[[compact_]]"
          on-click="onAddNewFolderClicked_">
      </power-bookmarks-add-folder-button>
      <template is="dom-repeat" items="[[displayLists_]]" as="bookmarks">
        <template is="dom-if" restamp if="[[bookmarks.length]]">
          <sp-heading hidden="[[!sectionVisibility_.filterHeadings]]"
              hide-back-button>
            <h1 slot="heading">
              [[getFilterHeading_(index, activeFolderPath.*)]]
            </h1>
          </sp-heading>
          <iron-list id="shownBookmarksIronList[[index]]"
              items="[[bookmarks]]" scroll-target="scroller" role="tree">
            <template>
              <power-bookmark-row id="bookmark-[[item.id]]" bookmark="[[item]]"
                  compact="[[compact_]]"
                  search-query="[[searchQuery]]"
                  updated-element-ids="[[updatedElementIds_]]"
                  trailing-icon-tooltip="$i18n{tooltipMore}"
                  has-checkbox="[[editing]]"
                  active-sort-index="[[activeSortIndex]]"
                  selected-bookmarks=
                      "[[getSelectedBookmarksList_(selectedBookmarks.*)]]"
                  renaming-id="[[renamingId_]]"
                  on-row-clicked="onRowClicked_"
                  on-context-menu="onShowContextMenuClicked_"
                  on-trailing-icon-clicked="onShowContextMenuClicked_"
                  on-checkbox-change="onRowSelectedChange_"
                  on-input-change="onRename_"
                  on-list-item-size-changed="notifyBookmarksListResize_"
                  on-power-bookmark-toggle="onRowToggled_"
                  tabindex$="[[tabIndex]]"
                  image-urls="[[imageUrls_]]"
                  shopping-collection-folder-id=
                      "[[shoppingCollectionFolderId_]]"
                  context-menu-bookmark="[[contextMenuBookmark]]"
                  draggable="[[canDrag_]]"
                  can-drag="[[canDrag_]]"
                  has-active-drag="[[hasActiveDrag_]]"
                  active-folder-path="[[activeFolderPath]]"
                  has-folders="[[hasFolders_]]">
              </power-bookmark-row>
            </template>
          </iron-list>
        </template>
      </template>
    </div>
  </div>
</div>
