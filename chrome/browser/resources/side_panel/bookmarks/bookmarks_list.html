<style include="cr-icons cr-hidden-style">
  .divider {
    border-top: 1px solid var(--cr-separator-color);
    margin: 0 22px;
  }

  .icon-tracked {
    --power-bookmark-chip-icon-image: url(../images/bookmarks_icon_tracked.svg);
  }
</style>

<div id="bookmarksContainer">
  <template is="dom-if" if="[[showPowerBookmarks_]]" restamp>
    <template is="dom-repeat" items="[[topLevelBookmarks_]]">
      <power-bookmark-row id="bookmark-[[item.id]]" bookmark="[[item]]"
          description="[[getBookmarkDescription_(item, descriptions_.*)]]"
          compact="[[compact_]]">
          <div slot="extra-content-container">
            <power-bookmark-chip>
              <div class="icon icon-tracked"></div>
              <div>$200</div>
            </power-bookmark-chip>
          </div>
      </power-bookmark-row>
    </template>
  </template>
  <template is="dom-if" if="[[!showPowerBookmarks_]]" restamp>
    <template is="dom-repeat" items="[[folders_]]">
      <bookmark-folder id="bookmark-[[item.id]]" folder="[[item]]"
          open-folders="[[openFolders_]]">
      </bookmark-folder>
    </template>
    <template is="dom-if" if="[[productInfos_.length]]" restamp>
      <div class="divider"></div>
      <shopping-list
          id="shoppingList" product-infos="[[productInfos_]]">
      </shopping-list>
    </template>
  </template>
</div>
