<style>
  #container {
    background: var(--google-grey-900);
    color: var(--google-grey-200);
    font-size: 18px;
    padding:  20px;
  }

  .standard {
    font-family: Roboto, Arial, sans-serif;
  }
  .sans-serif {
    font-family: Roboto, Tahoma, sans-serif;
  }
  .serif {
    font-family: Didot, Georgia, serif;
  }
  .arial {
    font-family: Arial, Verdona, sans-serif;
  }
  .open-sans {
    font-family: 'Open Sans', Courier, sans-serif;
  }
  .calibri {
    font-family: Calibri, 'Times New Roman', serif;
  }

</style>
<div id="container" class$="[[fontName_]]">
  <template is="dom-repeat" items="[[content_]]">
    <template is="dom-if" if="[[isParagraph_(item)]]">
      <p>[[item.text]]</p>
    </template>
    <template is="dom-if" if="[[isHeading_(item)]]">
      <read-anything-heading content-node="[[item]]"></read-anything-heading>
    </template>
  </template>
</div>
