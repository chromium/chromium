<style include="cr-icons">
  cr-icon {
    --icon-size: 20px;
    height: var(--icon-size);
    width: var(--icon-size);
    margin: 0px 8px 0px 4px;
  }
  cr-icon-button {
    --cr-icon-button-icon-size: 16px;
    --cr-icon-button-size: 24px;
    margin: 0 4px;
    color: var(--color-sys-on-surface-subtle);
  }
  cr-icon-button.active {
    background-color: var(--cr-active-background-color);
  }
  #voiceSelectionMenu::part(dialog) {
    min-width: 304px;
    width: fit-content;
    margin-left: var(--sp-body-padding);
    max-height: 95%;
  }
  .dropdown-voice-selection-button {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: transparent;
    border: none;
    width: 100%;
    padding: 0px 24px 0px 20px;
    color: var(--color-sys-on-surface-subtle);
  }
  .dropdown-voice-selection-button:active {
    background-color: var(--cr-active-background-color);
  }
  .dropdown-voice-selection-button:hover {
    background-color: var(--cr-hover-background-color);
    cursor: pointer;
  }
  .dropdown-voice-selection-button:focus-visible {
    background-color: var(--cr-hover-background-color);
    outline: none;
  }
  .dropdown-voice-selection-button cr-icon-button {
    margin: 0;
  }
  .dropdown-line {
    height: 32px;
    align-items: center;
  }
  .check-mark {
    margin: 0;
  }
  .lang-group-title {
    display: grid;
    font-size: 12px;
    font-weight: 400;
    padding-left: 20px;
    color: var(--color-sys-on-surface-subtle);
  }
  .voice-name {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 13px;
    font-weight: 500;
    padding-inline-end: 16px;
  }
  .item-invisible-true {
    visibility: hidden;
  }
  .menu-divider {
    border-top: 1px solid var(--cr-active-background-color);
  }
  .language-menu-button {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 3px;
    height: 24px;
  }

</style>

<!-- TODO(b/333785012): Add initial-counts to the dom-repeats here. -->
<cr-lazy-render id="voiceSelectionMenu">
  <template>
    <cr-action-menu on-close="onClose_" on-keydown="onVoiceMenuKeyDown_">
      <template is="dom-repeat" items="[[voiceSelectionOptions_]]"
                initial-count="20">
        <div data-test-id$="group-[[stringToHtmlTestId_(item.language)]]">
          <span class="dropdown-line lang-group-title">
            [[item.language]]
          </span>

          <template is="dom-repeat" items="[[item.voices]]" initial-count="20">
            <button data-test-id$="[[item.id]]"
              class="dropdown-item dropdown-voice-selection-button"
              on-click="onVoiceSelectClick_">
              <span class="voice-name">
                <cr-icon id="check-mark"
                  class$="item-invisible-[[!item.selected]] check-mark"
                  icon="read-anything-20:check-mark"></cr-icon>
                [[item.title]]
              </span>
              <cr-icon-button id="preview-icon" on-click="onVoicePreviewClick_"
                title$="[[previewLabel_(item.previewPlaying,'')]]"
                aria-label$="[[previewLabel_(item.previewPlaying,item.title)]]"
                iron-icon="[[previewIcon_(item.previewPlaying)]]">
              </cr-icon-button>
            </button>
          <!-- TODO(crbug.com/1474951) Pause the preview when pause button is
                    pressed -->
          </template>
        </div>
      </template>

      <hr class="menu-divider">

      <div>
        <button
          class="dropdown-item
            dropdown-voice-selection-button language-menu-button"
          on-click="openLanguageMenu_">
            $i18n{readingModeLanguageMenu}
        </button>
      </div>
    </cr-action-menu>
  </template>
</cr-lazy-render>

<cr-lazy-render id="languageMenu">
  <template>
    <language-menu
      locale-to-display-name="[[localeToDisplayName]]"
      available-voices="[[availableVoices]]">
    </language-menu>
  </template>
</cr-lazy-render>
