<simple-action-menu
    id="menu"
    label="$i18n{letterSpacingTitle}"
    .menuItems="${this.options_}"
    event-name="${ToolbarEvent.LETTER_SPACING}"
    current-selected-index="${this.restoredLetterSpacingIndex_()}"
    @letter-spacing-change="${this.onLetterSpacingChange_}"
    initial-count="3">
</simple-action-menu>
