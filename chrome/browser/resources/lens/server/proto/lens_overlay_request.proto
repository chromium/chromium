syntax = 'proto3';

option optimize_for = LITE_RUNTIME;

package lens.proto;

message LensOverlayRequest {
  // Type of interaction request.
  enum Type {
    UNKNOWN = 0;
    // User selected a bounding box to region search.
    REGION_SEARCH = 1;
    // User's text selection on the screenshot.
    TEXT_SELECTION = 2;
    // Requests selection and fulfillment of a specific object.
    OBJECT_FULFILLMENT = 3;
    // User performed a text query.
    TEXT_QUERY = 4;
  }
  Type type = 1;

  // Bounding box selected to region search.
  message CenterRotatedBox {
    float center_x = 1;
    float center_y = 2;
    float width = 3;
    float height = 4;
    // Clockwise rotation around the center in radians. The rotation angle is
    // computed before normalizing the coordinates.
    float rotation_z = 5;

    enum CoordinateType {
      // Unspecified default value, per proto best practice.
      COORDINATE_TYPE_UNSPECIFIED = 0;
      // Normalized coordinates.
      NORMALIZED = 1;
      // Image pixel coordinates.
      IMAGE = 2;
    }
    CoordinateType coordinate_type = 6;
  }
  CenterRotatedBox region = 2;

  // Unstructured text query to add to an image query.
  string text_query = 3;
}
