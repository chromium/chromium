<style>
  .app-container {
    width: 100%;
    height: 100%;
    /* Make it evident what is the live page peeking through vs screenshot. */
    background-color: rgba(60, 60, 60, 0.5);
  }

  .action-button {
    position: absolute;
    left: 0;
  }

  #closeButton {
    top: 25px;
  }

  lens-selection-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
<div class="app-container">
  <lens-selection-overlay></lens-selection-overlay>
  <cr-button id="closeButton" class="action-button"
      on-click="onCloseButtonClick_">
    $i18n{close}
  </cr-button>
</div>
