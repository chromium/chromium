<style>
  .app-container {
    width: 100%;
    height: 100%;
    /* Background color #151C26 with 30% transparency */
    background-color: #151C264D;
  }

  #closeButton {
    position: absolute;
    inset-block-start: 24px;
    inset-inline-end: 24px;
  }
</style>
<div class="app-container">
  <!-- Do not render selection overlay if data URI is empty. -->
  <template is="dom-if" if="[[screenshotDataUri.length]]">
    <lens-selection-overlay
      screenshot-data-uri="[[screenshotDataUri]]"></lens-selection-overlay>
  </template>
  <cr-button id="closeButton" class="action-button"
      on-click="onCloseButtonClick">
    $i18n{close}
  </cr-button>
</div>
