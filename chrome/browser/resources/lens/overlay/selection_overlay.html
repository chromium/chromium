<style>
  :host {
    align-items: center;
    display: flex;
    height: 100%;
    justify-content: center;
    width: 100%;
  }

  #selectionOverlay {
    cursor: crosshair;
    display: grid;
    position: relative;

    /* Disable native dragging */
    user-select: none;
    -webkit-user-drag: none;
    -webkit-user-select: none;
  }

  :host([is-resized]) #selectionOverlay {
    border-radius: 28px;
    overflow: hidden;
  }

  /* Force all child elements to share the same grid cell so they overlap. */
  #selectionOverlay > * {
    grid-column: 1;
    grid-row: 1;
    /* Allow each full size element to not interfere with each other. */
    pointer-events: none;
  }

  #backgroundImage {
    max-width: 100vw;
    max-height: 100vh;
  }

  :host([is-resized]) #backgroundImage{
    max-width: calc(100vw - 24px);
    max-height: calc(100vh - 24px);
  }

  #selectionElements {
    /* Background color #151C26 with 5% transparency */
    background-color: #151C260D;
  }

  #selectionElements > * {
    inset: 0;
    position: absolute;
  }

  #cursor {
    align-items: center;
    background: #ebf1ff;
    border-radius: 2px 100px 100px 100px;
    box-shadow: 0px 4px 12px 0px rgba(27, 28, 20, 0.24);
    display: flex;
    height: 32px;
    justify-content: center;
    left: 0;
    pointer-events: none;
    position: fixed;
    top: 0;
    width: 32px;
  }

  #cursorImg {
    height: 20px;
    width: 20px;
  }

  #cursor.hidden {
    visibility: hidden;
  }
</style>
<div id="selectionOverlay"
    on-pointerenter="handlePointerEnter" on-pointerleave="handlePointerLeave">
  <img id="backgroundImage" draggable="false" src="[[screenshotDataUri]]">
  <!-- Wrapper div is needed to stack the seleciton elements on top of
  background image. -->
  <div id="selectionElements">
    <!-- Other elements that need to be bounded to the image go here -->
    <post-selection-renderer
        id="postSelectionRenderer" screenshot-data-uri="[[screenshotDataUri]]">
    </post-selection-renderer>
    <lens-object-layer id="objectSelectionLayer"
        screenshot-data-uri="[[screenshotDataUri]]"></lens-object-layer>
    <region-selection id="regionSelectionLayer"
        screenshot-data-uri="[[screenshotDataUri]]"></region-selection>
    <lens-text-layer id="textSelectionLayer"></lens-text-layer>
  </div>
</div>
<div id="cursor"
    class$="[[getHiddenCursorClass(isPointerInside, currentGesture.state)]]">
  <img id="cursorImg" src="[[cursorImgUri]]">
</div>
