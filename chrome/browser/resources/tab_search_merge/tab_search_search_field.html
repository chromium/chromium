<style include="cr-icons">
  :host {
    align-items: center;
    background-color: var(--google-grey-refresh-100);
    border-radius: 32px;
    display: flex;
    height: 28px;
    margin: 8px;
    padding: 0 8px;
    user-select: none;
  }

  @media (prefers-color-scheme: dark) {
    :host {
      background-color: var(--google-grey-800);
    }
  }

  #searchIcon {
    height: var(--mwb-icon-size);
    padding-inline-end: 4px;
    width: var(--mwb-icon-size);
  }

  @media (prefers-color-scheme: dark) {
    #searchIcon {
      color: var(--google-blue-refresh-300);
    }
  }

  input {
    align-self: stretch;
    background-color: transparent;
    border: none;
    border-radius: 0;
    color: var(--cr-primary-text-color);
    flex: 1;
    font-size: var(--mwb-primary-text-font-size);
    outline: none;
    text-overflow: ellipsis;
  }
</style>
<iron-icon id="searchIcon" icon="cr:search"></iron-icon>
<input id="searchInput" on-search="onSearchTermSearch"
    on-input="onSearchTermInput" aria-label$="[[label]]" type="search"
    autofocus="[[autofocus]]" placeholder="[[label]]" autocomplete="off"
    spellcheck="false" />
