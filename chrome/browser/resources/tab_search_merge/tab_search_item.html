<style>
  :host(:hover, .selected) .button-container {
    display: flex;
  }

  .button-container {
    display: none;
  }

  img {
    height: var(--mwb-icon-size);
    margin-inline-end: var(--mwb-list-item-horizontal-margin);
    width: var(--mwb-icon-size);
  }

  .text-container {
    flex-grow: 1;
    overflow: hidden;
  }

  .primary-text,
  .secondary-text {
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
    white-space: nowrap;
  }

  .primary-text {
    color: var(--cr-primary-text-color);
    font-size: var(--mwb-primary-text-font-size);
    margin-bottom: 3px;
  }

  .secondary-text {
    color: var(--cr-secondary-text-color);
    font-size: var(--mwb-secondary-text-font-size);
  }

  cr-icon-button {
    --cr-icon-button-margin-end: calc(var(--mwb-icon-size) / 4);
    --cr-icon-button-margin-start: calc(var(--mwb-icon-size) / 4);
    --cr-icon-button-size: var(--mwb-icon-size);
  }
</style>

<img src="[[data.favIconUrl]]">
<div class="text-container">
  <div class="primary-text">[[data.title]]</div>
  <div class="secondary-text">[[urlHostname_(data.url)]]</div>
</div>
<div class="button-container">
  <cr-icon-button aria-labelledby="label" iron-icon="cr:cancel"
      on-click="onItemCancel_" title="$i18n{close}">
  </cr-icon-button>
</div>
