<style>
    tr:nth-child(odd) {
        background: rgb(239, 243, 255);
    }
</style>
<h2>Profiles</h2>\
<template is="dom-repeat" items="[[profilesList_]]">
    <h3>[[item.localProfileName]]</h3>
    <table class="profile">
        <tr>
            <td>Profile Path</td>
            <td>[[item.profilePath]]</td>
        </tr>
        <tr>
            <td>Local Profile Name</td>
            <td>[[item.localProfileName]]</td>
        </tr>
        <tr>
            <td>Signin State</td>
            <td>[[item.signinState]]</td>
        </tr>
        <tr>
            <td>Signin Required</td>
            <td>[[item.signinRequired]]</td>
        </tr>
        <tr>
            <td>Gaia Name</td>
            <td>[[item.gaiaName]]</td>
        </tr>
        <tr>
            <td>Gaia Id</td>
            <td>[[item.gaiaId]]</td>
        </tr>
        <tr>
            <td>User Name</td>
            <td>[[item.userName]]</td>
        </tr>
        <tr>
            <td>Hosted Domain</td>
            <td>[[item.hostedDomain]]</td>
        </tr>
        <tr>
            <td>KeepAlives</td>
            <td>
                <table>
                    <template is="dom-repeat" items="[[item.keepAlives]]">
                        <tr>
                            <td>[[item.origin]]</td>
                            <td>[[item.count]]</td>
                        </tr>
                    </template>
                </table>
            </td>
        </tr>
    </table>
</template>
