<style include="shared-style cr-shared-style">
  /* Hide the default icon element.*/
  cr-link-row[hide-icon]::part(icon) {
    display: none;
  }

  #warning-container {
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 8px;
    border-radius: 8px;
    padding: 8px 12px;
    background-color: var(--sys-color-error-container);
  }

  #warning-icon {
    --iron-icon-width: var(--cr-icon-size);
    --iron-icon-height: var(--cr-icon-size);
    color: var(--error-color);
  }
</style>

<cr-link-row class="cr-row" non-clickable hide-icon
    label="$i18n{fullResetTitle}"
    sub-label="$i18n{fullResetRowDescription}">
    <cr-button id="deleteAllButton" on-click="onDeleteAllClick_">
        $i18n{fullResetDeleteAll}
    </cr-button>
</cr-link-row>

<cr-dialog id="dialog">
  <div slot="title" class="dialog-title">
    $i18n{fullResetConfirmationTitle}
  </div>
  <div slot="body">
    <div id="warning-container">
      <iron-icon id="warning-icon" icon="passwords-icon:outlined-warning">
      </iron-icon>
      <div>$i18n{fullResetConfirmationDescription}</div>
    </div>
  </div>
  <div slot="button-container">
    <cr-button class="cancel-button" on-click="onCancel_" id="cancelButton"
        autofocus>
      $i18n{cancel}
    </cr-button>
    <cr-button class="action-button" on-click="onConfirm_" id="confirmButton">
      $i18n{fullResetConfirm}
    </cr-button>
  </div>
</cr-dialog>

<cr-toast id="successToast" duration="5000">
  <span id="toast-message">$i18n{fullResetSuccessToast}</span>
</cr-toast>
