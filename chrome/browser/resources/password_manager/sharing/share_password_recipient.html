<style include="shared-style">
  :host {
    margin-top: 8px;
    padding: 8px 24px 8px 8px;

    border: 0.5px solid var(--cr-separator-color);
    border-radius: 25px;

    display: grid;
    grid-template-columns: auto min-content;
    column-gap: 12px;
  }

  :host(:not([disabled]):hover) {
    cursor: pointer;
    background: var(--google-grey-100);
  }

  :host([disabled]) {
    cursor: initial;
  }

  :host([disabled]) > .content {
    opacity: var(--cr-disabled-opacity);
  }

  .content {
    display: grid;
    grid-template-columns: 32px auto;
    column-gap: 12px;

    /* Add border-radius so the cursor pointer will match the border of the */
    /* :host. */
    border-radius: 25px;
  }

  #avatar {
    border-radius: 50%;
    height: 32px;
    margin-inline-end: 8px;
    width: 32px;
  }

  .user-data {
    margin-block: auto;
  }

  #name {
    font-size: 100%;
    color: var(--cr-primary-text-color);
    line-height: normal;
  }

  #email {
    font-size: 85%;
    color: var(--cr-secondary-text-color);
    line-height: normal;
  }

  .disabled-info {
    margin-inline-start: auto;
  }

  #notAvailable {
    font-size: 85%;
    margin-top: 0.15rem;
    white-space: nowrap;
  }

  cr-tooltip-icon {
    --cr-icon-size: 16px;
    margin-inline-end: 4px;
  }

  @media (prefers-color-scheme: dark) {
    :host(:not([disabled]):hover) {
      background: var(--google-grey-900);
    }
  }
</style>

<div class="content">
  <div class="flex-centered">
    <img id="avatar" src="[[recipient.profileImageUrl]]"></img>
  </div>
  <div class="user-data text-elide">
    <div id="name" class="text-elide">[[recipient.displayName]]</div>
    <div id="email" class="text-elide">[[recipient.email]]</div>
  </div>
</div>
<template is="dom-if" if="[[disabled]]" restamp>
  <div id="disabled-info" class="flex-centered">
    <cr-tooltip-icon tooltip-text="$i18n{sharePasswordMemeberUnavailable}"
        icon-class="cr:info-outline"
        icon-aria-label="$i18n{sharePasswordMemeberUnavailable}">
    </cr-tooltip-icon>
    <span id="notAvailable">$i18n{sharePasswordNotAvailable}</span>
  </div>
</template>
