<style include="cr-page-host-style cr-shared-style shared-style">
  :host {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  #main-container {
    align-items: flex-start;
    display: flex;
    flex: 1;
    overflow: overlay;
    position: relative;
  }

  #sidebar,
  #content,
  #space-holder {
    flex: 1 1 0;
  }

  #sidebar {
    height: 100%;
    position: sticky;
    top: 0;
  }

  #content {
    flex-basis: var(--password-manager-main-basis);
  }
</style>
<password-manager-toolbar id="toolbar"></password-manager-toolbar>
<div id="main-container">
  <password-manager-side-bar id="sidebar"></password-manager-side-bar>
  <iron-pages id="content" attr-for-selected="path"
      fallback-selection="passwords" class="cr-centered-card-container"
      selected="[[selectedPage_]]">
    <passwords-section id="passwords" path="passwords"></passwords-section>
    <div id="checkup" path="checkup"></div>
    <settings-section id="settings" path="settings"></settings-section>
  </iron-pages>
  <!-- An additional child of the flex #main-container to take up space,
        aligned with the right-hand child of the flex toolbar. -->
  <div id="space-holder"></div>
