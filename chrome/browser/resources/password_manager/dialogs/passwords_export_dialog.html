<style include="shared-style iron-flex">
 .action-button {
   margin-inline-start: 8px;
 }
</style>
<template is="dom-if" if="[[showStartDialog_]]" restamp>
 <cr-dialog id="dialogStart" close-text="$i18n{close}" show-on-attach>
   <h1 slot="title" class="dialog-title">$i18n{exportPasswords}</h1>
   <div slot="body">
       <div>$i18n{exportPasswordsDialogBody}</div>
   </div>
   <div slot="button-container">
     <cr-button class="secondary-button"
         on-click="onCancelButtonTap_" id="cancelButton">
       $i18n{cancel}
     </cr-button>
     <cr-button class="action-button"
         on-click="onExportTap_" id="exportPasswordsButton">
       $i18n{exportPasswords}
     </cr-button>
   </div>
 </cr-dialog>
</template>
