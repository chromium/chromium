<style include="shared-style">
   /* General toolbar layout. */
  cr-toolbar {
    min-height: 56px;
    --cr-toolbar-center-basis: var(--password-manager-main-basis);
    --cr-toolbar-header-white-space: nowrap;
  }
</style>
<cr-toolbar id="mainToolbar"
    page-name="$i18n{title}" clear-label="$i18n{clearSearch}"
    search-prompt="$i18n{searchPrompt}"
    autofocus on-search-changed="onSearchChanged_"
    role="banner">
  <cr-icon-button iron-icon="cr:help-outline"></cr-icon-button>
</cr-toolbar>
