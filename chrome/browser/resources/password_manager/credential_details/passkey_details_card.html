<style include="shared-style cr-input-style cr-shared-style
                credential-details-card">
</style>
<div class="card">
  <div class="credential-container">
    <!-- TODO(crbug.com/1432717): i18n title when UI approved -->
    <h4 class="card-title"></h4>
    <div class="cr-secondary-text label">
      [[getPasskeyUsageInfoString_(passkey)]]
    </div>
    <div class="row-container">
      <div class="column-container">
        <!-- TODO(crbug.com/1432717): i18n labels for 'copy display name' and
             'display name copied' -->
        <credential-field value="[[getDisplayNameValue_(passkey)]]"
            id="displayNameValue" label=" "
            copy-button-label=" " value-copied-toast-label=" "
            interaction-id="[[
                interactions_.PASSKEY_DISPLAY_NAME_COPY_BUTTON_CLICKED]]">
        </credential-field>
      </div>
      <div class="column-container">
        <div id="domainLabel" class="cr-form-field-label">
          $i18n{sitesLabel}
        </div>
        <template id="links" is="dom-repeat"
            items="[[passkey.affiliatedDomains]]">
          <div class="elide-left">
            <a href="[[item.url]]" class="site-link" target="_blank">
              [[item.name]]
            </a>
          </div>
        </template>
      </div>
    </div>
    <div class="row-container">
      <div class="column-container">
        <credential-field value="[[getUsernameValue_(passkey)]]"
            id="usernameValue" label="$i18n{usernameLabel}"
            copy-button-label="$i18n{copyUsername}"
            value-copied-toast-label="$i18n{usernameCopiedToClipboard}"
            interaction-id="[[interactions_.USERNAME_COPY_BUTTON_CLICKED]]">
        </credential-field>
      </div>
      <div class="column-container">
        <credential-note note="[[passkey.note]]" id="noteValue">
        </credential-note>
      </div>
    </div>
  </div>
  <div class="button-container">
    <cr-button id="editButton" class="edit-button" on-click="onEditClicked_">
      $i18n{edit}
    </cr-button>
    <cr-button id="deleteButton" on-click="onDeleteClick_">
      $i18n{delete}
    </cr-button>
  </div>
</div>
<template is="dom-if" if="[[showEditPasskeyDialog_]]" restamp>
  <edit-passkey-dialog on-close="onEditPasskeyDialogClosed_"
      id="editPasskeyDialog" passkey="{{passkey}}">
  </edit-passkey-dialog>
</template>
