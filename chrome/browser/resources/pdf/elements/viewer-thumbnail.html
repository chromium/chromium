<style>
  :host {
    --focus-border-color: var(--google-blue-refresh-300);
    display: block;
  }

  :host(:focus) {
    outline: none;
  }

  #thumbnail {
    display: inline-block;
    margin-bottom: 12px;
    margin-inline-end: auto;
    margin-inline-start: auto;
  }

  :host(:focus) #thumbnail {
    box-shadow: 0 0 0 2px var(--focus-border-color);
  }

  :host([is-active]) #thumbnail {
    --active-background-color: white;
    background-color: var(--active-background-color);
  }

  canvas {
    display: block;
    opacity: 0.5;
    transition: opacity 100ms ease-out;
  }

  :host([is-active]) canvas {
    opacity: 1;
  }

  :host([is-active]) canvas:hover,
  canvas:hover {
    opacity: 0.7;
  }

  #pageNumber {
    line-height: 1;
  }
</style>
<div id="thumbnail" on-click="onClick_">
  <canvas width="108" height="140"></canvas>
</div>
<div id="pageNumber">[[pageNumber]]</div>
