<style>
  #thumbnails {
    box-sizing: border-box;
    height: 100%;
    overflow: auto;
    padding-bottom: 24px;
    text-align: center;
  }
</style>
<div id="thumbnails">
  <template is="dom-repeat" items="[[pageNumbers_]]">
    <viewer-thumbnail is-active="[[isActivePage_(item, activePage)]]"
        page-number="[[item]]">
    </viewer-thumbnail>
  </template>
</div>
