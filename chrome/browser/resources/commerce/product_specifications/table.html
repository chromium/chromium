<style include="cr-icons cr-hidden-style">
  :host {
    --column-width: 220px;
  }

  #table {
    font-size: 12px;
    line-height: 16px;
  }

  .col {
    width: var(--column-width);
  }

  img {
    height: inherit;
    object-fit: contain;
    width: var(--column-width);
  }

  .img-container {
    border: 1px solid var(--color-sys-base-container);
    border-radius: 8px;
    height: 105px;
    margin-bottom: 16px;
    margin-top: 6px;
    padding: 8px 0;
    position: relative;
  }

  .open-tab-button {
    --cr-icon-button-fill-color: var(--color-product-specifications-icon);
    --cr-icon-button-icon-size: 16px;
    --cr-icon-button-size: 20px;
    position: absolute;
    right: 11px;
    top: 11px;
    z-index: 1;
  }

  .detail-container {
    margin-bottom: 24px;
  }

  .detail-title {
    border-bottom: 1px solid var(--color-product-specifications-divider);
    font-weight: 500;
    margin-inline-end: calc(-1 * var(--table-gap));
    padding-bottom: 4px;
    width: calc(var(--column-width) + 8px);
  }

  .col:not(:first-child) .detail-title span {
    visibility: hidden;
  }
</style>

<div id="table" on-pointerleave="onHideOpenTabButton_">
  <template is="dom-repeat" items="[[columns]]" as="column"
      index-as="columnIndex">
    <div class="col" on-pointerenter="onShowOpenTabButton_">
      <product-selector
          selected-item="[[column.selectedItem]]"
          excluded-urls="[[getUrls_(columns)]]"
          on-selected-url-change="onSelectedUrlChange_"
          on-remove-url="onUrlRemove_">
      </product-selector>
      <div class="img-container">
        <img is="cr-auto-img"
            auto-src="[[column.selectedItem.imageUrl]]"
            draggable="false" />
        <cr-icon-button class="open-tab-button icon-external"
            hidden$="[[!showOpenTabButton_(columnIndex,
                hoveredColumnIndex_)]]"
            on-click="onOpenTabButtonClick_">
        </cr-icon-button>
      </div>
      <template is="dom-repeat" items="[[column.productDetails]]" as="detail"
          index-as="rowIndex">
        <div class="detail-container"
            hidden$="[[!showRow_(detail.title, rowIndex)]]">
            <div class="detail-title">
              <span>[[detail.title]]</span>
            </div>
            <div class="detail-description"
                hidden$="[[!showDescription_(detail.title, rowIndex,
                    columns)]]">
              [[detail.description]]
            </div>
            <div class="detail-summary"
                hidden$="[[!showSummary_(detail.title, rowIndex, columns)]]">
              [[detail.summary]]
            </div>
        </div>
      </template>
    </div>
  </template>
</div>
