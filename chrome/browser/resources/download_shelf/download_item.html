<style>
:host {
  /* The following color values are copied from
   * ui/webui/resources/cr_elements/shared_vars_css.html
   * because we don't want to introduce the Polymer 3 dependency
   * to increase loading overhead from the benchmarking's perspective.
   * If at some point pulling in Polymer becomes unavoidable then we should
   * remove these lines and include shared_vars_css.html instead. */
  --google-grey-refresh-700-rgb: 95, 99, 104;  /* #5f6368 */
  --google-grey-refresh-700: rgb(var(--google-grey-refresh-700-rgb));
  --google-grey-900-rgb: 32, 33, 36;  /* #202124 */
  --google-grey-900: rgb(var(--google-grey-900-rgb));

  --button-hover-color: rgba(var(--google-grey-900-rgb), .1);
  --button-icon-stroke-color: var(--google-grey-refresh-700);
  --pi: 3.14159265358979;
  --spinner-color: var(--google-grey-900-rgb);
  --text-width: 140px;
  --transparent-button-color: rgba(0, 0, 0, 0);
}

.download-item {
  align-items: center;
  box-sizing: border-box;
  display: flex;
  flex-direction: row;
  height: 100%;
  overflow: hidden;
  padding: 6px 0 6px 12px;
  position: relative;
  user-select: none;
}

.download-item:hover {
  background-color: var(--button-hover-color);
}

.progress {
  --width: 26px;
  --radius: calc(var(--width) / 2);
  --stroke-width: 1.2px;

  --download-progress: 0;
  --indicator-color: var(--spinner-color);

  align-items: center;
  display: flex;
  flex: 0 0 var(--width);
  height: var(--width);
  justify-content: center;
  position: relative;
  width: var(--width);
}

.progress-indicator {
  height: 100%;
  position: absolute;
  width: 100%;
}

.progress-circle,
.progress-spinner {
  cx: var(--radius);
  cy: var(--radius);
}

.progress-circle {
  fill: rgba(var(--indicator-color), 0.2);
  r: calc(var(--radius) - var(--stroke-width) / 2.0);
}

.progress-spinner {
  --stroke-radius: calc(var(--radius) - var(--stroke-width) / 2.0);
  --stroke-circumference: calc(var(--pi) * 2 * var(--stroke-radius));
  --stroke-dash-size: calc(var(--stroke-circumference)
      * var(--download-progress));

  fill: none;
  r: var(--stroke-radius);
  stroke: rgb(var(--indicator-color));
  stroke-dasharray: var(--stroke-dash-size), calc(var(--stroke-circumference)
      - var(--stroke-dash-size));
  stroke-dashoffset: calc(var(--stroke-circumference) * 0.25);
  stroke-linecap: round;
  stroke-width: var(--stroke-width);
}

/* Display progress spinner only when state=DownloadState.kInProgress. */
.download-item:not([data-state='2']) .progress-circle,
.download-item:not([data-state='2']) .progress-spinner {
  display: none;
}

#text-container {
  display: flex;
  flex-direction: column;
  height: 100%;
  justify-content: center;
  padding-inline-start: 8px;
  width: var(--text-width);
}

#filename,
#status-text {
  overflow: hidden;
  padding-bottom: 2px;
  padding-top: 2px;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#status-text {
  font-size: 85%;
}

#dropdown-button {
  background-color: var(--transparent-button-color);
  border: none;
  height: 32px;
  margin: 8px;
  width: 32px;
}

#dropdown-button:hover {
  background-color: var(--button-hover-color)
}

#dropdown-icon {
  fill: transparent;
  stroke: var(--button-icon-stroke-color);
  stroke-width: 1.2;
}

#file-icon {
  height: 16px;
  position: absolute;
}

#separator {
  background-color: rgba(255, 255, 255, .1);
  height: 90%;
  width: 1px;
}
</style>
<div class="download-item">
  <div class="progress">
    <svg class="progress-indicator">
      <circle class="progress-circle"></circle>
      <circle class="progress-spinner"></circle>
    </svg>
    <img id="file-icon">
  </div>
  <div id="text-container">
    <div id="filename"></div>
    <div id="status-text"></div>
  </div>
  <button id="dropdown-button">
    <svg id="dropdown-icon" viewBox="0 0 16 16">
      <g>
        <path d="M 4 10 l 4 -4 l 4 4">
        </path>
      </g>
    </svg>
  </button>
  <div id="separator"></div>
</div>
