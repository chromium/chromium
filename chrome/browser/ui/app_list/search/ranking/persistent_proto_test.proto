syntax = "proto2";

option optimize_for = LITE_RUNTIME;

package app_list;

// Test protos used for the PersistentProto unit tests.

message TestProto {
  optional int64 value = 1;
  optional TestProto msg_one = 2;
  optional AnotherTestProto msg_two = 3;
}

message AnotherTestProto {
  optional int64 value = 1;
}
