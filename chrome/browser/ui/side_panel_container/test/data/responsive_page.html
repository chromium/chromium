<!-- A simple page that always centers its content vertically and horizontally. -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Page</title>
  <style>
    html, body {
      height: 100%;
    }

    body {
      align-items: center;
      background-color: #064e3b;
      color: #e6f4ea;
      display: flex;
      font-family: sans-serif;
      font-size: 24px;
      justify-content: center;
      margin: 0;
    }
  </style>
</head>

<body>
  <div>Horizontally Centered</div>
</body>

</html>
