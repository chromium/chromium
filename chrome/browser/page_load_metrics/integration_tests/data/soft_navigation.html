<!doctype html>
<meta charset="utf-8" />
<title>Simple Soft Navigation</title>
<body>
  <button id="next-page" onclick="loadNextPage()">Next!</button>
  <main id="content"></main>
</body>
<script>
  // This globals dictionary allows C++ code in
  // soft_navigation_metrics_browsertest.cc to inject global state to the page,
  // e.g. by assigning globals.eventPromises = [].
  let globals = { 'currentPage': 0 };

  function navigate() {
    const hash = new URL(location.href).hash;  // #image or #text in practice.
    history.pushState(
        {}, "", "/soft_navigation.html?id=" + globals.currentPage + hash);
  }

  function loadPageContents() {
    const hash = new URL(location.href).hash;  // #image or #text in practice.
    let newContent;
    if (hash === "#image") {
      newContent = new Image();
      newContent.src = "/images/lcp-133x106.png?id=" + globals.currentPage;
    } else {
      newContent = document.createElement("div");
      newContent.textContent =
          "This is the text written on page " + globals.currentPage + ".";
    }
    document.getElementById("content").innerHTML = "";
    document.getElementById("content").appendChild(newContent);
  }

  function loadNextPage() {
    globals.currentPage++;
    navigate();
    loadPageContents();
  }

  loadPageContents();
</script>
