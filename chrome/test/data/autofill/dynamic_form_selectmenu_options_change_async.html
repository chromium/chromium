<!-- A page that is used to test that a dynamic form fill feature works properly when selectmenu options are added/removed asynchronously. -->
<body>
  <form action="https://example.com/" method="post">
    Name: <input type="text" id="firstname" autocomplete="given-name"><br>
    Address: <input type="text" id="address1"><br>
    City: <input type="text" id="city"><br>
    State: <selectmenu id="state">
      <option value="ON">ON</option>
      <option value="QC">QC</option>
      <option value="AB">AB</option>
    </selectmenu> <br>
    Country: <selectmenu id="country" onchange="CountryChanged()">
      <option value="CA">Canada</option>
      <option value="US">United States</option>
    </selectmenu> <br>
    <input type="submit" value="Submit" id="profile_submit">
  </form>
</body>

<script>
function CountryChanged() {
  // Update 'state' <selectmenu> asynchronously so that
  // AutofillAgent::SelectControlDidChange() triggers the refill not
  // AutofillAgent::TriggerRefillIfNeeded().
  window.setTimeout(CountryChangedAsync, 0);
}

function CountryChanged() {
  window['refill'] = true;
  console.log('An event happened that should trigger a refill.');

  // Replace the provinces with states. The state should get selected by refill.
  var state_selectmenu = document.getElementById("state");
  while (state_selectmenu.length > 0) {
     state_selectmenu.remove(0);
  }
  state_selectmenu.appendChild(new Option('WA', 'WA'));
  state_selectmenu.appendChild(new Option('MA', 'MA'));
  state_selectmenu.appendChild(new Option('TX', 'TX'));
}
</script>
