<!DOCTYPE html>
<html>
<head>
  <style>
    usermedia, geolocation {
      font-size: xxx-large;
      margin: 0px;
      border: 0px;
      width: 188px;
      height: 1.2em;
    }
  </style>
</head>
<body>
  <div id="parent">
    <geolocation id="geolocation"></geolocation>
    <usermedia id="microphone" type="microphone"></usermedia>
    <usermedia id="camera" type="camera"></usermedia>
    <usermedia id="invalid" type="invalid microphone"></usermedia>
    <usermedia id="camera-microphone" type="camera microphone"></usermedia>
  </div>
  <script>
    document.getElementById('parent').addEventListener('promptaction', (event) => {
      console.log(event.target.id + '-promptaction');
    });
    document.getElementById('parent').addEventListener('promptdismiss', (event) => {
      console.log(event.target.id + '-promptdismiss');
    });

    function clickById(element_id) {
      click(document.getElementById(element_id));
    }

    function click(element) {
      element.click();
    }

    // Waits until the given permission element is granted.
    function notifyWhenGranted(id) {
      if (document.getElementById(id).matches(':granted')) {
        console.log(id + '-granted');
      } else {
        window.setTimeout(() => {
          notifyWhenGranted(id);
        }, 50);
      }
    }

    function setFontSizeSmall() {
      document.querySelectorAll('usermedia').forEach((el) => {
        el.style.fontSize = 'small';
      });
      document.querySelectorAll('geolocation').forEach((el) => {
        el.style.fontSize = 'small';
      });
    }

    window.addEventListener('message', function(event) {
      setFontSizeSmall();
      clickById(event.data);
    });
  </script>
</body>
</html>
