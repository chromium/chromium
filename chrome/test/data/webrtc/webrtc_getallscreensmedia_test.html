<html>

<head>
  <title>WebRTC Automated Test</title>
  <script type="text/javascript" src="test_functions.js"></script>
  <script>
    'use strict';

    let stored_media_streams;
    let stored_display_stream;

    async function runGetAllScreensMedia() {
      try {
        stored_media_streams =
          await navigator.mediaDevices.getAllScreensMedia();
        const stream_ids = stored_media_streams.map(
          stream => stream.id
        ).toString();
        const track_ids = stored_media_streams.map(
          stream => stream.getTracks()[0].id
        ).toString();
        return logAndReturn(
          stream_ids + ":" + track_ids
        );
      } catch (error) {
        return logAndReturn("capture-failure," + error.name);
      }
    }

    function videoTrackContainsScreenDetailed(track_id) {
      const stream = stored_media_streams.find(
        stream => stream.getTracks()[0].id === track_id
      );
      if (!stream) {
        return logAndReturn("error-stream-not-found");
      }

      const video_tracks = stream.getVideoTracks();
      if (video_tracks.length != 1) {
        return logAndReturn("error-invalid-tracks-size");
      }

      const video_track = video_tracks[0];
      if (typeof video_track.screenDetailed !== "function") {
        return logAndReturn("error-no-screen-detailed");
      }

      try {
        const screen_detailed = video_track.screenDetailed();
        if (!screen_detailed) {
          return logAndReturn("error-screen-detailed-does-not-exist");
        }
        return logAndReturn("success-screen-detailed");
      } catch (error) {
        return logAndReturn("error-screen-detailed");
      }
    }

    async function startAllScreensMedia() {
      await runGetAllScreensMedia();
      return checkAllScreensMediaRunning();
    }

    function stopAllScreensMedia() {
      // Stops tracks of each stream.
      stored_media_streams.forEach((stream) => {
        stream.getTracks().forEach((track) => {
          track.stop();
        });
      });
      return isAllScreensMediaStopped();
    }

    async function startDisplayMedia() {
      stored_display_stream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: true,
      });
      return checkDisplayMediaRunning();
    }

    function stopDisplayMedia() {
      // Stops each track.
      stored_display_stream.getTracks().forEach((track) => {
        track.stop();
      });
      return isDisplayMediaStopped();
    }

    // Check the streams are at expectedState.
    function checkStreamState(streams, expectedState) {
      // streams should not be empty.
      if (streams.length == 0) {
        throw Error('checkStreamState: stream should not be empty.');
      }

      streams.forEach((stream) => {
        if (stream.active != (expectedState == 'live')) {
          return false;
        }

        // All tracks should be in the expectedReadyState.
        stream.getTracks().forEach((track) => {
          if (track.readyState != expectedState) {
            return false;
          }
        });
      })

      return true;
    }

    function checkDisplayMediaRunning() {
      return checkStreamState([stored_display_stream], 'live');
    }

    function isDisplayMediaStopped() {
      return checkStreamState([stored_display_stream], 'ended');
    }

    function checkAllScreensMediaRunning() {
      return checkStreamState(stored_media_streams, 'live');
    }

    function isAllScreensMediaStopped() {
      return checkStreamState(stored_media_streams, 'ended');
    }

    async function waitForDisplayMediaToStop() {
      while (!isDisplayMediaStopped()) {
        // Wait for 10 milliseconds.
        await new Promise(resolve => setTimeout(resolve, 10));
      }
      return true;
    }

  </script>
</head>

<body>
</body>

</html>
