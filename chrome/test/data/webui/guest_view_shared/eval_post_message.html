<!DOCTYPE html>
<html>
  <head>
    <title>Eval Post Message</title>
    <script>
      window.addEventListener('message', async (event) => {
        try {
          let task = event.data;
          let result = await eval(task.fn).apply(null, task.args);
          event.source.postMessage(
              {eval: {success: true, result: result}}, event.origin);
        } catch (ex) {
          event.source.postMessage(
              {eval: {success: false, result: ex}}, event.origin);
        }
      });
    </script>
  </head>
  <body>
  </body>
</html>
