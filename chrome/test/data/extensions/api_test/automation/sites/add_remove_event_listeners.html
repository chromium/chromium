<html>
  <head>
    <title>Automation Tests - Add Remove Event Listeners</title>
  </head>
  <body>
    <button></button>
    <script>
      const button = document.querySelector('button');
      button.addEventListener('click', () => {
        button.setAttribute('aria-hidden', true);
      });
    </script>
  </body>
</html>
