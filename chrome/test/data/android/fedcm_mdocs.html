<html>

<head>
  <title>FedCM MDocs Test Page</title>
</head>
<script>
  async function request() {
    const mdoc = await navigator.identity.get({
      digital: {
        providers: [{
          protocol: "urn:openid.net:oid4vp",
          request: JSON.stringify({
            // Based on https://github.com/openid/OpenID4VP/issues/125
            client_id: "client.example.org",
            client_id_scheme: "web-origin",
            nonce: "n-0S6_WzA2Mj",
            presentation_definition: {
              // Presentation Exchange request, omitted for brevity
            }
          }),
        }],
      }
    });
    const token = mdoc.data;
    document.getElementById("log").textContent += `${token}`;
  }
</script>

<body>
  <textarea id="log"></textarea>
</body>

</html>
