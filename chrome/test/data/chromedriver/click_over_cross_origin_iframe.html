<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Click overlay over cross-origin iframe</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #stage {
      position: relative;
      height: 400px;
      width: 600px;
      background: #f5f5f5;
      overflow: hidden;
    }

    #xframe {
      position: absolute;
      left: 0;
      top: 0;
      width: 400px;
      height: 300px;
      border: 0;
      background: #fff;
      z-index: 1;
    }

    #overlay {
      position: absolute;
      left: 50px;
      top: 50px;
      width: 200px;
      height: 100px;
      z-index: 9999;
      border: 3px solid #d20000;
      background: rgba(255, 0, 0, 0.15);
      color: #111;
      font: 16px/1.2 sans-serif;
      cursor: pointer;
    }

    #debug {
      white-space: pre-wrap;
      font: 12px/1.3 monospace;
      margin: 8px;
    }

    #overlay-marker {
      font: 14px/1.3 sans-serif;
      margin: 8px;
    }
  </style>
</head>
<body>
  <div id="stage">
    <iframe id="xframe" title="cross-origin click sink"></iframe>
    <button id="overlay" type="button">OVERLAY</button>
  </div>
  <div id="overlay-marker">NOT_CLICKED</div>
  <pre id="debug"></pre>

  <script>
    (() => {
      const overlay = document.getElementById('overlay');
      const xframe = document.getElementById('xframe');
      const marker = document.getElementById('overlay-marker');
      const debug = document.getElementById('debug');

      window.overlayClickCount = 0;
      window.iframeClickCount = 0;
      window.iframeReadyCount = 0;
      window.lastIframeEvent = null;

      function otherHostName() {
        return window.location.hostname === 'localhost' ? '127.0.0.1' : 'localhost';
      }

      function updateDebug() {
        debug.textContent = JSON.stringify(window.getState(), null, 2);
      }

      window.getHitTestDebug = () => {
        const overlayRect = overlay.getBoundingClientRect();
        const iframeRect = xframe.getBoundingClientRect();
        const cx = Math.floor(overlayRect.left + overlayRect.width / 2);
        const cy = Math.floor(overlayRect.top + overlayRect.height / 2);
        const hit = document.elementFromPoint(cx, cy);
        return {
          overlayRect: {
            left: overlayRect.left,
            top: overlayRect.top,
            width: overlayRect.width,
            height: overlayRect.height,
          },
          iframeRect: {
            left: iframeRect.left,
            top: iframeRect.top,
            width: iframeRect.width,
            height: iframeRect.height,
          },
          clickPoint: { x: cx, y: cy },
          elementFromPoint: hit ? { tagName: hit.tagName, id: hit.id } : null,
          overlayCenterWithinIframeRect:
              cx >= iframeRect.left && cx < iframeRect.right &&
              cy >= iframeRect.top && cy < iframeRect.bottom,
        };
      };

      window.getState = () => {
        return {
          overlayClickCount: window.overlayClickCount,
          iframeClickCount: window.iframeClickCount,
          iframeReadyCount: window.iframeReadyCount,
          overlayMarkerText: marker.textContent,
          lastIframeEvent: window.lastIframeEvent,
          hitTest: window.getHitTestDebug(),
          origins: {
            top: window.location.origin,
            iframe: xframe.src,
          },
        };
      };

      window.assertOverlayIsHitTestTarget = () => {
        const r = overlay.getBoundingClientRect();
        const cx = Math.floor(r.left + r.width / 2);
        const cy = Math.floor(r.top + r.height / 2);
        return document.elementFromPoint(cx, cy) === overlay;
      };

      overlay.addEventListener('click', () => {
        window.overlayClickCount++;
        marker.textContent = 'OVERLAY_CLICKED';
        updateDebug();
      });

      window.addEventListener('message', (event) => {
        if (event.data === 'IFRAME_CLICK') {
          window.iframeClickCount++;
        } else if (event.data === 'IFRAME_READY') {
          window.iframeReadyCount++;
        } else if (event.data && event.data.type === 'IFRAME_EVENT') {
          window.lastIframeEvent = event.data;
        }
        updateDebug();
      });

      window.addEventListener('load', () => {
        const url = (window.location.protocol + '//' + otherHostName() + ':' +
            window.location.port + '/chromedriver/iframe_click_sink.html');
        xframe.src = url;
        updateDebug();
      });
    })();
  </script>
</body>
</html>
