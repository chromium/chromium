<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background-color: white !important;
  }
  div {
    background-color: white !important;
  }
  geolocation {
    color: green !important;
    background-color: yellow !important;
    border-color: white !important;
    font-size: xx-large !important;
  }
  geolocation::permission-icon {
    display: block !important;
  }
</style>
<style><geocssfuzzer></style>
</head>
<body>
  <div id="htmlvar00002" class="class5 class6 class7 class8 class9">
    <geolocation id="htmlvar00001" class="class0 class1 class2 class3 class4"></geolocation>
  </div>

  <script>
    function waitForElementAndGetData() {
      return new Promise((resolve) => {
        const element = document.getElementById('htmlvar00001');
        if (!element) {
          resolve({error: 'Element not found'});
        }

        const startTime = Date.now();
        const timeout = 2000;

        function checkIsValid() {
          if (element.isValid) {
            const elementRect = element.getBoundingClientRect();
            const styles = window.getComputedStyle(element);
            resolve({
              element: {
                x: Math.round(elementRect.x),
                y: Math.round(elementRect.y),
                width: Math.round(elementRect.width),
                height: Math.round(elementRect.height)
              },
              style: {
                color: styles.color,
                backgroundColor: styles.backgroundColor
              }
            });
          } else if (Date.now() - startTime > timeout) {
            console.error('Element did not become valid within 2 seconds');
            resolve(null);
          } else {
            setTimeout(checkIsValid, 100);
          }
        }
        checkIsValid();
      });
    }
  </script>
</body>
</html>
