// Message format for a generic in-process proto fuzzer for now.
// This currently is not useful but is intended to be a skeleton guide.

syntax = "proto2";

package chrome.test.fuzzing.kombucha_in_process_fuzzer.proto;

// KombuchaStep provides a level of indirection which allows Testcase to
// compactly express repeated sequences of actions.
message KombuchaStep {
  repeated uint32 action_name = 1 [packed = true];
}

// KombuchaTestcase is the top-level message type interpreted by the fuzzer.
message KombuchaTestcase {
  repeated KombuchaStep steps = 1;
}
