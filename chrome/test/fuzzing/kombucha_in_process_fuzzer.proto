syntax = "proto3";
package test.fuzzing.ui_fuzzing;

// TODO(xrosado) Actions are not repeated to avoid empty action cases
// Make actions be repeatable
message FuzzCase {
  Action action = 1;
}

message Action {
  optional Parallelism parallel_flag = 1;  // Decides if we use InParallel/AnyOf
  repeated Step steps = 2;
}

message Step {
  oneof step_choice {
    SelectTab select_tab = 1;
    ClickAt click_at = 2;
    DragFromTo drag_from_to = 3;
    SendAccelerator send_accelerator = 4;
  }

  // Handles DragMouseTo events whenever it generates an empty source
  message DragFromTo {
    Target source = 1;
    Target dest = 2;
  }

  message ClickAt {
    Target target = 1;
    bool right_click = 2;
  }

  message SelectTab {
    // We don't actually know how many tabs/which tab to target
    // Should just function as an index
    // Use modulo to make sure it doesn't go over
    uint32 target = 1;
  }

  message SendAccelerator {
    Accelerator target = 1;
  }
}

enum Parallelism {
  IN_PARALLEL = 0;
  ANY_OF = 1;
}

enum Target {
  kAddCurrentTabToReadingListElementId = 0;
  kAppMenuButtonElementId = 1;
  kAppUninstallDialogOkButtonId = 2;
