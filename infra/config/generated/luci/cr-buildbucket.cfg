        '      "cmd": ['
        '        "luciexe"'
        '      ]'
        '    }'
        '  },'
        '  "$bootstrap/properties": {'
        '    "properties_file": "infra/config/generated/builders/try/chromeos-amd64-generic-rel-gtest-and-tast/properties.json",'
