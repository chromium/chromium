<html lang="en">
<body>
  <div role="switch" aria-checked="true" aria-label="Enabled switch">ON</div>
  <div role="switch" aria-checked="false" aria-label="Disabled switch">OFF</div>
  <div role="switch" aria-checked="true">Switch without label</div>
  <div role="switch" aria-label="Switch without checked state">Unknown</div>
  <div role="switch">Minimal switch</div>
