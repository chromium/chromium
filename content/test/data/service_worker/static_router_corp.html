<!DOCTYPE html>
<title>Service Worker Static Router CORP check</title>
<body>
<script>
async function register(worker_url, scope, type) {
  try {
    const init = {};
    if (scope)
      init['scope'] = scope;
    if (type)
      init['type'] = type;
    await navigator.serviceWorker.register(worker_url, init);
    await navigator.serviceWorker.ready;
    return 'DONE';
  } catch (error) {
    return `${error}`;
  }
}

async function register_sw() {
  await register('/service_worker/static_router_corp.js');
  return "DONE";
}

async function setup_cache(url) {
  const cache = await caches.open("test");
  // Fetch cross-origin resource. In the test, we'll use a different port or host.
  const response = await fetch(url, { mode: 'no-cors' });
  await cache.put("/service_worker/cache_corp_check", response);
  return "DONE";
}

async function try_load_image() {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve("LOADED");
    img.onerror = () => resolve("ERROR");
    img.src = "/service_worker/cache_corp_check";
  });
}
</script>
</body>
