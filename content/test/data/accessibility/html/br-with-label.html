<!DOCTYPE html>
<!-- Line breaks should always have an inline text box child. It should not have
other children, even if the other children are inside a label or description.
The test below should not cause a crash. -->
<html>
<body>
  <fieldset aria-describedby="desc1"></fieldset>
  <div id="desc1">
    <br>
  </div>
</body>
<script>
  document.querySelector('br').appendChild(document.createElement('p'));
  document.querySelector('br > p').appendChild(document.createTextNode('not shown'));
  </script>
</html>
