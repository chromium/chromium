<!DOCTYPE html>
<html>
<body>
<input id="in1" type="text" value="abcde">
<script>
  const go_passes = [
    () => {
      const inp = document.getElementById('in1');
      inp.focus();
      inp.setSelectionRange(0, 0);
    },
    () => {
      const inp = document.getElementById('in1');
      inp.setSelectionRange(1, 1);
    }
  ];

  let current_pass = 0;
  function go() {
    go_passes[current_pass++].call();
    return current_pass < go_passes.length;
  }
</script>
</body>
</html>
