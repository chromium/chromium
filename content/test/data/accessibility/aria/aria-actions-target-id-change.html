<!--
@BLINK-ALLOW:actions*
@BLINK-ALLOW:hasActions*
@EXECUTE-AND-WAIT-FOR:switchReference()
@EXECUTE-AND-WAIT-FOR:removeReference()
@EXECUTE-AND-WAIT-FOR:restoreReference()
-->
<!DOCTYPE html>
<html>
  <body>
    <main aria-actions="id1"></main>
    <!-- Different native roles distinguish targets in the expectations
         file. Both are native interactive elements so they satisfy the
         click-handler Author MUST. -->
    <button id="id1">Target A</button>
    <a href="#" id="id2">Target B</a>
    <script>
      function switchReference() {
        // Switch the IDs around. Now the relation points to the link.
        document.querySelector("button").id = "id2";
        document.querySelector("a").id = "id1";
        document.title = "switch-reference";
        return "switch-reference";
      }

      function removeReference() {
        // Remove the id on the relation target. Now the relation is empty.
        document.querySelector("a").removeAttribute('id');
        document.title = "remove-reference";
        return "remove-reference";
      }

      function restoreReference() {
        // Restore the original relation pointing to the button.
        document.querySelector("button").id = "id1";
        document.title = "restore-reference";
        return "restore-reference";
      }
    </script>
  </body>
</html>
