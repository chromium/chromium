<!--
@SCRIPT:
  //
  // Test: Replaces text in a contenteditable element with individual replacement strings.
  //
  // Note the order of the ranges is reversed, which is required for non-selection operations, like replace.
  //
  ce1.accessibilityParameterizedAttributeNames.has(AXTextOperation)
  ce1.AXValue
  range_1:= span1.AXTextMarkerRangeForUIElement(span1)
  range_2:= span2.AXTextMarkerRangeForUIElement(span2)
  ce1.accessibilityAttributeValue(AXTextOperation, {AXTextOperationType: TextOperationReplacePreserveCase, AXTextOperationMarkerRanges: [range_2, range_1], AXTextOperationIndividualReplacementStrings: [Sleeping, HOPS]})
  wait for AXSelectedTextChanged on AXTextArea
  ce1.AXSelectedTextMarkerRange
  ce1.AXValue

@SCRIPT:
  //
  // Test: Replaces text in a contenteditable element with a single replacement string.
  //
  // Note the order of the ranges is reversed, which is required for non-selection operations, like replace.
  //
  ce2.accessibilityParameterizedAttributeNames.has(AXTextOperation)
  ce2.AXValue
  range_1:= span1.AXTextMarkerRangeForUIElement(span3)
  range_2:= span2.AXTextMarkerRangeForUIElement(span4)
  ce2.accessibilityAttributeValue(AXTextOperation, {AXTextOperationType: TextOperationReplacePreserveCase, AXTextOperationMarkerRanges: [range_2, range_1], AXTextOperationReplacementString: replaced})
  wait for AXSelectedTextChanged on AXTextArea
  ce2.AXSelectedTextMarkerRange
  ce2.AXValue

@SCRIPT:
  //
  // Test: Replaces text in a textarea.
  //
  textarea.accessibilityParameterizedAttributeNames.has(AXTextOperation)
  textarea.AXValue
  start:= textarea.AXTextMarkerRangeForUIElement(textarea).anchor
  end:= textarea.AXNextWordEndTextMarkerForTextMarker(start)
  range:= textarea.AXTextMarkerRangeForUnorderedTextMarkers([start, end])
  textarea.accessibilityAttributeValue(AXTextOperation, {AXTextOperationType: TextOperationReplacePreserveCase, AXTextOperationMarkerRanges: [range], AXTextOperationReplacementString: Hey})
  wait for AXSelectedTextChanged on AXTextArea
  textarea.AXSelectedTextMarkerRange
  textarea.AXValue

@SCRIPT:
  //
  // Test: Replaces text in an input field.
  //
  input.accessibilityParameterizedAttributeNames.has(AXTextOperation)
  input.AXValue
  end:= input.AXTextMarkerRangeForUIElement(input).focus
  start:= input.AXPreviousWordStartTextMarkerForTextMarker(end)
  range:= input.AXTextMarkerRangeForUnorderedTextMarkers([start, end])
  input.accessibilityAttributeValue(AXTextOperation, {AXTextOperationType: TextOperationReplacePreserveCase, AXTextOperationMarkerRanges: [range], AXTextOperationIndividualReplacementStrings: [GHI]})
  wait for AXSelectedTextChanged on AXTextField
  input.AXSelectedTextMarkerRange
  input.AXValue
-->
<!DOCTYPE html>
<html>
<body>
  <div id="ce1" contenteditable="true">
    <p>The quick brown fox <span id="span1">jumps</span> over the <span id="span2">lazy</span> dog</p>
  </div>
  <div id="ce2" contenteditable="true">
    <p><span id="span3">The</span> quick brown <span id="span4">fox</span> jumps over the lazy dog</p>
  </div>
  <textarea id="textarea">Hello, World!</textarea>
  <input id="input" type="text" value="abc def">
</body>
</html>
