<!--
<!--
@SCRIPT:
  div.accessibilityAttributeValue(AXCustomContent)
  div.accessibilityAttributeValue(AXHelp)
  div_with_tooltip.accessibilityAttributeValue(AXCustomContent)
  div_with_tooltip.accessibilityAttributeValue(AXHelp)
-->
<!--
Note, this test will only run when MAC_OS_X_VERSION_MIN_REQUIRED is greater than 11, and the purpose of the test is to show that AXHelp DOES NOT surface the aria-description string after MacOS version 11 (instead, it can be found in AXCustomContent)
-->
<!DOCTYPE html>
<html>
<body>
  <div id="div" aria-label="description" aria-description="Text-description" ></div>
  <div id="div_with_tooltip" aria-label="both" aria-description="describedby overrides description" aria-describedby="desc1" ></div>
  <div role="tooltip" id="desc1">Description from describedby</div>
</body>
</html>
