<!DOCTYPE html>
<html>

<head>
  <title>WebGPU caching test</title>
  <style type="text/css">
    .nomargin {
      margin: 0px auto;
    }
  </style>

  <script type="module">
    import { webGpuUnitTests } from './webgpu-unittest-utils.js';

    async function main() {
        const parsedString = new URLSearchParams(window.location.search);

        // Get the test parameters.
        const testId = parsedString.get('testId');
        const worker_string = parsedString.get('worker');
        const use_worker = (worker_string != null) ? worker_string == 'true' : false;

        if (!use_worker) {
            const result = await webGpuUnitTests.runTest(testId);
            domAutomationController.send(result);
        } else {
            const worker = new Worker('./webgpu-unittest-worker.js', { type: 'module' });
            const result = new Promise(
                resolve => {
                    worker.addEventListener('message',
                                            e => {
                                                resolve(e.data.result);
                                            },
                                            { once: true })
                }
            );
            worker.postMessage({ testId });
            domAutomationController.send(await result);
        }
    }

    await main();
  </script>
</head>

<body>
</body>

</html>
