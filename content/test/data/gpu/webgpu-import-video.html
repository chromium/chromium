<html>
  <body>
    <canvas id="canvas" width=960 height=540></canvas>
    <script type="module">
        const video = document.createElement('video');
        video.src = './vc/kitty2_960x540_24fps.mp4';
        video.loop = true;
        video.muted = true;

        const adapter = navigator.gpu && await navigator.gpu.requestAdapter();
        const device = await adapter.requestDevice();

        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('gpupresent');

        const swapChainFormat = 'bgra8unorm';
        const swapChain = context.configureSwapChain({
          device,
          format: swapChainFormat,
        });

        const pipeline = device.createRenderPipeline({
          vertexStage: {
            module: device.createShaderModule({
              code: `
[[builtin(vertex_index)]] var<in> VertexIndex : u32;

[[location(0)]] var<out> fragUV : vec2<f32>;
[[builtin(position)]] var<out> Position : vec4<f32>;

[[stage(vertex)]]
fn main() -> void {
  const pos : array<vec3<f32>, 6> = array<vec3<f32>, 6>(
    vec3<f32>( 1.0,  1.0, 0.0),
    vec3<f32>( 1.0, -1.0, 0.0),
    vec3<f32>(-1.0, -1.0, 0.0),
    vec3<f32>( 1.0,  1.0, 0.0),
    vec3<f32>(-1.0, -1.0, 0.0),
    vec3<f32>(-1.0,  1.0, 0.0)
  );
  const uv : array<vec2<f32>, 6> = array<vec2<f32>, 6>(
    vec2<f32>(1.0, 0.0),
    vec2<f32>(1.0, 1.0),
    vec2<f32>(0.0, 1.0),
    vec2<f32>(1.0, 0.0),
    vec2<f32>(0.0, 1.0),
    vec2<f32>(0.0, 0.0)
  );
  Position = vec4<f32>(pos[VertexIndex], 1.0);
  fragUV = uv[VertexIndex];
  return;
}
`,
            }),
            entryPoint: 'main',
          },
          fragmentStage: {
            module: device.createShaderModule({
              code: `
[[binding(0), group(0)]] var<uniform_constant> mySampler: sampler;
[[binding(1), group(0)]] var<uniform_constant> myTexture: texture_2d<f32>;

[[location(0)]] var<in> fragUV : vec2<f32>;
[[location(0)]] var<out> outColor : vec4<f32>;

[[stage(fragment)]]
fn main() -> void {
  outColor = textureSample(myTexture, mySampler, fragUV);
  return;
}
`,
            }),
            entryPoint: 'main',
          },
          primitiveTopology: 'triangle-list',
          colorStates: [
            {
              format: swapChainFormat,
            },
          ],
        });

        const linearSampler = device.createSampler({
          magFilter: 'linear',
          minFilter: 'linear',
        });

        const renderPassDescriptor = {
          colorAttachments: [
            {
              attachment: undefined, // Assigned later
              loadValue: { r: 0.0, g: 0.0, b: 0.0, a: 1.0 },
            },
          ],
        };

        function frame() {
          renderPassDescriptor.colorAttachments[0].attachment = swapChain
            .getCurrentTexture()
            .createView();

          const videoTexture = device.experimentalImportTexture(
            video, GPUTextureUsage.SAMPLED);

          const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [
              {
                binding: 0,
                resource: linearSampler,
              },
              {
                binding: 1,
                resource: videoTexture.createView(),
              },
            ],
          });

          const commandEncoder = device.createCommandEncoder();
          const passEncoder = commandEncoder.beginRenderPass(renderPassDescriptor);
          passEncoder.setPipeline(pipeline);
          passEncoder.setBindGroup(0, bindGroup);
          passEncoder.draw(6);
          passEncoder.endPass();
          device.queue.submit([commandEncoder.finish()]);

          // Destroy the texture after submit to promptly recycle resources.
          videoTexture.destroy();

          requestAnimationFrame(frame);
        }

        await video.play();
        requestAnimationFrame(frame);
    </script>
  </body>
</html>
