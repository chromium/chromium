<!DOCTYPE html>
<html>

<head>
  <title>Encode, decode, render test</title>
  <script src="webcodecs_common.js"></script>
  <script type="text/javascript">
    'use strict';
    const acceleration = "require";
    async function main(arg) {
      let cnv = document.getElementById("display");
      let ctx = cnv.getContext("2d");
      let frames_to_encode = 35;
      let frames_encoded = 0;
      let frames_decoded = 0;
      let errors = 0;

      const encoder_config =
      {
        codec: arg.codec,
        hardwareAcceleration: acceleration,
        width: cnv.width,
        height: cnv.height,
        bitrate: 5000000,
        framerate: 24
      };
      if (arg.codec.startsWith('avc1')) {
        encoder_config.avc = { format: "annexb" };
      }

      let support = await VideoEncoder.isConfigSupported(encoder_config);
      if (!support.supported) {
        TEST.log("Skipping unsupported codec: " + arg.codec);
        return;
      }

      let decoder = new VideoDecoder({
        output(frame) {
          frames_decoded++;
          ctx.drawImage(frame, 0, 0);
          frame.close();
        },
        error(e) {
          errors++;
          TEST.log(e);
        }
      });

      const encoder_init = {
        output(chunk, metadata) {
          let config = metadata.decoderConfig;
          if (config) {
            // Here we assume that if accelerated encoding is supported,
            // accelerated decoding should be supported too.
            config.hardwareAcceleration = acceleration;
            decoder.configure(config);
          }
          decoder.decode(chunk);
          frames_encoded++;
        },
        error(e) {
          errors++;
          TEST.log(e);
        }
      };

      let encoder = new VideoEncoder(encoder_init);
      encoder.configure(encoder_config);

      for (let i = 0; i < frames_to_encode; i++) {
        let frame = await createFrame(cnv.width, cnv.height, i * 100);
        let keyframe = (i % 10 == 0);
        encoder.encode(frame, { keyFrame: keyframe });
        frame.close();

        await delay(1);
      }
      await encoder.flush();
      await decoder.flush();
      encoder.close();
      decoder.close();

      TEST.assert(frames_encoded == frames_to_encode,
        "frames_encoded mismatch: " + frames_encoded);
      TEST.assert(frames_decoded == frames_to_encode,
        "frames_decoded mismatch: " + frames_decoded);
      TEST.assert(errors == 0,
        "Decoding or encoding errors occurred during the test");
    }
  </script>
</head>

<body>
  <canvas id='display' width="640" height="480"></canvas>
</body>

</html>
