<!DOCTYPE html>
<html>
<head>
<script>

const channel = new BroadcastChannel('test-channel');
const onMessagePromise = new Promise((resolve) => {
      channel.addEventListener('message', resolve, {once: true});
    });
window.addEventListener('unload', () => {
  channel.close();
});

const prerenderUrl = new URL(document.URL);
prerenderUrl.searchParams.set('prerendering', '');

function getSessionStorageKeys() {
  let keys = [];
  let txt = '';
  for (let i = 0; i < sessionStorage.length; ++i) {
    keys.push(sessionStorage.key(i));
  }
  keys.sort();
  keys.forEach((key) => {
    if (txt.length) {
      txt += ', ';
    }
    txt += key;
  });
  return txt;
}

function startPrerender() {
  const link = document.createElement('link');
  link.rel = 'prerender';
  link.href = prerenderUrl;
  document.head.appendChild(link);
}

function activatePrerenderedPage() {
  onMessagePromise.then(() => {
    window.location = prerenderUrl.toString();
  });
}

(() => {
  const params = new URLSearchParams(location.search);
  const isPrerendering = params.has('prerendering');
  if (!isPrerendering) {
    sessionStorage.setItem('initial', '1');
    return;
  }
  sessionStorage.setItem('prerendering', '1');
  window.addEventListener(
      'load',
      () => { channel.postMessage('loaded'); });
  window.sessionKeysInPrerenderchange = new Promise((resolve) => {
    document.addEventListener('prerenderingchange', () => {
      resolve(getSessionStorageKeys());
      sessionStorage.setItem('activated', '1');
    });
  });
})();
</script>
</head>
<body></body>
</html>
