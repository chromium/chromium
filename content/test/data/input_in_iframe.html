<!DOCTYPE html>
<html>
<head>
  <style>
    body, html, iframe {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    iframe {
      border: 0;
    }

    #space {
      width: 200px;
      height: 200px;
    }

  </style>
  <script>
    loaded = false;
    function notifyWhenLoaded() {
      if (loaded)
        window.domAutomationController.send("LOADED");
      else
        window.notifyBrowser = true;
    }

  </script>
</head>
<body>
  <div id="space"></div>
  <iframe src="input_box.html" onload="loaded = true; if(window.notifyBrowser) {notifyWhenLoaded();}">
</body>
</html>
