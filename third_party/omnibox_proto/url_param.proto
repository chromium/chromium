syntax = 'proto3';

option optimize_for = LITE_RUNTIME;
option java_package = 'org.chromium.components.omnibox';
option java_outer_classname = 'UrlParamProto';

package omnibox;

// A single URL parameter key-value pair.
message UrlParam {
  string param_key = 1;
  string param_value = 2;
}
