syntax = 'proto3';

option optimize_for = LITE_RUNTIME;
option java_package = 'org.chromium.components.omnibox';
option java_outer_classname = 'InputTypeConfigProto';

package omnibox;

import "icon.proto";
import "input_type.proto";
import "input_type_rule.proto";

// Configuration for an input type.
// Next ID: 5
// LINT.IfChange(InputTypeConfig)
message InputTypeConfig {
  // The input type.
  optional InputType input_type = 1;
  // The label for the input type in a menu.
  optional string menu_label = 2;
  // The constraint rule for the input type.
  optional InputTypeRule rule = 3;
  // The icon for the input type.
  optional Icon icon = 4;
}
// LINT.ThenChange(//components/omnibox/composebox/composebox_query.mojom:InputTypeConfig)
