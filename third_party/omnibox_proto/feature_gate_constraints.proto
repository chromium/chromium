syntax = 'proto3';

option optimize_for = LITE_RUNTIME;
option java_package = 'org.chromium.components.omnibox';
option java_outer_classname = 'FeatureGateConstraintsProto';

package omnibox;

import "model_mode.proto";
import "tool_mode.proto";

// DO NOT USE in Chrome.
// Feature gating config
message FeatureGateConfig {
  // Triggers Seaport promo.
  int32 placement_id = 1;

  // Not implemented yet.
  // Triggers before the primitive is selected.
  oneof target_selection {
    ModelMode model = 2;
    ToolMode tool = 3;
  }

  // --- Constraints ---
  // Not implemented yet.
  //
  // These fields define the context in which the feature gate is evaluated.
  // If a field is set, the gate only applies if the current state matches the
  // value of that field.
  // If a field is not set, the gate applies regardless of the current state.

  // Constraint on the currently active model.
  ModelMode current_model = 4;
  // Constraint on the currently active tool.
  ToolMode current_tool = 5;
}
