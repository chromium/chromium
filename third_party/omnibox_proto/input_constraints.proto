syntax = 'proto3';

option optimize_for = LITE_RUNTIME;
option java_package = 'org.chromium.components.omnibox';
option java_outer_classname = 'InputConstraintsProto';

package omnibox;

import "rule_set.proto";

message InputConstraints {
  optional RuleSet first_turn_ruleset = 1;
  optional RuleSet followup_turn_ruleset = 2;
}
