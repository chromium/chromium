syntax = 'proto3';

option optimize_for = LITE_RUNTIME;
option java_package = 'org.chromium.components.omnibox';
option java_outer_classname = 'ToolRuleProto';

package omnibox;

import "input_type.proto";
import "model_mode.proto";
import "tool_mode.proto";

message ToolRule {
  optional ToolMode tool = 1;
  repeated InputType allowed_input_types = 2;
  optional bool allow_all_input_types = 3;
  repeated ModelMode allowed_models = 4;
  optional bool allow_all_models = 5;
}
