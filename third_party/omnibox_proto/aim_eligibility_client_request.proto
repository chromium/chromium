syntax = 'proto3';

option optimize_for = LITE_RUNTIME;
option java_package = 'org.chromium.components.omnibox';
option java_outer_classname = 'AimEligibilityClientRequestProto';

package omnibox;

message AimEligibilityClientRequest {
  // The client's locale in IETF BCP 47 language tag format.
  string client_locale = 1;
}
