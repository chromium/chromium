syntax = 'proto3';

option optimize_for = LITE_RUNTIME;
option java_package = 'org.chromium.components.omnibox';
option java_outer_classname = 'InputTypeRuleProto';

package omnibox;

import "input_type.proto";
import "model_mode.proto";
import "tool_mode.proto";

message InputTypeRule {
  optional InputType input_type = 1;
  optional int32 max_instance = 2;
  repeated InputType allowed_input_types = 3;
  optional bool allow_all_input_types = 4;
  repeated ToolMode allowed_tools = 5;
  optional bool allow_all_tools = 6;
  repeated ModelMode allowed_models = 7;
  optional bool allow_all_models = 8;
}
