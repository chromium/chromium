syntax = 'proto3';

option optimize_for = LITE_RUNTIME;
option java_package = 'org.chromium.components.omnibox';
option java_outer_classname = 'SuggestInventoryProto';

package omnibox;

// SuggestInventory to use for a request.
// In the AIM Composebox, the inventory of suggestions can change based on the
// entry point of the request. This enum is used to specify the inventory of
// suggestions to be used for a given request.
// Next ID: 2
enum SuggestInventory {
  SUGGEST_INVENTORY_DEFAULT = 0;
  SUGGEST_INVENTORY_TRAVEL = 1;
}
