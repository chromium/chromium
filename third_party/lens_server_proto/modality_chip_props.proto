edition = "2024";

option optimize_for = LITE_RUNTIME;

package lens;

import "added_inputs.proto";

message ModalityChipProps {
  // Displayed text on the modality chip.
  string title = 1;

  // Thumbnail of the chip.
  oneof thumbnail {
    // Thumbnail - can be a data URL or URI.
    string thumbnail_src = 2;

    // Thumbnail - in a bitmap format.
    bytes thumbnail_bitmap = 13;

    // Icon identifier for the chip.
    IconType icon_id = 16;
  }

  // True if this modality chip can be submitted without additional user input.
  // For example, entity modalities can be searched with just their title.
  bool is_unimodal = 4;
  AddedInput added_input = 10;

  // Optional consumer-provided ID used for de-duplication.
  string id = 11;

  reserved 3, 5 to 9, 12;
}

// Next ID: 157
enum IconType {
  ICON_TYPE_UNSPECIFIED = 0;
  ICON_TYPE_ADD = 9;
  ICON_TYPE_CHECK = 30;
  ICON_TYPE_FORMAT_QUOTE_FILLED = 79;
  ICON_TYPE_IMAGE = 84;
  ICON_TYPE_DRIVE_PDF = 101;

  // Reserved values are icon types that have been defined on the server but
  // have not yet been added to Chrome. Unreserve when adding a new icon type.
  reserved 1 to 8, 10 to 29, 31 to 78, 80 to 83, 85 to 100, 102 to 156;
}
