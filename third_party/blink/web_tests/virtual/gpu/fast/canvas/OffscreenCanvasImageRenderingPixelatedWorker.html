<!DOCTYPE html>
<title>Test if the users can change Image Rendering Quality in Offscreen Canvas</title>
<style type="text/css">
  #can {
    width: 500px;
    height: 500px;
    image-rendering: auto;
  }
</style>

<canvas id="can" width="1" height="1"></canvas>

<script id="myWorker" type="text/worker">
  self.onmessage = function(msg) {
    const canvas = msg.data;
    canvas.width = 50;
    canvas.height = 50;
    const ctx = canvas.getContext('2d');
    ctx.fillRect(10, 10, 30, 30);
  }
</script>

<script type="module">
  const canvas = document.getElementById('can');
  const offscreen = canvas.transferControlToOffscreen();

  const blob = new Blob([document.getElementById('myWorker').textContent]);
  const worker = new Worker(URL.createObjectURL(blob));
  canvas.style.imageRendering = 'pixelated';
  worker.postMessage(offscreen, [offscreen]);

  async function waitForCanvasToDraw(canvas) {
    while (canvas.width != 50) {
      await new Promise(resolve => requestAnimationFrame(resolve));
    }
    await new Promise(resolve => requestAnimationFrame(resolve));
  }

  if (window.testRunner) {
    testRunner.waitUntilDone();
  }

  await waitForCanvasToDraw(canvas);

  if (window.testRunner) {
    testRunner.notifyDone();
  }
</script>
