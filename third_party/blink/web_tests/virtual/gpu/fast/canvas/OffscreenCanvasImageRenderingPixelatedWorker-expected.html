<!doctype html>
<style type="text/css">
  #can {
    width: 500px;
    height: 500px;
    image-rendering: pixelated;
  }
</style>

<canvas id="can" width="50" height="50"></canvas>

<script>
  const outputCanvas = document.getElementById('can');
  const outputContext = outputCanvas.getContext('2d');
  outputContext.fillRect(10, 10, 30, 30);
</script>
