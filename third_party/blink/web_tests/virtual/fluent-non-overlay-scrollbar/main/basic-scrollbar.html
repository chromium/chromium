<!doctype html>
<!-- The basic appearance of non-composited Fluent non-overlay scrollbar.
     Verifying regular and left side scrollbars. -->
<meta charset="utf-8">
<style>
  body {
    background-color: green;
  }

  .scrollable {
    height: 200px;
    overflow: scroll;
    width: 200px;
  }

  .rtl {
    direction: rtl;
    margin-block-start: 10px;
  }

  .content {
    background-color: lightgreen;
    height: 300px;
    width: 400px;
  }

  .transparent {
    height: 100px;
  }
</style>
<div class="scrollable">
  <div class="content"></div>
  <div class="transparent"></div>
</div>
<div class="scrollable rtl">
  <div class="content"></div>
  <div class="transparent"></div>
</div>
