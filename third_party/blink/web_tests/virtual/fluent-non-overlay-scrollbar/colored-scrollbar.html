<!DOCTYPE html>
<!-- The basic appearance of composited Fluent non-overlay scrollbar when using
     the css scrollbar-color property. -->
<style>
  #colored {
    scrollbar-color: blue yellow;
    width: 200px;
    height: 200px;
    overflow: scroll;
  }
  #content {
    background-color: lightgreen;
    height: 400px;
    width: 400px;
  }
</style>
<div id="colored">
  <div id="content"></div>
</div>
