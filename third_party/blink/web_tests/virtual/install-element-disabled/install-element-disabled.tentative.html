<!DOCTYPE html>
<meta charset=utf-8>
<title>Install Element: Disabled</title>
<script src="../../resources/testharness.js"></script>
<script src="../../resources/testharnessreport.js"></script>
<body>
<install id="install"></install>
<script>
  test(() => {
    // Element in DOM.
    let element = document.getElementById('install');
    assert_true(element instanceof HTMLUnknownElement, 'install should be an HTMLUnknownElement when disabled');
    assert_equals(element.constructor.name, "HTMLUnknownElement", "Constructor name should be HTMLUnknownElement");
    assert_equals(element.isValid, undefined, 'isValid property should not exist');
    assert_equals(element.type, undefined, 'type property should not exist');

    // Created element.
    element = document.createElement('install');
    assert_true(element instanceof HTMLUnknownElement, 'install should be an HTMLUnknownElement when disabled');
    assert_equals(element.constructor.name, "HTMLUnknownElement", "Constructor name should be HTMLUnknownElement");
    assert_equals(element.isValid, undefined, 'isValid property should not exist');
    assert_equals(element.type, undefined, 'type property should not exist');
  }, "Test HTMLInstallElement is HTMLUnknownElement when feature is disabled");
</script>
</body>
</html>
