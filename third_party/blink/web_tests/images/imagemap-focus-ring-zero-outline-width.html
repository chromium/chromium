<html>
<head>
<style>
area:focus { 
    outline-color: red;
    outline-style: none;
    /* Note: this used to test outline-width: 0px, but outline-width:
     * 0px isn't supposed to do anything when outline-style is auto */
}
</style>
<script>
window.onload = function()
{
    document.getElementById("area").focus();
}
</script>
</head>
<body>
<p>Assuming the port-specific theme draws focus rings, this test can be used to ensure that a focus ring is not drawn for an &lt;area&gt; with a 0px outline-width. This test PASSED if no red focus ring is drawn around the &lt;area&gt; in the imagemap (below).</p>
<map name="imagemap">
    <area id="area" shape="rect" coords="0,0,128,128" href="#dummy"/>
</map>
<img src="../fast/events/resources/abe.png" width="128" height="128" usemap="#imagemap" />
</body>
</head>
</html>
