// This test runs with the WebMCP base::Feature force-disabled, but with a page
// trying to enable the Origin Trial with a valid token. We assert that
// `modelContext` is not exposed in this circumstance, so that the page cannot
// try and reach the browser process, which would terminate the renderer.
test(t => {
  assert_false("modelContext" in navigator, "navigator.modelContext should NOT be exposed when the kill-switch is active, even with a valid Origin Trial token!");
}, "navigator.modelContext is not exposed when WebMCP is kill-switched");
