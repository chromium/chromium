<!DOCTYPE html>
<title>Crash: Unexpected tokens inside url-pattern()</title>
<link rel="help" href="https://drafts.csswg.org/css-navigation-1/#at-route">
<link rel="help" href="https://issues.chromium.org/issues/485056787">
<style>
  @route --ruth { pattern: url-pattern(); }
  @route --ruth { pattern: url-pattern(0); }
  @route --ruth { pattern: url-pattern( 0 ); }
  @route --ruth { pattern: url-pattern("", 0); }
  @route --ruth { pattern: url-pattern(,); }
  @route --ruth { pattern: url-pattern(!!); }
</style>
