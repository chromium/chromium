/**
 * Tests that canvas 2d context can be lost by setting an invalid canvas size
 * and can be restored by later setting a valid size.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas, {desynchronized});

  let contextLostEventInvoked = false;
  let contextRestoredEventInvoked = false;
  let contextLost = new Promise(resolve => {
    canvas.oncontextlost = () => {
      contextLostEventInvoked = true;
      resolve();
    }
  });
  let contextRestored = new Promise(resolve => {
    canvas.oncontextrestored = () => {
      contextRestoredEventInvoked = true;
      resolve();
    }
  });

  // Make sure the canvas is fully initialized.
  drawAndReadBack(ctx);

  // Setting an invalid size discard the resource provider, but the context loss
  // is only detected when we try to recreate it the first time it's used after.
  assert_false(ctx.isContextLost(),
               `Canvas shouldn't be lost before setting invalid size.`);
  canvas.width = 100000000;
  assert_false(ctx.isContextLost(),
               `Context shouldn't be detected until the canvas is used.`);

  // Use the canvas so it tries (and fails) to allocate a surface.
  assert_array_equals(drawAndReadBack(ctx), [0, 0, 0, 0],
      'Canvas should stay blank after setting an invalid size.');
  assert_true(ctx.isContextLost(),
              'Context lost should be detected when the canvas is used.');

  // The oncontextlost event is called in next task.
  assert_false(contextLostEventInvoked,
               `oncontextlost shouldn't be invoked in the same task.`);
  await contextLost;
  assert_true(contextLostEventInvoked,
              'oncontextlost should be invoked in the next task.');

  // Setting a valid context size queues a restore in a new task.
  assert_true(ctx.isContextLost(),
              `Context shouldn't be restored before setting a valid size.`);
  canvas.width = 200;
  assert_true(ctx.isContextLost(),
              'Contest should only be restored after oncontextrestored.');

  // The oncontextrestored event is called in next task.
  assert_false(contextRestoredEventInvoked,
               `oncontextrestored shouldn't be invoked in the same task.`);
  await contextRestored;
  assert_true(contextRestoredEventInvoked,
              'oncontextrestored should be invoked in the next task.');

  ctx.fillStyle = 'lime';
  ctx.fillRect(0, 0, 100, 100);
  assert_array_equals(
      ctx.getImageData(1, 1, 1, 1).data, [0, 255, 0, 255],
      `The canvas should be usable after it's restored.`);

}, 'Test losing and restoring a 2D context by setting an invalid canvas size.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Validates that after losing the context due to an invalid canvas size,
 * context restoration can be disabled by using preventDefault() in
 * oncontextlost callback.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas, {desynchronized});

  // `oncontextlost` blocks restoration by using `preventDefault`.
  let contextLost = new Promise(resolve => {
    canvas.oncontextlost = (event) => {
      event.preventDefault();
      resolve();
    }
  });
  // `oncontextrestored` should never be called.
  canvas.oncontextrestored = () => {
    assert_unreached('The context should not have been restored.');
  }

  // Make sure the canvas is fully initialized.
  drawAndReadBack(ctx);

  // Set invalid size and use the canvas so it tries (and fails) to allocate a
  // surface, triggering the context lost logic.
  canvas.width = 100000000;
  drawAndReadBack(ctx);
  assert_true(ctx.isContextLost(),
              'Context lost is detected when the canvas is used.');

  // Wait for context to be lost and fix the canvas size in a new task (i.e. not
  // in the oncontextlost task).
  await contextLost;
  await new Promise(resolve => requestAnimationFrame(resolve));
  canvas.width = 200;

  // Wait a few frames to make sure the canvas isn't restored.
  for (let i = 0; i < 5; ++i) {
    await new Promise(restore => requestAnimationFrame(restore));
  }
}, 'Invalid size context loss restoration can be cancelled.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Check that the canvas is unusable while the context is lost.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas, {desynchronized});

  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
      'Canvas should start in an healthy, usable state.');

  canvas.width = 100000000;
  assert_array_equals(drawAndReadBack(ctx), [0, 0, 0, 0],
      'Canvas should become unusable after setting an invalid size.');

  canvas.width = 64;
  assert_array_equals(drawAndReadBack(ctx), [0, 0, 0, 0],
      'Canvas should be unusable before the contextlost event fires.');

  await waitForContextLost(ctx);
  assert_array_equals(drawAndReadBack(ctx), [0, 0, 0, 0],
      'Canvas should be unusable before the contextrestored event fires.');

  await waitForContextRestored(ctx);
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
      'Canvas should be usable after the contextrestored event is fired.');
}, 'The canvas should remain unusable until contextrestored fires.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Give an invalid size to an initialized canvas.

canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas, {desynchronized});

  // Use the canvas do that it allocates a backing bitmap.
  drawAndReadBack(ctx);

  // Set an invalid size after resources are allocated.
  canvas.width = 100000000;
  assert_false(ctx.isContextLost(),
              'Context should not be lost right after setting the size.');

  // Using the canvas now loses the context.
  ctx.fillRect(0, 0, 100, 100);
  await waitForContextLost(ctx);

  // The context won't restore until we give it a valid size.
  await waitFramesAndRejectOnContextEvents(ctx);
  canvas.width = 64;
  await waitForContextRestored(ctx);

   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Give an invalid size to a canvas and use it in the same task.
 */
canvasPromiseTest(async (canvas, {canvasType} = {}) => {
  const ctx = get2dContext(canvas, {desynchronized});

  canvas.width = 100000000;
  ctx.fillRect(0, 0, 100, 100);

  // TODO: crbug.com/348445884 - `HTMLCanvasElement` and `OffscreenCanvas`
  // behave differently. This test is merely testing existing behavior, but this
  // should be fixed such that the two classes behave the same way.
  if (HTML_CANVAS_ELEMENT_TEST_TYPES.includes(canvasType)) {
    // `HTMLCanvasElement` lost the context in `fillRect`.
    assert_true(ctx.isContextLost(),
                'Context should be lost immediately after a failed draw.');
  } else {
    // For `OffscreenCanvas`, the `fillRect` above aborted, but the context
    // wasn't lost. The context will only become lost when the task terminates.
    assert_false(ctx.isContextLost(),
                'Context should be lost only when flushing the canvas.');
  }

  await waitForContextLost(ctx);
}, 'Bad size -> fillRect -> context lost.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

  assert_false(ctx.isContextLost(),
               'Context should not be lost after restoring the size.');

  assert_false(ctx.isContextLost(),
               'Context should not be lost after rAF.');
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
                      'The canvas draw should have worked');
}, 'Bad size -> valid size -> fillRect.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Restore the canvas size before contextlost fires and make the size invalid
 * again from inside the contextlost event handler.
 **/
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas, {desynchronized});

  // Set an invalid size and get the canvas to lose the context.
  canvas.width = 100000000;
  drawAndReadBack(ctx);
  assert_true(ctx.isContextLost(), 'Context should be lost.');

  // The context is lost, but the contextlost event has not yet fired. Restore
  // the canvas size before contextlost executes.
  canvas.width = 64;

  // Wait to be inside the contextlost event handler.
  await waitForContextLost(ctx);

  // We are now inside the contextlost event handler and the contextrestored
  // event has not yet been scheduled. Set an invalid size before it is.
  canvas.width = 100000000;
  await waitFramesAndRejectOnContextEvents(ctx);

  // We should now be able to set a valid size and restore the canvas
  canvas.width = 64;
  await waitForContextRestored(ctx);
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
                      'The canvas should be usable.');
}, 'Bad size -> contextlost scheduled -> good size -> contextlost -> ' +
   'bad size.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Restore the canvas size before contextlost fires and make the size invalid
 * again after the contextlost event fired but before the contextrestored
 * event does.
 **/
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas, {desynchronized});

  // Set an invalid size and get the canvas to lose the context.
  canvas.width = 100000000;
  drawAndReadBack(ctx);
  assert_true(ctx.isContextLost(), 'Context should be lost.');

  // The context is lost, but the contextlost event has not yet fired. Restore
  // the canvas size before contextlost executes.
  canvas.width = 64;

  // Wait until after the contextlost event is fully processed.
  await waitForContextLost(ctx);
  // We are now inside the contextlost event handler. Wait until the task is
  // finished. A microtask is needed to make sure we regain control before the
  // contextrestored event fires.
  await new Promise(resolve => queueMicrotask(resolve));

  // A contextrestored event is now pending execution. Set an invalid size
  // before it runs.
  canvas.width = 100000000;
  await waitFramesAndRejectOnContextEvents(ctx);

  // We should now be able to set a valid size and restore the canvas
  canvas.width = 64;
  await waitForContextRestored(ctx);
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
                      'The canvas should be usable.');
}, 'Bad size -> contextlost scheduled -> good size -> contextlost -> ' +
   'contextrestored scheduled -> bad size.',
   {testTypes: ALL_CANVAS_TEST_TYPES});
