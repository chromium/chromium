<!doctype html>
<meta name="timeout" content="long">
<meta name="variant" content="?testType=html">
<meta name="variant" content="?testType=html&desynchronized">
<meta name="variant" content="?testType=detached_html">
<meta name="variant" content="?testType=offscreen">
<meta name="variant" content="?testType=offscreen&desynchronized">
<meta name="variant" content="?testType=placeholder">
<meta name="variant" content="?testType=worker">
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<script src="/html/canvas/resources/canvas-promise-test.js"></script>
<script>
runCanvasTestsInWorker();

var isDesynchronized = false;
(function parseVariants() {
  const params = new URLSearchParams(self.location.search);
  isDesynchronized = (params.get('desynchronized') !== null);
})();

function get2dContext(canvas) {
  return canvas.getContext('2d', {
    willReadFrequently: false,  // Stay on GPU acceleration despite read-backs.
    desynchronized: isDesynchronized
  });
};

function drawAndReadBack(ctx) {
  ctx.fillStyle = 'red';
  ctx.fillRect(0, 0, 100, 100);
  return ctx.getImageData(1, 1, 1, 1).data;
}

/**
 * Returns a promise that settles after `frameCount` animation frames.
 */
async function waitFrames(frameCount) {
  for (let i = 0; i < frameCount; ++i) {
    await Promise.race([
        new Promise(resolve => requestAnimationFrame(resolve)),
        // It's possible for `requestAnimationFrame` to never produce a frame
        // when killing the GPU process.
        promiseFinishBefore(
            2000, 'requestAnimationFrame did not produce a frame.'),
    ]);
  }
}

/**
 * Returns a promise that is rejected after `timeoutMs` milliseconds.
 * On timeout, the promise rejection will include the `errorMessage` text.
 */
function promiseFinishBefore(timeoutMs, errorMessage) {
  const { promise, reject } = Promise.withResolvers();
  setTimeout(() => reject(new Error(errorMessage)), timeoutMs);
  return promise;
}

/**
 * Returns a promise that resolves when the contextlost event of the canvas
 * associated with `ctx` fires.
 *
 * This function watches for contextlost events by registering an event
 * handler. That event handler is unregistered when `signal` aborts. This allows
 * racing between multiple events using `raceAndAbortOthers`.
 *
 * Of course, `promiseContextLost()` must be called before the contextlost event
 * fires. If the event already fired before calling this function, the promise
 * will never resolve. `promiseContextLost()` can still be called anytime before
 * the current task finishes though because events can't be called concurrently
 * to the current task:
 *
 *   somehowLoseTheContext();
 *   const controller = new AbortController();
 *   await promiseContextLost(controller.signal)
 *       .finally(() => controller.abort());
 *
 * If dealing with asynchronous logic however, the promise needs to be created
 * before the task that lost the context ends:
 *
 *   somehowLoseTheContext();
 *   const controller = new AbortController();
 *   const promise = promiseContextLost(ctx, controller.signal);
 *   await waitFrames(1);  // The contextlost event could fire here.
 *   await promise.finally(() => controller.abort());
 */
function promiseContextLost(ctx, signal) {
  const { promise, resolve } = Promise.withResolvers();
  ctx.canvas.addEventListener('contextlost', resolve, {signal});
  return promise;
}

/**
 * Returns a promise that resolves when the contextrestored event of the canvas
 * associated with `ctx` fires.
 *
 * Behaves similarly to `promiseContextLost`, see that function for more
 * details.
 */
function promiseContextRestored(ctx, signal) {
  const { promise, resolve } = Promise.withResolvers();
  ctx.canvas.addEventListener('contextrestored', resolve, {signal});
  return promise;
}

/**
 * Returns a promise that is rejected if the contextlost event of the canvas
 * associated with `ctx` fires.
 *
 * Behaves similarly to `promiseContextLost`, see that function for more
 * details.
 */
function promiseContextNotLost(ctx, signal) {
  const { promise, reject } = Promise.withResolvers();
  ctx.canvas.addEventListener(
      'contextlost',
      () => reject(new Error('Unexpected contextlost event.')),
      {signal});
  return promise;
}


/**
 * Returns a promise that is rejected if the contextrestored event of the canvas
 * associated with `ctx` fires.
 *
 * Behaves similarly to `promiseContextLost`, see that function for more
 * details.
 */
function promiseContextNotRestored(ctx, signal) {
  const { promise, reject } = Promise.withResolvers();
  ctx.canvas.addEventListener(
      'contextrestored',
      () => reject(new Error('Unexpected contextrestored event.')),
      {signal});
  return promise;
}

/**
 * Returns a promise that resolves or rejects when the first promise in
 * `promises` resolves or rejects. Once settled, this promise aborts
 * `controller` to clean up all passed `promises`.
 */
function raceAndAbortOthers(controller, promises) {
  return Promise.race(promises)
      .finally(() => controller.abort());
}

/**
 * Returns a promise that resolves when the canvas associated with `ctx` loses
 * it's context. The promise rejects if the contextrestored fires, or if
 * contextlost doesn't fire within `deadlineMs` milliseconds.
 *
 * Must be called before, or in the same task that loses the context or else the
 * promise will never resolve.
 */
async function waitForContextLost(ctx, deadlineMs=2000) {
  const controller = new AbortController();
  await raceAndAbortOthers(controller, [
    promiseFinishBefore(deadlineMs, 'Event contextlost should have fired.'),
    promiseContextLost(ctx, controller.signal),
    promiseContextNotRestored(ctx, controller.signal),
  ]);
  assert_true(ctx.isContextLost(), 'GPU context should be lost.');
}

/**
 * Returns a promise that resolves when the canvas associated with `ctx` has
 * it's context restored. The promise rejects if the contextlost fires, or if
 * contextrestored doesn't fire within `deadlineMs` milliseconds.
 *
 * Must be called before the context is restored or else the promise will never
 * resolve.
 */
async function waitForContextRestored(ctx, deadlineMs=2000) {
  const controller = new AbortController();
  await raceAndAbortOthers(controller, [
    promiseFinishBefore(deadlineMs, 'Event contextrestored should have fired.'),
    promiseContextNotLost(ctx, controller.signal),
    promiseContextRestored(ctx, controller.signal),
  ]);
  assert_false(ctx.isContextLost(), 'GPU context should be restored.');
}

/**
 * Returns a promise that is resolved when `promise` resolves, and is rejected
 * if the canvas associated with `ctx` gets either a contextlost or
 * contextrestored event.
 */
async function resolvedWithoutContextEvent(promise, ctx) {
  const controller = new AbortController();
  await raceAndAbortOthers(controller, [
    promise,
    promiseContextNotLost(ctx, controller.signal),
    promiseContextNotRestored(ctx, controller.signal),
  ]);
}

/**
 * Returns a promise that resolves after `frameCount` animation frames and
 * rejects if a contextlost or contextrestored event fires before then.
 */
async function waitFramesAndRejectOnContextEvents(ctx, frameCount=5) {
  return resolvedWithoutContextEvent(waitFrames(frameCount), ctx);
}

/**
 * Returns a promise that is resolved when the GPU process goes back online.
 * This must be called before the GPU process dies and awaited on after.
 */
function promiseGpuProcessRestored() {
  const probeCanvas = document.createElement('canvas');
  const probeCtx = get2dContext(probeCanvas);
  drawAndReadBack(probeCtx);
  const promise = Promise.race([
      promiseContextRestored(probeCtx),
      promiseFinishBefore(5000, 'GPU process should have been restored.'),
    ]);
  // Store a reference to the canvas in the promise, to make sure `probeCanvas`
  // isn't GCed before the test is done.
  promise.probeCanvas = probeCanvas;
  return promise;
}

/**
 * Terminates the GPU process and return a promise that resolves when the GPU
 * process is back online. A cleanup callback is registered into the provided
 * `test` fixture to make sure that the GPU process is restored before the test
 * completes.
 */
function terminateGpuProcess(test) {
  assert_true(!!window.chrome && !!chrome.gpuBenchmarking,
              'This test requires chrome.gpuBenchmarking.');
  const gpuRestoredPromise = promiseGpuProcessRestored();
  test.add_cleanup(() => gpuRestoredPromise);
  chrome.gpuBenchmarking.terminateGpuProcessNormally();
  return gpuRestoredPromise;
}

/**
 * Tests that canvas 2d context can be lost by setting an invalid canvas size
 * and can be restored by later setting a valid size.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  let contextLostEventInvoked = false;
  let contextRestoredEventInvoked = false;
  let contextLost = new Promise(resolve => {
    canvas.oncontextlost = () => {
      contextLostEventInvoked = true;
      resolve();
    }
  });
  let contextRestored = new Promise(resolve => {
    canvas.oncontextrestored = () => {
      contextRestoredEventInvoked = true;
      resolve();
    }
  });

  // Make sure the canvas is fully initialized.
  drawAndReadBack(ctx);

  // Setting an invalid size discard the resource provider, but the context loss
  // is only detected when we try to recreate it the first time it's used after.
  assert_false(ctx.isContextLost(),
               `Canvas shouldn't be lost before setting invalid size.`);
  canvas.width = 100000000;
  assert_false(ctx.isContextLost(),
               `Context shouldn't be detected until the canvas is used.`);

  // Use the canvas so it tries (and fails) to allocate a surface.
  assert_array_equals(drawAndReadBack(ctx), [0, 0, 0, 0],
      'Canvas should stay blank after setting an invalid size.');
  assert_true(ctx.isContextLost(),
              'Context lost should be detected when the canvas is used.');

  // The oncontextlost event is called in next task.
  assert_false(contextLostEventInvoked,
               `oncontextlost shouldn't be invoked in the same task.`);
  await contextLost;
  assert_true(contextLostEventInvoked,
              'oncontextlost should be invoked in the next task.');

  // Setting a valid context size queues a restore in a new task.
  assert_true(ctx.isContextLost(),
              `Context shouldn't be restored before setting a valid size.`);
  canvas.width = 200;
  assert_true(ctx.isContextLost(),
              'Contest should only be restored after oncontextrestored.');

  // The oncontextrestored event is called in next task.
  assert_false(contextRestoredEventInvoked,
               `oncontextrestored shouldn't be invoked in the same task.`);
  await contextRestored;
  assert_true(contextRestoredEventInvoked,
              'oncontextrestored should be invoked in the next task.');

  ctx.fillStyle = 'lime';
  ctx.fillRect(0, 0, 100, 100);
  assert_array_equals(
      ctx.getImageData(1, 1, 1, 1).data, [0, 255, 0, 255],
      `The canvas should be usable after it's restored.`);

}, 'Test losing and restoring a 2D context by setting an invalid canvas size.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Validates that after losing the context due to an invalid canvas size,
 * context restoration can be disabled by using preventDefault() in
 * oncontextlost callback.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  // `oncontextlost` blocks restoration by using `preventDefault`.
  let contextLost = new Promise(resolve => {
    canvas.oncontextlost = (event) => {
      event.preventDefault();
      resolve();
    }
  });
  // `oncontextrestored` should never be called.
  canvas.oncontextrestored = () => {
    assert_unreached('The context should not have been restored.');
  }

  // Make sure the canvas is fully initialized.
  drawAndReadBack(ctx);

  // Set invalid size and use the canvas so it tries (and fails) to allocate a
  // surface, triggering the context lost logic.
  canvas.width = 100000000;
  drawAndReadBack(ctx);
  assert_true(ctx.isContextLost(),
              'Context lost is detected when the canvas is used.');

  // Wait for context to be lost and fix the canvas size in a new task (i.e. not
  // in the oncontextlost task).
  await contextLost;
  await new Promise(resolve => requestAnimationFrame(resolve));
  canvas.width = 200;

  // Wait a few frames to make sure the canvas isn't restored.
  for (let i = 0; i < 5; ++i) {
    await new Promise(restore => requestAnimationFrame(restore));
  }
}, 'Invalid size context loss restoration can be cancelled.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Validates that after losing the context due to an invalid canvas size,
 * context restoration can be disabled by using preventDefault() in
 * oncontextlost callback, even if the size is corrected.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  // `oncontextlost` blocks restoration by using `preventDefault`.
  let contextLost = new Promise(resolve => {
    canvas.oncontextlost = (event) => {
      event.preventDefault();
      resolve();
    }
  });
  // `oncontextrestored` should never be called.
  canvas.oncontextrestored = () => {
    assert_unreached('The context should not have been restored.');
  }

  // Make sure the canvas is fully initialized.
  drawAndReadBack(ctx);

  // Set invalid size and use the canvas so it tries (and fails) to allocate a
  // surface, triggering the context lost logic.
  canvas.width = 100000000;
  drawAndReadBack(ctx);
  assert_true(ctx.isContextLost(),
              'Context lost is detected when the canvas is used.');

  // Wait for context to be lost and fix the canvas size in the oncontextlost
  // callback task.
  await contextLost;
  canvas.width = 200;

  // Wait a few frames to make sure the canvas isn't restored.
  for (let i = 0; i < 5; ++i) {
    await new Promise(restore => requestAnimationFrame(restore));
  }
}, 'Invalid size context loss restoration can be cancelled even if size is ' +
   'fixed in oncontextlost task.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Check that the canvas is unusable while the context is lost.
 */
canvasPromiseTest(async (canvas, {canvasType} = {}) => {
  const ctx = get2dContext(canvas);

  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
      'Canvas should start in an healthy, usable state.');

  canvas.width = 100000000;
  assert_array_equals(drawAndReadBack(ctx), [0, 0, 0, 0],
      'Canvas should become unusable after setting an invalid size.');

  canvas.width = 64;
  assert_array_equals(drawAndReadBack(ctx), [0, 0, 0, 0],
      'Canvas should be unusable before the contextlost event fires.');

  await waitForContextLost(ctx);
  assert_array_equals(drawAndReadBack(ctx), [0, 0, 0, 0],
      'Canvas should be unusable before the contextrestored event fires.');

  await waitForContextRestored(ctx);
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
      'Canvas should be usable after the contextrestored event is fired.');
}, 'The canvas should remain unusable until contextrestored fires.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Give an invalid size to an initialized canvas.
 */
canvasPromiseTest(async (canvas, {canvasType} = {}) => {
  const ctx = get2dContext(canvas);

  // Use the canvas do that it allocates a backing bitmap.
  drawAndReadBack(ctx);

  // Set an invalid size after resources are allocated.
  canvas.width = 100000000;
  assert_false(ctx.isContextLost(),
              'Context should not be lost right after setting the size.');

  // Using the canvas now loses the context.
  ctx.fillRect(0, 0, 100, 100);
  await waitForContextLost(ctx);

  // The context won't restore until we give it a valid size.
  await waitFramesAndRejectOnContextEvents(ctx);
  canvas.width = 64;
  await waitForContextRestored(ctx);
}, 'Valid provider -> bad size -> context lost.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Give an invalid size to a new uninitialized canvas.
 */
canvasPromiseTest(async (canvas, {canvasType} = {}) => {
  const ctx = get2dContext(canvas);

  // Set an invalid size in a new canvas (before resources are allocated).
  canvas.width = 100000000;
  assert_false(ctx.isContextLost(),
              'Context should not be lost right after setting the size.');

  // Using the canvas now loses the context.
  ctx.fillRect(0, 0, 100, 100);
  await waitForContextLost(ctx);

  // The context won't restore until we give it a valid size.
  await waitFramesAndRejectOnContextEvents(ctx);
  canvas.width = 64;
  await waitForContextRestored(ctx);
}, 'No provider -> bad size -> context lost.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Give an invalid size to a canvas and use it in the same task.
 */
canvasPromiseTest(async (canvas, {canvasType} = {}) => {
  const ctx = get2dContext(canvas);

  canvas.width = 100000000;
  ctx.fillRect(0, 0, 100, 100);

  // TODO: crbug.com/348445884 - `HTMLCanvasElement` and `OffscreenCanvas`
  // behave differently. This test is merely testing existing behavior, but this
  // should be fixed such that the two classes behave the same way.
  if (HTML_CANVAS_ELEMENT_TEST_TYPES.includes(canvasType)) {
    // `HTMLCanvasElement` lost the context in `fillRect`.
    assert_true(ctx.isContextLost(),
                'Context should be lost immediately after a failed draw.');
  } else {
    // For `OffscreenCanvas`, the `fillRect` above aborted, but the context
    // wasn't lost. The context will only become lost when the task terminates.
    assert_false(ctx.isContextLost(),
                'Context should be lost only when flushing the canvas.');
  }

  await waitForContextLost(ctx);
}, 'Bad size -> fillRect -> context lost.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Give an invalid size to an `HTMLCanvasElement` and use it in a following
 * task.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  canvas.width = 100000000;
  assert_false(ctx.isContextLost(),
              'Context should not be lost right after setting the size.');

  // Wait a few frames to make sure the context isn't lost.
  await waitFramesAndRejectOnContextEvents(ctx);
  assert_false(ctx.isContextLost(),
               'Context should not be lost until canvas is used.');

  // Using the canvas now loses the context.
  ctx.fillRect(0, 0, 100, 100);
  await waitForContextLost(ctx);
}, 'Bad size -> rAF -> fillRect -> context lost.',
   {testTypes: HTML_CANVAS_ELEMENT_TEST_TYPES});

/**
 * Give an invalid size to an `OffscreenCanvas` and use it in a following task.
 *
 * TODO: crbug.com/348445884 - `HTMLCanvasElement` and `OffscreenCanvas` have
 * different behaviors here (see previous test). This test merely verify the
 * current behavior, but `OffscreenCanvas` should probably be fixed to not lose
 * the context until the canvas is actually used, like we do for
 * HTMLCanvasElement. For `OffscreenCanvas`, the resize clears it and it wants
 * to push a new blank frame by rasterizing an empty image, which doesn't even
 * work because the canvas doesn't even have a valid size.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  canvas.width = 100000000;
  assert_false(ctx.isContextLost(),
               'Context should not be lost until we finish the task.');
  await waitForContextLost(ctx);
}, 'Bad size -> DidProcessTask -> context lost.',
   {testTypes: OFFSCREEN_CANVAS_TEST_TYPES});

/**
 * Cycle size as good -> bad -> good and try using the canvas right away.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  // Toggle good -> bad -> good. This is effectively the same as just doing
  // good -> good.
  canvas.width = 100000000;
  canvas.width = 64;
  assert_false(ctx.isContextLost(),
               'Context should not be lost after restoring the size.');

  // The canvas should be immediately usable.
  ctx.fillRect(0, 0, 100, 100);
  assert_false(ctx.isContextLost(),
               'Context should not be lost after drawing.');

  // Wait a few frames to make sure the context isn't lost asynchronously.
  await waitFramesAndRejectOnContextEvents(ctx);
  assert_false(ctx.isContextLost(),
               'Context should not be lost after rAF.');
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
                      'The canvas draw should have worked');
}, 'Bad size -> valid size -> fillRect.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Cycle size as good -> bad -> good and use the canvas in a following task.
 */
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  // Toggle good -> bad -> good. This is effectively the same as just doing
  // good -> good.
  canvas.width = 100000000;
  canvas.width = 64;
  assert_false(ctx.isContextLost(),
               'Context should not be lost after restoring the size.');

  // Wait a few frames to make sure the GPU context isn't lost asynchronously.
  await waitFramesAndRejectOnContextEvents(ctx);
  assert_false(ctx.isContextLost(),
               'Context should not be lost after rAF.');

  // The canvas should now be usable.
  ctx.fillRect(0, 0, 100, 100);
  assert_false(ctx.isContextLost(),
               'Context should not be lost after drawing.');
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
                      'The canvas draw should have worked');
}, 'Bad size -> valid size -> rAF -> fillRect.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Cycle size as good -> bad -> good -> bad.
 **/
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  canvas.width = 100000000;
  canvas.width = 100000000;
  canvas.width = 64;
  canvas.width = 64;
  canvas.width = 100000000;
  assert_false(ctx.isContextLost(),
              'Context should not be lost right after setting the size.');
  ctx.fillRect(0, 0, 100, 100);
  await waitForContextLost(ctx);

  // The context won't restore until we give it a valid size.
  await waitFramesAndRejectOnContextEvents(ctx);
  canvas.width = 64;
  await waitForContextRestored(ctx);
}, 'Bad size -> good size -> bad size -> context lost.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**
 * Restore the canvas size while a contextlost event is scheduled to run.
 **/
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  // Set an invalid size and get the canvas to lose the context.
  canvas.width = 100000000;
  drawAndReadBack(ctx);
  assert_true(ctx.isContextLost(), 'Context should be lost.');

  // The context is lost, the contextlost event is pending but hasn't yet fired.
  canvas.width = 64;

  await waitForContextLost(ctx);
  await waitForContextRestored(ctx);
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
                      'The canvas should be usable.');
}, 'Bad size -> contextlost scheduled -> good size.',
   {testTypes: ALL_CANVAS_TEST_TYPES});

/**

canvasPromiseTest(async (canvas) => {

  assert_true(ctx.isContextLost(), 'Context should be lost.');

  // The context won't restore until we give it a valid size.
  await waitFramesAndRejectOnContextEvents(ctx);
  canvas.width = 64;
  await waitForContextRestored(ctx);
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],

}, 'Bad size -> contextlost scheduled -> good size -> bad size.',

/**
 * Resize the canvas to a different invalid size while a contextlost event is

canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  // Set an invalid size and get the canvas to lose the context.

  drawAndReadBack(ctx);
  assert_true(ctx.isContextLost(), 'Context should be lost.');

/**
 * Restore the canvas size before contextlost fires and make the size invalid
 * again from inside the contextlost event handler.
 **/
canvasPromiseTest(async (canvas) => {
  const ctx = get2dContext(canvas);

  // Set an invalid size and get the canvas to lose the context.
  canvas.width = 100000000;
  drawAndReadBack(ctx);
  assert_true(ctx.isContextLost(), 'Context should be lost.');

  // The context is lost, but the contextlost event has not yet fired. Restore

 * the context loss. After the GPU process is restored, canvas can be created
 * as if nothing happened.
 **/
canvasPromiseTest(async (canvas, {test, canvasType} = {}) => {
  const ctx = get2dContext(canvas);

  // Make sure the canvas is initialized with valid resources.
  drawAndReadBack(ctx);

  // Kill the GPU process and reset the size before the canvas is notified of
  // the GPU process loss.
  const gpuProcessRestoredPromise = terminateGpuProcess(test);
  canvas.width = 64;

  if (canvasType === CanvasTestType.OFFSCREEN &&
      !internals.runtimeFlags.accelerated2dCanvasEnabled) {
    // Unaccelerated `OffscreenCanvas` never lose the context.
    await waitFramesAndRejectOnContextEvents(ctx);
  } else {
    // TODO: crbug.com/348445884 - `HTMLCanvasElement` and `OffscreenCanvas`
    // behave differently. This test is merely testing existing behavior, but
    // this should be fixed such that the two classes behave the same way.
    if (HTML_CANVAS_ELEMENT_TEST_TYPES.includes(canvasType)) {
      // Wait for the GPU process to be back. The canvas can't be notified
      // because it doesn't have a provider.
      await resolvedWithoutContextEvent(gpuProcessRestoredPromise, ctx);
      await waitFramesAndRejectOnContextEvents(ctx);

      assert_false(ctx.isContextLost(),
                  `Canvas shouldn't be lost because it has no resources.`);
    } else {
      // `OffscreenCanvas` rasterizes a blank frame after a resize, forcing
      // the creation of a provider while the GPU context is lost.
      await waitForContextLost(ctx);
      await waitForContextRestored(ctx);
    }
  }

  // Using the canvas now recreates a valid provider.
  assert_array_equals(drawAndReadBack(ctx), [255, 0, 0, 255],
                      'The canvas should be usable.');
}, 'Valid provider -> GPU crash -> resize -> GPU restored -> create provider.',
    // `chrome.gpuBenchmarking` is not available on workers.
    {testTypes: MAIN_THREAD_CANVAS_TEST_TYPES});
