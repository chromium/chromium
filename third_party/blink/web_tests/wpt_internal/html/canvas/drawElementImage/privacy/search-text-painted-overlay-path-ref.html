<!DOCTYPE html>
<meta charset="UTF-8">
<title>drawElementImage does not draw search-text with custom highlights - ref</title>
<script src="/wpt_internal/css/support/markers.js"></script>
<style>
  #child {
    position: fixed;
    left: 8px;
    top: 8px;
    width: 100px;
    height: 100px;
    background: green;
  }
  #canvas {
    background: grey;
  }
  ::highlight(example-highlight) {
    background-color: yellow;
    color: blue;
  }
  ::search-text {
    background-color: lime;
    color: green;
  }
</style>
<canvas id=canvas width="200" height="200" layoutsubtree>
</canvas>
<div id="child">
  <div id="editable" contenteditable="true" spellcheck="true" lang="en">Many things can happen.</div>
</div>
<script>
  function runTest() {
    addSearchTextMarker(editable, 5, 11)

    let r = new Range();
    r.setStart(document.body, 0);
    r.setEnd(document.body, 3);
    CSS.highlights.set("example-highlight", new Highlight(r));
  }

  onload = () => runTest();
</script>
