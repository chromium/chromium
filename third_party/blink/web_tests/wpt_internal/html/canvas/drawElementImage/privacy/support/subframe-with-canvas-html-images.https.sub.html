<!DOCTYPE HTML>
<html>
<head>
  <title>subframe that draws HTML images</title>
  <script src='/resources/testharness.js'></script>
  <script src='/resources/testharnessreport.js'></script>
  <style>
  #child {
    width: 10px;
    height: 20px;
    background: green;
  }
  #sameOrigin {
    position: absolute;
    left: 0px;
    top: 0px;
  }
  #crossOrigin {
    position: absolute;
    left: 0px;
    top: 10px;
  }
  </style>
</head>
<body>
  <canvas id=canvas width="10" height="20" layoutsubtree>
    <div id=child>
      <img id=sameOrigin width=10 height=10 src="https://{{hosts[alt][www]}}:{{ports[h2][0]}}/wpt_internal/html/canvas/drawElementImage/resources/red-100x100.png"/>
      <img id=crossOrigin width=10 height=10 src="https://{{location[host]}}/wpt_internal/html/canvas/drawElementImage/resources/red-100x100.png"/>
    </div>
  </canvas>
  <script>
    window.onload = function() {
      promise_test(async function(t) {
        await new Promise(requestAnimationFrame);
        await new Promise(setTimeout);
        var context = canvas.getContext("2d");
        context.drawElementImage(child, 0, 0);

        pixel = context.getImageData(5, 5, 1, 1).data;
        assert_equals(pixel[0], 255, "Same origin should draw");
        assert_equals(pixel[1], 0, "Same origin should draw");
        assert_equals(pixel[2], 0, "Same origin should draw");

        pixel = context.getImageData(5, 15, 1, 1).data;
        assert_equals(pixel[0], 0, "Cross origin should not draw");
        assert_equals(pixel[1], 128, "Cross origin should not draw");
        assert_equals(pixel[2], 0, "Cross origin should not draw");

        t.done();
      });
    };
  </script>
</body>
</html>
