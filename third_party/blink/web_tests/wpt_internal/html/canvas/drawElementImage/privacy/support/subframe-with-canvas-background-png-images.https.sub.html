<!DOCTYPE HTML>
<html>
<head>
  <title>subframe loading background images</title>
  <script src='/resources/testharness.js'></script>
  <script src='/resources/testharnessreport.js'></script>
  <script src='../../support/getPixel.js'></script>
  <style>
  #child {
    width: 10px;
    height: 20px;
    background: green;
  }
  #sameOrigin {
    position: absolute;
    left: 0px;
    top: 0px;
    width: 10px;
    height: 10px;
    background-image: url("https://{{hosts[alt][www]}}:{{ports[h2][0]}}/wpt_internal/html/canvas/drawElementImage/resources/red-100x100.png");
  }
  #crossOrigin {
    position: absolute;
    left: 0px;
    top: 10px;
    width: 10px;
    height: 10px;
    background-image: url("https://{{location[host]}}/wpt_internal/html/canvas/drawElementImage/resources/red-100x100.png");
  }
  </style>
</head>
<body>
  <canvas id=canvas width="10" height="20" layoutsubtree>
    <div id=child>
      <div id=sameOrigin></div>
      <div id=crossOrigin></div>
    </div>
  </canvas>

  <script>
    window.onload = () => {
      promise_test(async function(t) {
        await new Promise(requestAnimationFrame);
        await new Promise(setTimeout);
        const context = canvas.getContext("2d");
        context.drawElementImage(child, 0, 0);

        // Fetch all pixel data once to avoid multiple slow readbacks.
        const imgData = context.getImageData(0, 0, canvas.width, canvas.height);

        let pixel = getPixel(imgData, 5, 5);
        assert_array_equals(pixel, [255, 0, 0, 255], "Same origin should draw");

        pixel = getPixel(imgData, 5, 15);
        assert_array_equals(pixel, [0, 128, 0, 255], "Cross origin should not draw");
      });
    }
  </script>
</body>
</html>
