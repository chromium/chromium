<!DOCTYPE html>
<!-- This page changes every frame. -->
<div id="target" style="width: 100px; height: 100px;"></div>
<script>
  let i = 0;
  function loop() {
    i++;
    document.getElementById('target').style.background = `rgb(${i % 255}, 0, 0)`;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
