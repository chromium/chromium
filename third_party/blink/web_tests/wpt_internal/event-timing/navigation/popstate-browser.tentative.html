<!DOCTYPE html>
<html>
<meta charset=utf-8>
<title>Event Timing: popstate event from browser back.</title>
<script src=/resources/testharness.js></script>
<script src=/resources/testharnessreport.js></script>
<script src=/resources/testdriver.js></script>
<script src=/resources/testdriver-vendor.js></script>
<script src=/event-timing/resources/event-timing-test-utils.js></script>
<body>
  <button id="navigateBack">Go Back!</button>
<script>
  navigateBack.onclick = () => {
    if (testRunner) {
      testRunner.goToOffset(-1);
    }
  };
  promise_test(async t => {
    assert_implements(window.PerformanceEventTiming, 'Event Timing is not supported');
    assert_true(!!window.testRunner, 'testRunner is required');
    const isEnabled = window.internals && internals.runtimeFlags.navigationEventTimingEnabled;
    const entries = [];
    const observer = new PerformanceObserver((list) => {
      for (const entry of list.getEntries()) {
        entries.push(entry);
      }
    });
    observer.observe({ type: 'event', durationThreshold: 0 });

    const getEventCount = name => performance.eventCounts.get(name) || 0;
    assert_equals(performance.interactionCount, 0, 'Initial interactionCount should be 0');
    assert_equals(getEventCount('popstate'), 0, 'Initial popstate count should be 0');

    window.addEventListener('popstate', (event) => {
      mainThreadBusy(50);
    });

    // Stuff our history stack first.
    history.pushState({}, undefined, "/first");
    history.pushState({}, undefined, "/second");

    // The events so far have been non-user initiated and should not have
    // generated event timings.
    assert_false(entries.some(e => e.name === 'popstate'));
    assert_equals(performance.interactionCount, 0, 'interactionCount should be 0 after non-user-initiated popstate');
    assert_equals(getEventCount('popstate'), 0, 'popstate count should be 0 after non-user-initiated popstate');

    const initialInteractionCount = performance.interactionCount;
    const initialPopstateCount = getEventCount('popstate');

    // Simulate a back button press.
    if (test_driver) {
      await test_driver.click(navigateBack);
    }

    const verifyMeasured = async () => {
      await t.step_wait(() => entries.some(e => e.name === 'popstate'), 'Wait for popstate entry');

      const popstateEntries = entries.filter(e => e.name === 'popstate');
      assert_equals(popstateEntries.length, 1, 'Should have exactly one popstate entry');
      assert_greater_than(popstateEntries[0].interactionId, 0, 'Popstate entry should have a non-zero interactionId');

      assert_equals(performance.interactionCount, initialInteractionCount + 2, 'Interaction count should increase by 2');
      assert_equals(getEventCount('popstate'), initialPopstateCount + 1, 'Popstate event count should increase by 1');
    };

    const verifyNotMeasured = async () => {
      await new Promise(resolve => t.step_timeout(resolve, 500));
      assert_false(entries.some(e => e.name === 'popstate'), 'Popstate entry should NOT be reported');

      assert_equals(performance.interactionCount, initialInteractionCount + 1, 'Interaction count should increase by 1');
      assert_equals(getEventCount('popstate'), initialPopstateCount, 'Popstate event count should NOT increase');
    };

    if (isEnabled) {
      await verifyMeasured();
    } else {
      await verifyNotMeasured();
    }
  }, "Verify that popstate event has a non-zero interactionId when triggered by browser back button.");
</script>
</body>
</html>
