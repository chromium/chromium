<!DOCTYPE html>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<link rel="stylesheet" href="/wpt_internal/svg/resources/util.css">

<div id="local_outer">
  <div id="local_inner">
    <iframe id="local_iframe" src="resources/empty.html"></iframe>
  </div>
</div>

<script type=module>
  import {
    expectCounters,
    resetCounters,
    waitForLoad,
    waitForRender,
  } from '/wpt_internal/svg/resources/util.js';

  function reset() {
    document.getElementById('local_outer').className = '';
    document.getElementById('local_inner').className = '';
    document.getElementById('local_iframe').className = '';
    resetCounters();
  }

  promise_test(async (t) => {
    await waitForLoad();

    reset();
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Initial load.');

    reset();
    document.getElementById('local_outer').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/true, /*remote=*/false, /*plugin=*/false, 'Outer filter.');

    reset();
    document.getElementById('local_inner').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/true, /*remote=*/false, /*plugin=*/false, 'Inner filter.');

    reset();
    document.getElementById('local_iframe').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/true, /*remote=*/false, /*plugin=*/false, 'Iframe filter.');
  }, 'SVG filter applied to local frame');

  promise_test(async (t) => {
    await waitForLoad();

    reset();
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Initial load.');

    reset();
    document.getElementById('local_outer').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Outer filter.');

    reset();
    document.getElementById('local_inner').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Inner filter.');

    reset();
    document.getElementById('local_iframe').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Iframe filter.');
  }, 'CSS filter applied to local frame');

  promise_test(async (t) => {
    await waitForLoad();

    reset();
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Initial load.');

    reset();
    document.getElementById('local_outer').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Outer filter CSS.');

    document.getElementById('local_outer').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/true, /*remote=*/false, /*plugin=*/false, 'Outer filter SVG.');

    reset();
    document.getElementById('local_inner').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Inner filter CSS.');

    document.getElementById('local_inner').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/true, /*remote=*/false, /*plugin=*/false, 'Inner filter SVG.');

    reset();
    document.getElementById('local_iframe').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Iframe filter CSS.');

    document.getElementById('local_iframe').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/true, /*remote=*/false, /*plugin=*/false, 'Iframe filter SVG.');
  }, 'CSS & SVG filter applied to local frame');
</script>
