<!DOCTYPE html>
<html class="reftest-wait">
<head>
<svg width="0" height="0">
    <filter id="svg-filter">
        <feTurbulence type="turbulence" baseFrequency="0.1" numOctaves="1" result="turbulence" />
        <feDisplacementMap in2="turbulence" in="SourceGraphic" scale="1" xChannelSelector="R" yChannelSelector="G" />
    </filter>
</svg>
<style type="text/css">
.css-filter {
    filter: blur(.1px);
}
.svg-filter {
    filter: url(#svg-filter);
}
</style>
<script>
    function waitForFinish() {
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                document.documentElement.classList.remove('reftest-wait');
            });
        });
    }
</script>
</head>
<body onload="waitForFinish()">
    <p>
        SVG filter security test: this test passes if there is no filter effect on the cross-origin frame and plugin.
    </p>
    <p>
        Same-origin frame:<br />
        <div class="svg-filter">
            <div class="css-filter">
                <iframe width="100px" height="100px" frameBorder="0" class="svg-filter" src="/wpt_internal/svg/resources/svg-filter-render-iframe.html"></iframe>
            </div>
        </div>
    </p>
    <p>
        Cross-origin frame:<br />
        <div>
            <div class="css-filter">
                <iframe width="100px" height="100px" frameBorder="0" src="https://{{hosts[alt][]}}:{{ports[https][0]}}/wpt_internal/svg/resources/svg-filter-render-iframe.html"></iframe>
            </div>
        </div>
    </p>
    <p>
        Plugin:<br />
        <div>
            <div class="css-filter">
                <embed width="100px" height="100px" frameBorder="0" type="application/x-webkit-test-webplugin"></embed>
            </div>
        </div>
    </p>
</body>
</html>
