<!DOCTYPE html>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<svg width="0" height="0">
  <filter id="svg-blur">
    <feGaussianBlur stdDeviation="1" />
  </filter>
</svg>
<style>
  .css-blur {
    filter: blur(1px);
  }
  .svg-blur {
    filter: url(#svg-blur);
  }
</style>

<div id="empty_outer">
  <div id="empty_inner">
  </div>
</div>

<div id="local_outer">
  <div id="local_inner">
    <iframe id="local_iframe" src="resources/empty.html"></iframe>
  </div>
</div>

<div id="remote_outer">
  <div id="remote_inner">
    <iframe id="remote_iframe" src="https://{{hosts[alt][]}}:{{ports[https][0]}}/wpt_internal/svg/resources/empty.html"></iframe>
  </div>
</div>

<div id="plugin_outer">
  <div id="plugin_inner">
    <embed id="plugin_embed" type="application/x-webkit-test-webplugin"></embed>
  </div>
</div>

<iframe id="playground_iframe"></iframe>

<script type=module>
  import {WebFeature} from '/gen/third_party/blink/public/mojom/use_counter/metrics/web_feature.mojom.m.js';

  async function waitForLoad() {
    if (document.readyState === 'complete') {
        return;
    }
    await new Promise(resolve => window.addEventListener('load', resolve));
  }

  function reset() {
    document.getElementById('empty_outer').className = '';
    document.getElementById('empty_inner').className = '';
    document.getElementById('local_outer').className = '';
    document.getElementById('local_inner').className = '';
    document.getElementById('local_iframe').className = '';
    document.getElementById('remote_outer').className = '';
    document.getElementById('remote_inner').className = '';
    document.getElementById('remote_iframe').className = '';
    document.getElementById('plugin_outer').className = '';
    document.getElementById('plugin_inner').className = '';
    document.getElementById('plugin_embed').className = '';
    document.getElementById('playground_iframe').className = '';
    internals.clearUseCounter(document, WebFeature.kSvgFilterPaintedOnLocalFrame);
    internals.clearUseCounter(document, WebFeature.kSvgFilterPaintedOnRemoteFrame);
    internals.clearUseCounter(document, WebFeature.kSvgFilterPaintedOnWebPlugin);
  }

  async function waitForRender() {
    await new Promise(requestAnimationFrame);
    await new Promise(setTimeout);
  }

  async function getIframeResults(url) {
    document.getElementById('playground_iframe').setAttribute('src', url);
    return await new Promise(resolve => window.addEventListener('message', (e) => {
      resolve(e.data);
    }, {once: true}));
  }

  function expectCounters(local, remote, plugin, context) {
    assert_equals(
      printCounters(
        internals.isUseCounted(document, WebFeature.kSvgFilterPaintedOnLocalFrame),
        internals.isUseCounted(document, WebFeature.kSvgFilterPaintedOnRemoteFrame),
        internals.isUseCounted(document, WebFeature.kSvgFilterPaintedOnWebPlugin)
      ),
      printCounters(local, remote, plugin),
      context
    );
  }

  function expectIframeCounters(message, local, remote, plugin, context) {
    assert_equals(
      printCounters(message.local, message.remote, message.plugin),
      printCounters(local, remote, plugin),
      context
    );
  }

  function printCounters(local, remote, plugin) {
    return `Local: ${local}, Remote: ${remote}, Plugin: ${plugin}`;
  }

  promise_test(async (t) => {
    await waitForLoad();

    reset();
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Initial load.');

    reset();
    document.getElementById('empty_outer').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Outer filter.');

    reset();
    document.getElementById('empty_inner').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Inner filter.');
  }, 'SVG filter applied to empty divs');
