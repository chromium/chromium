<!DOCTYPE html>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<link rel="stylesheet" href="/wpt_internal/svg/resources/util.css">

<div id="empty_outer">
  <div id="empty_inner">
  </div>
</div>

<script type=module>
  import {
    expectCounters,
    resetCounters,
    waitForLoad,
    waitForRender,
  } from '/wpt_internal/svg/resources/util.js';

  function reset() {
    document.getElementById('empty_outer').className = '';
    document.getElementById('empty_inner').className = '';
    resetCounters();
  }

  promise_test(async (t) => {
    await waitForLoad();

    reset();
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Initial load.');

    reset();
    document.getElementById('empty_outer').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Outer filter.');

    reset();
    document.getElementById('empty_inner').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Inner filter.');
  }, 'SVG filter applied to empty divs');

  promise_test(async (t) => {
    await waitForLoad();

    reset();
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Initial load.');

    reset();
    document.getElementById('empty_outer').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Outer filter.');

    reset();
    document.getElementById('empty_inner').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Inner filter.');
  }, 'CSS filter applied to empty divs');

  promise_test(async (t) => {
    await waitForLoad();

    reset();
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Initial load.');

    reset();
    document.getElementById('empty_outer').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Outer filter CSS.');

    document.getElementById('empty_outer').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Outer filter SVG.');

    reset();
    document.getElementById('empty_inner').className = 'css-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Inner filter CSS.');

    document.getElementById('empty_inner').className = 'svg-blur';
    await waitForRender();
    expectCounters(/*local=*/false, /*remote=*/false, /*plugin=*/false, 'Inner filter SVG.');
  }, 'CSS & SVG filter applied to empty divs');
</script>
