<!DOCTYPE html>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<link rel="stylesheet" href="/wpt_internal/svg/resources/util.css">

<iframe id="iframe_1" src="https://{{host}}:{{ports[https][0]}}/wpt_internal/svg/resources/empty.html"></iframe>
<iframe id="iframe_2" src="https://{{hosts[alt][]}}:{{ports[https][0]}}/wpt_internal/svg/resources/empty.html"></iframe>
<embed id="plugin" type="application/x-webkit-test-webplugin"></embed>
<script type=module>
  import {
    getCounters,
    resetCounters,
  } from '/wpt_internal/svg/resources/util.js';

  (async function() {
    resetCounters();

    if ((new URLSearchParams(window.location.search)).has('filter')) {
      document.getElementById('iframe_1').className = 'svg-blur';
      document.getElementById('iframe_2').className = 'svg-blur';
      document.getElementById('plugin').className = 'svg-blur';
    }

    await new Promise(requestAnimationFrame);
    await new Promise(setTimeout);
    window.top.postMessage(getCounters(), '*');
  })();
</script>`
