<!DOCTYPE html>
<html class="reftest-wait">
  <title>WebGPU copyElementImageToTexture</title>
  <meta charset="utf-8" />
  <meta name="fuzzy" content="maxDifference=0-100; totalPixels=0-2000" />
  <link rel="help" href="https://github.com/WICG/html-in-canvas" />
  <link rel="match" href="copy_element_image_to_texture-ref.html" />
  <link rel="stylesheet" href="/wpt_internal/resources/canvas-draw-element/styles.css" />
  <script src="/common/reftest-wait.js"></script>

  <style>
    canvas {
      border: 0;
      width: 256px;
      height: 192px;
    }
  </style>

  <canvas layoutsubtree>
    <div class="draw-element-wrapper">
      <div class="css-is-awesome"></div>
    </div>
  </canvas>

  <script type="module">
    import { resizeToPixelGrid } from "/wpt_internal/resources/canvas-draw-element/util.js";

    const cvs = document.querySelector("canvas");
    await resizeToPixelGrid(cvs);
    await new Promise(setTimeout);
    const target = cvs.firstElementChild;

    const worker = new Worker('webgpu-worker.js', { type: 'module' });
    const offscreen = cvs.transferControlToOffscreen();
    worker.postMessage({
      canvas: offscreen,
      clientWidth: cvs.clientWidth,
      clientHeight: cvs.clientHeight
    }, [offscreen]);

    try {
      await new Promise((resolve, reject) => {
        worker.onmessage = (e) => {
          if (e.data !== 'done') {
            console.error(e.data);
            reject(new Error(e.data));
          } else {
            resolve();
          }
        };
        worker.onerror = (e) => {
          console.error(e.message);
          reject(e);
        };
        const elementImage = cvs.captureElementImage(target);
        worker.postMessage({ elementImage: elementImage }, [elementImage]);
      });
    } catch (e) {
      console.error("Test failed:", e);
    } finally {
      // Wait for the worker thread to update before taking a screenshot.
      requestAnimationFrame(() => {
        requestAnimationFrame(takeScreenshot);
      });
    }
  </script>
</html>
