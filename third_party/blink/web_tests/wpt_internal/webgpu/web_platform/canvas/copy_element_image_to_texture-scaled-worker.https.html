<!DOCTYPE html>
<html class="reftest-wait">
  <title>WebGPU copyElementImageToTexture with scaling</title>
  <meta charset="utf-8" />
  <meta name="fuzzy" content="maxDifference=0-100; totalPixels=0-2000" />
  <link rel="help" href="https://github.com/WICG/html-in-canvas" />
  <link rel="match" href="copy_element_image_to_texture-scaled-ref.html" />
  <link rel="stylesheet" href="/wpt_internal/resources/canvas-draw-element/styles.css" />
  <script src="/wpt_internal/resources/canvas-draw-element/color-grid.js"></script>
  <script src="/common/reftest-wait.js"></script>

  <style>
    body {
      display: grid;
      grid: 256px / 1fr 1fr 1fr;
      align-items: start;
    }
    canvas {
      width: 256px;
      height: 256px;
    }
    color-grid {
      width: 100px;
      height: 100px;
    }
  </style>

  <canvas layoutsubtree>
    <div class="draw-element-wrapper">
      <div class="css-is-awesome"></div>
    </div>
  </canvas>

  <canvas layoutsubtree>
    <div class="draw-element-wrapper">
      <color-grid></color-grid>
    </div>
  </canvas>

  <canvas layoutsubtree>
    <div class="draw-element-wrapper" xscale="0.5" yscale="0.5">
      <color-grid></color-grid>
    </div>
  </canvas>

  <canvas layoutsubtree>
    <div class="draw-element-wrapper" xscale="2" yscale="2">
      <color-grid></color-grid>
    </div>
  </canvas>

  <canvas layoutsubtree>
    <div class="draw-element-wrapper" xscale="2" yscale="0.5">
      <color-grid></color-grid>
    </div>
  </canvas>

  <script type="module">
    import { resizeToPixelGrid, computeScaledDestinationSize } from "/wpt_internal/resources/canvas-draw-element/util.js";

    (async () => {
      const worker = new Worker('webgpu-worker.js', { type: 'module' });
      for (const cvs of document.querySelectorAll("canvas")) {
        await resizeToPixelGrid(cvs);
        await new Promise(setTimeout);
        const target = cvs.firstElementChild;
        let args = [];
        if (target.hasAttribute("xscale") && target.hasAttribute("yscale")) {
          const scaleX = Number.parseFloat(target.getAttribute("xscale"));
          const scaleY = Number.parseFloat(target.getAttribute("yscale"));
          const [destWidth, destHeight] = computeScaledDestinationSize(cvs, target, scaleX, scaleY);
          args = [destWidth, destHeight];
        } else {
          args = [];
        }

        const offscreen = cvs.transferControlToOffscreen();
        worker.postMessage({
          canvas: offscreen,
          clientWidth: cvs.clientWidth,
          clientHeight: cvs.clientHeight
        }, [offscreen]);

        await new Promise((resolve, reject) => {
          worker.onmessage = (e) => {
            if (e.data !== 'done') {
              console.error(e.data);
              reject(new Error(e.data));
            } else {
              resolve();
            }
          };
          worker.onerror = (e) => {
            console.error(e.message);
            reject(e);
          };
          const elementImage = cvs.captureElementImage(target);
          worker.postMessage({ elementImage: elementImage, args: args }, [elementImage]);
        });
      }
    })().catch(e => {
      console.error("Test failed:", e);
    }).finally(() => {
      // Wait for the worker thread to update before taking a screenshot.
      requestAnimationFrame(() => {
        requestAnimationFrame(takeScreenshot);
      });
    });
  </script>
</html>
