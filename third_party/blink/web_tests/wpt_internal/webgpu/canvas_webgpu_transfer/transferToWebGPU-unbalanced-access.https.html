<!DOCTYPE html>
<html>
<head>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<script src="./webgpu-helpers.js"></script>
</head>

<h1>Canvas2D WebGPU Transfer: transferToWebGPU-unbalanced-access</h1>

<p>transferToWebGPU() disallows repeated calls without a call to
transferBackFromWebGPU().</p>

<canvas id="c" width="50" height="50"></canvas>

<script>

promise_test(() => {
    return with_webgpu((adapter, adapterInfo, device) => {
      test_transferToWebGPU_unbalanced_access(
          device,
          document.getElementById('c'));
    });
  },
  'transferToWebGPU() disallows repeated calls without a call to ' +
  'transferBackFromWebGPU().'
);

promise_test(() => {
    return with_webgpu((adapter, adapterInfo, device) => {
      test_transferToWebGPU_unbalanced_access(
          device,
          new OffscreenCanvas(50, 50));
    });
  },
  'transferToWebGPU() on an offscreen context disallows repeated calls ' +
  'without a call to transferBackFromWebGPU().'
);

</script>
