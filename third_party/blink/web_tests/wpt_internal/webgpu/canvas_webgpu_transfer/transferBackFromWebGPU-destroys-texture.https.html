<!DOCTYPE html>
<html>
<head>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<script src="./webgpu-helpers.js"></script>
</head>

<h1>Canvas2D WebGPU Transfer: transferBackFromWebGPU-destroys-texture</h1>

<p>transferBackFromWebGPU() causes the GPUTexture returned by transferToWebGPU()
to enter a destroyed state.</p>

<canvas id="c" width="50" height="50"></canvas>

<script>

promise_test(() => {
    return with_webgpu((adapter, adapterInfo, device) => {
      return test_transferBackFromWebGPU_destroys_texture(
                 device,
                 document.getElementById('c'));
    });
  },
  'transferBackFromWebGPU() should destroy the associated GPUTexture.'
);

promise_test(() => {
    return with_webgpu((adapter, adapterInfo, device) => {
      return test_transferBackFromWebGPU_destroys_texture(
                 device,
                 new OffscreenCanvas(50, 50));
    });
  },
  'transferBackFromWebGPU() on an offscreen canvas should destroy the ' +
  'associated GPUTexture.'
);

</script>
