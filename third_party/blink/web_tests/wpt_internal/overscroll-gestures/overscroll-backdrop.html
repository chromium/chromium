<!DOCTYPE html>
<html class="reftest-wait">
<meta charset="utf-8">
<title>Overscroll area backdrop visual test</title>
<link rel="match" href="overscroll-backdrop-ref.html">
<script src="/common/reftest-wait.js"></script>
<style>
  html, body { margin: 0; }
  #container {
    width: 200px;
    height: 200px;
    overflow: clip;
    position: relative;
    background: red;
  }
  #menu {
    position: absolute;
    bottom: 100%;
    width: 200px;
    height: 100px;
    background: blue;
  }
  #menu::backdrop {
    display: block;
    background: green;
  }
  #content {
    height: 200px;
  }
</style>

<div id="container" overscrollcontainer>
  <div id="menu" overscrollarea></div>
  <div id="content"></div>
</div>

<script>
function runTest() {
  menu.scrollIntoView();
  requestAnimationFrame(takeScreenshot);
}
onload = () => requestAnimationFrame(() => requestAnimationFrame(runTest));
</script>
</html>
