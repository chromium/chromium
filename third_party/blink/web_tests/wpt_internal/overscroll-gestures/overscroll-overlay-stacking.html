<!DOCTYPE html>
<html class="reftest-wait">
<meta charset="utf-8">
<title>Overscroll area parent stacking order</title>
<link rel="match" href="overscroll-overlay-stacking-ref.html">
<script src="/common/reftest-wait.js"></script>
<style>
  html, body { margin: 0; }
  #container {
    width: 200px;
    height: 200px;
    overflow: clip;
    position: relative;
    background: red;
  }
  #neg-z {
    position: absolute;
    inset: 0;
    z-index: -10;
    background: gray;
  }
  #pos-z {
    position: absolute;
    inset: 0;
    z-index: 10;
    background: yellow;
  }
  /* Menu 1 overscroll area covers top quarter in green, with large negative z-index */
  #menu1 {
    width: 100%;
    height: 50px;
    background: green;
    z-index: -999;
  }
  /* Menu 2 overscroll area covers top half in blue; this one is on the bottom */
  #menu2 {
    width: 100%;
    height: 100px;
    background: blue;
  }
  #content {
    height: 200px;
  }
</style>

<div id="container" overscrollcontainer>
  <div id="neg-z"></div>
  <div id="pos-z"></div>
  <div id="menu1" overscrollarea></div>
  <div id="menu2" overscrollarea></div>
  <div id="content"></div>
</div>

<script>
function runTest() {
  menu1.scrollIntoView();
  menu2.scrollIntoView();

  requestAnimationFrame(takeScreenshot);
}

onload = () => requestAnimationFrame(() => requestAnimationFrame(runTest));
</script>
</html>
