<!DOCTYPE html>
<meta charset="utf-8">
<style>
  html, body { margin: 0; }
  #container {
    width: 200px;
    height: 200px;
    overflow: clip;
    position: relative;
    background: red;
  }
  #content {
    position: absolute;
    top: 0;
    left: 0;
    width: 200px;
    height: 200px;
    background: yellow;
  }
  #half {
    position: absolute;
    top: 0;
    left: 0;
    width: 200px;
    height: 100px;
    background: blue;
  }
  #quarter {
    position: absolute;
    top: 0;
    left: 0;
    width: 200px;
    height: 50px;
    background: green;
  }
</style>
<div id="container">
  <div id="content"></div>
  <div id="half"></div>
  <div id="quarter"></div>
</div>
