<!DOCTYPE html>
<meta charset="utf-8">
<style>
  html, body { margin: 0; }
  #container {
    width: 200px;
    height: 200px;
    position: relative;
    background: red;
  }
  #menu {
    position: absolute;
    top: 0;
    left: 50px;
    width: 100px;
    height: 50px;
    background: blue;
    z-index: 1;
  }
  #backdrop {
    position: absolute;
    inset: 0;
    background: green;
    border: 20px solid yellow;
    box-sizing: border-box;
  }
</style>
<div id="container">
  <div id="backdrop"></div>
  <div id="menu"></div>
</div>
