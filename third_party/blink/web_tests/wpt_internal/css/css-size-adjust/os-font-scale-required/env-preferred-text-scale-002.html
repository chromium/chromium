<!DOCTYPE html>
<html lang="en" class="reftest-wait">
<meta content="width=device-width,initial-scale=1.0,minimum-scale=1.0"
  name="viewport">
<meta name="assert"
  content="user's preferred text scale changes are reflected in env(preferred-text-scale)">
<link rel="help"
  href="https://github.com/w3c/csswg-drafts/issues/10674#issuecomment-2625414100">
<link rel="match" href="../../reference/ref-filled-green-100px-square.xht">
<script src="/common/reftest-wait.js"></script>
<style>
  div {
    background-color: green;
    width: calc(100px * env(preferred-text-scale));
    height: calc(100px * env(preferred-text-scale));
  }
</style>

<p>Test passes if there is a filled green square and <strong>no red</strong>.
</p>
<div></div>
<script>
  if (window.internals) {
    internals.settings.setAccessibilityFontScaleFactor(1.0);
  } else {
    document.body.appendChild(document.createTextNode("No window.internals? This test will fail."));
  }
  requestAnimationFrame(() => requestAnimationFrame(() => {
    takeScreenshot();
  }));
</script>
