<!doctype html>
<meta charset="utf-8">
<title>CSS Reference File: ::scroll-marker with ::scroll-marker-group before</title>
<link rel="author" href="mailto:sakhapov@chromium.org">
<style>
    #scroller {
        width: 600px;
        height: 300px;
        overflow: scroll;
    }

    #scroller div {
        width: 600px;
        height: 300px;
        margin-bottom: 20px;
        background: green;
    }

    #scroll-marker-group {
        width: 24px;
        border: 3px solid black;
        padding: 5px;
    }

    #scroll-marker-group > span {
        width: 10px;
        height: 10px;
        background-color: blue;
        border-radius: 100%;
        display: inline-block;
    }

    #scroll-marker-group > #first {
        background-color: purple;
    }
</style>
<div id="scroll-marker-group">
    <span id="first"></span>
    <span></span>
</div>
<div id="scroller">
    <div></div>
    <div></div>
</div>
