<!doctype html>
<meta charset="utf-8">
<title>CSS Test: ::scroll-marker with dynamic changes</title>
<link rel="author" href="mailto:sakhapov@chromium.org">
<link rel="match" href="scroll-marker-007-ref.html">
<link rel="help" href="https://drafts.csswg.org/css-overflow-5/#scroll-marker-pseudo">
<style>
    #scroller {
        width: 600px;
        height: 300px;
        overflow: scroll;
        scroll-marker-group: after;
    }

    #scroller div {
        width: 600px;
        height: 300px;
        margin-bottom: 20px;
        background: green;
    }

    #scroller::scroll-marker-group {
        border: 3px solid black;
        padding: 5px;
        display: block;
    }

    #scroller div::scroll-marker {
        content: "";
        width: 10px;
        height: 10px;
        background-color: blue;
        border-radius: 100%;
        display: inline-block;
    }

    #scroller #first::scroll-marker {
        background-color: purple;
        margin-right: 4px;
    }

    #scroller #last::scroll-marker {
        background-color: orange;
        margin-left: 4px;
    }
</style>
<div id="scroller">
    <div id="first"></div>
    <div></div>
</div>
<script>
    document.documentElement.offsetTop;
    const last = document.createElement("div");
    last.id = "last";
    scroller.appendChild(last);
</script>
