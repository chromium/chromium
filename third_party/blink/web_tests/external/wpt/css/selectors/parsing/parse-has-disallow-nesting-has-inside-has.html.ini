[parse-has-disallow-nesting-has-inside-has.html]
  [".a:has(:is(.b:has(.c)))" should be a valid selector]
    expected: FAIL

  [".a:has(:is(.b:has(.c), .d))" should be a valid selector]
    expected: FAIL

  [":has(:is(:has(*)))" should be a valid selector]
    expected:
      if (product == "content_shell") and (os == "mac") and (port == "mac10.15"): PASS
      FAIL

  [":has(:where(:has(*)))" should be a valid selector]
    expected:
      if (product == "content_shell") and (os == "mac") and (port == "mac10.15"): PASS
      FAIL
