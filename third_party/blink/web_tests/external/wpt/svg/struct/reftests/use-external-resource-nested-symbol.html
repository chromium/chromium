<!doctype html>
<title>&lt;use> referencing an external &lt;symbol> that references an external element</title>
<link rel="help" href="https://w3c.github.io/svgwg/svg2-draft/struct.html#UseShadowTree">
<link rel="match" href="reference/green-100x100.html">
<svg>
  <rect width="98" height="98" x="1" y="1" fill="red"/>
  <!-- Reference the nested resource directly as well to ensure it blocks 'load'. -->
  <use href="support/sprites.svg#green-rect" transform="scale(0)"/>
  <use href="support/symbol-with-external-reference.svg#green-rect"/>
</svg>
