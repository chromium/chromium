<!doctype html>
<head>
<meta charset="utf-8"/>
<meta name="timeout" content="long">
<script src="/resources/testharness.js"></script>
<script src="/cookies/resources/testharness-helpers.js"></script>
<title>Test partitioned cookies ancestor chain: parallel cross-site embed</title>
</head>
<body>
<script>

window.onload = () => {
  const partitionedCookie = 'ancestor=chain';
  // Send message indicating presence of cookie in http header or document.
  let cookiePresent = window.location.href.includes(partitionedCookie) ||
      document.cookie.includes(partitionedCookie);
  window.parent.postMessage({isCookiePresent: cookiePresent}, '*');
};

</script>
</body>
