<!DOCTYPE html>
<html>
<head>
    <title>Loop video Frame</title>
</head>
<body>
    <video loop id="video"></video>
    <script>
        const video = document.getElementById('video');
        video.addEventListener('play', (event) => {
            window.parent.postMessage({
                type: 'statechange',
                newState: 'Play'
            }, '*');
        });
        video.addEventListener('pause', (event) => {
            window.parent.postMessage({
                type: 'statechange',
                newState: 'Pause'
            }, '*');
        });
        video.addEventListener('playing', (event) => {
            window.parent.postMessage({
                type: 'statechange',
                newState: 'Playing'
            }, '*');
        });
        video.src = "http://127.0.0.1:8000/media/resources/test.ogv";

        window.addEventListener('message', function(event) {
            if (event.data.action === 'play') {
                video.play().then(
                    () => {
                        event.source.postMessage({
                            type: 'play',
                            status: 'Success'
                        }, '*');
                    },
                    (error) => {
                        event.source.postMessage({
                            type: 'play',
                            status: error.name
                        }, '*');
                    }
                );
            } else if (event.data.action === 'pause') {
              video.pause();
              event.source.postMessage({
                  type: 'pause',
                  status: video.paused ? 'Success' : 'Error'
              }, '*');
            } else if (event.data.action === 'queryPlayerStatus') {
                event.source.postMessage({
                    type: 'queryPlayerStatus',
                    status: video.paused ? 'Paused' : 'Playing'
                }, '*');
            }
        });
    </script>
</body>
</html>
