<!DOCTYPE html>
<title>Test document user gesture autoplay policy across navigation</title>
<script src="/js-test-resources/js-test.js"></script>
<script>
var jsTestIsAsync = true;
let results = {};

function tearDown() {
  shouldBeUndefined(results.media);
  shouldBeEqualToString('results.webAudio', 'running');

  finishJSTest();
}

function runMediaTests() {
  return new Promise(resolve => {
    const video = document.createElement('video');
    video.src = "/resources/test.ogv";
    video.play().then(result => { results.media = result },
                      result => { results.media = result })
                .then(resolve);
  });
}

async function runWebAudioTests() {
  const audioContext = new AudioContext();

  if (audioContext.state === 'running') {
    results.webAudio = audioContext.state;
    return;
  }

  // When autoplay is allowed, we wait for the state transition to "running".
  // When it is blocked, no "statechange" event will be fired.
  if (results.media?.name !== 'NotAllowedError') {
    await new Promise(resolve => { audioContext.onstatechange = resolve; });
  }
  results.webAudio = audioContext.state;
}

async function runTests() {
  await runMediaTests();
  await runWebAudioTests();
}

window.addEventListener('load', async function() {
  if (window.testRunner) {
    testRunner.dumpAsText();
    await runTests();
    testRunner.dumpBackForwardList();
    tearDown();
  }
}, false);
</script>
