<title>CPU Performance API - interface exposed by origin trial</title>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<script src="/resources/origin-trials-helper.js"></script>
<script>
'use strict';

test(t => {
  OriginTrialsHelper.check_properties_exist(this, {
    'Navigator': ['cpuPerformance'],
  });
}, "CPU Performance API interface in Origin-Trial enabled document.");

test(t => {
  const kNavigatorCPUPerformance = 5675;
  assert_false(internals.isUseCounted(document, kNavigatorCPUPerformance),
    'NavigatorCPUPerformance should not be counted before access.');

  // Accessing the attribute should trigger the UseCounter.
  const tier = navigator.cpuPerformance;
  assert_between_inclusive(tier, 0, 4,
    'navigator.cpuPerformance should be a valid small integer.');

  assert_true(internals.isUseCounted(document, kNavigatorCPUPerformance),
    'NavigatorCPUPerformance should be counted after access.');
}, "CPU Performance API UseCounter in Origin-Trial enabled document.");
</script>
