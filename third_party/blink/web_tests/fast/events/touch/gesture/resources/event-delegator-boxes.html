<style>
body {
  height: 50px;
  width: 50px;
  margin: 0;
}
.box {
  display: inline-block;
  width: 5px;
  height: 5px;
}
</style>
<body>
</body>
<script>
"use strict";

let eventTypes = ['mousemove', 'mousedown', 'mouseup', 'click'];
for (let i = 0; i < eventTypes.length; i++)
    document.addEventListener(eventTypes[i], parent.onEventInFrame);

// Fill the viewport with boxes for verifying the target of hit testing.
for (let i = 0; i < 10*10; i++) {
    let div = document.createElement("div");
    div.className = "box";
    document.body.appendChild(div);
}

// Notify parent frame when ready to receive input.
parent.postMessage("subframe-loaded", "*");
</script>
