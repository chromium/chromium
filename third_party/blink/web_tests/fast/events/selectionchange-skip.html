<!DOCTYPE html>
<script src="../../resources/testharness.js"></script>
<script src="../../resources/testharnessreport.js"></script>

<form>
  <div>
      <input
      class="toggle-all"
      type="text"
      id="inputtext"
      name="subscribe"
      value="newsletter"
      autofocus="true"/>
  </div>
</form>

<script>
// settting value with same length should not dispatch selectionchange event
const text_array = ['something to do 0', 'something to do 5', 'something to do 10'];
var text_selected = document.getElementById("inputtext");

promise_test(async t => {
    var eventWatcher = new EventWatcher(t, document, ['selectionchange', 'selectionchange', 'focusout']);

    for (let text of text_array) {
        text_selected.value = text;
    }

    setTimeout(() => { text_selected.blur(); }, 10);
    await eventWatcher.wait_for('focusout');
}, "Setting value three times and blur once");
</script>
