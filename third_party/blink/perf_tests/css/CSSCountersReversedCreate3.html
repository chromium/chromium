<!DOCTYPE html>
<script src="../resources/runner.js"></script>
<style>
  body {
    counter-reset: reversed(my-counter);
  }
  div {
    counter-increment: my-counter 1;
  }
  div.setter {
    counter-set: my-counter 50;
  }
  div::before {
    content: counter(my-counter);
  }
</style>
<body></body>
<script>
  let totalNodes = 0;

  function createTree(root, numElements, depth) {
    if (!depth) {
      return;
    }
    for (let i = 0; i < numElements; ++i) {
      const div = document.createElement('div');
      totalNodes++;

      if (totalNodes % 100 === 0) {
        div.className = 'setter';
      }

      root.append(div);
      createTree(div, numElements, depth - 1);
    }
  }

  PerfTestRunner.measureTime({
    description: 'Single massive reversed scope with mixed operations',
    run: function() {
      document.body.innerHTML = '';
      totalNodes = 0;
      createTree(document.body, 5, 6);
      document.body.offsetTop;
    },
    iterationCount: 5,
  });
</script>
