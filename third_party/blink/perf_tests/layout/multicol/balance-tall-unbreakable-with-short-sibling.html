<!DOCTYPE html>
<script src="../../resources/runner.js"></script>
<pre id="log"></pre>
<div id="target" style="display:none; columns:2; width:40em; orphans:1; widows:1; line-height:20px;">
  <div style="contain:size; height:20000px;"></div>
  <div class="fillme" style="contain:size; height:19900px;"></div>
  <div class="fillme" style="contain:size; height:19900px;"></div>
  bazinga!
</div>
<script>
  // Fill with some content to slow down layout.
  for (let block of document.querySelectorAll(".fillme")) {
    for (let i=0; i<900; i++) {
      child = document.createElement("div");
      child.innerText = "line";
      block.appendChild(child);
    }
  }

  var target = document.getElementById("target");
  var style = target.style;

  function test() {
    style.display = "block";
    PerfTestRunner.forceLayout();
    style.display = "none";
    PerfTestRunner.forceLayout();
  }

  PerfTestRunner.measureRunsPerSecond({
    description: "Measures performance of multicol balancing of tall unbreakable blocks next to something short.",
    run: test
  });
</script>
