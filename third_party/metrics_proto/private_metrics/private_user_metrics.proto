syntax = "proto2";

option optimize_for = LITE_RUNTIME;
option java_package = "org.chromium.components.metrics";

package private_metrics;

import "private_metrics/system_profiles/csrr_coarse_system_profile.proto";
import "private_metrics/system_profiles/search_system_profile.proto";
import "histogram_event.proto";

// Private user metrics.
// This is the top-level log proto for PUMA logs.
// Next tag: 5
message PrivateUserMetrics {
  // The PrivateUserMetrics client_id. Not joinable with UMA / UKM or any other
  // client ids.
  optional fixed64 client_id = 1;

  // A list of metric events.
  // A client can send multiple events.
  repeated PrivateMetricEvent private_metric_events = 2;

  // Only one system profile type can be set.
  oneof system_profile {
    CsrrCoarseSystemProfile csrr_profile = 3;
    SearchSystemProfile search_profile = 4;
  }
}

// A PrivateMetricEvent contains a list of histogram_events which
// is the actual metric data being reported. This outer type is defined for
// flexibility for future expansion.
// Next tag: 2
message PrivateMetricEvent {
  // The metric data being reported.
  repeated metrics.HistogramEventProto histogram_events = 1;
}
