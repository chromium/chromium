edition = "2023";

option optimize_for = LITE_RUNTIME;
option java_package = "org.chromium.components.metrics";

package private_metrics;

// A single metric, which is defined by a name hash and a value.
// Next tag: 3
message Metric {
  fixed64 name_hash = 1;
  int64 value = 2;
}
