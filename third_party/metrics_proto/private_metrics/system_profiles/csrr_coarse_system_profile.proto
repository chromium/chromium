syntax = "proto2";

option optimize_for = LITE_RUNTIME;
option java_package = "org.chromium.components.metrics";

package private_metrics;

import "private_metrics/system_profiles/coarse_system_profile.proto";

// Choice screen regulatory reporting system profile. These fields are required
// for PrivateUMA.
// All fields in this proto should be populated by the client before sending
// the report.
// Next tag: 6
message CsrrCoarseSystemProfile {
  optional Platform platform = 1;
  optional ChannelType channel = 2;
  optional int32 milestone = 3;
  optional bool is_extended_stable_channel = 4;
}
