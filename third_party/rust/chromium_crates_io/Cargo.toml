# This file defines all third-party Rust dependencies approved for use
# in Chromium.
#
# Crates which do not satisfy the rule-of-2 or which are testonly must be
# marked as such in gnrt_config.toml.

[package]
edition = "2021"
name = "chromium"
version = "0.1.0"

[workspace]

[dependencies]
ahash = "0.8.12" #TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
aho-corasick = "1.1.4" #TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
antlr4rust = "0.5.2"
anyhow = "1.0.98"
arbitrary-int = "2.1.1" #TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
backtrace = "0.3.76" #TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
base64 = "0.22"
bincode = "2.0.1" #TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
bitflags = "2"
bytes = "1"
chrono = "0.4.43"
const_format = "0.2.35" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
const_panic = "0.2.15" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
cxx = "1"
erased-serde = "0.4.9" #TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
fend-core = "1"
font-types = "0.11.3"
fs2 = "0.4.3" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
getrandom = "0.4.1" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
hex = "0.4"
hmac-sha256 = "1.1.12"
hostname = "0.4.2" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
indexmap = "2.12.1"
itertools = "0.14.0"
lazy_static = "1"
libc = "0.2"
minijinja = "2.14.0"
nix = "0.30.1" # TODO(crbug.com/496920769): Remove once libafl is added as a depedency.
num-traits = "0.2"
num_enum = "0.7.5" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
ordered-float = "5.1.0"
png = "0.18.1"
proc-macro2 = "1"
prost = "0.14.1"
qr_code = "2"
quote = "1"
regex = "1.12.3" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
rustc-demangle-capi = "0.1"
safe_arch = "0.7.4" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
scc = "2.4.0" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
serde = "1.0.219"
serde_json = "1.0.149"
shared-brotli-patch-decoder = "0.1.3"
siphasher = "1.0.2" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
skrifa = "0.42.1"
small_ctor = "0.1"
static_assertions = "1"
xml = "1.3.0"

[dependencies.bytemuck]
version = "1"
features = ["nightly_portable_simd"]  # For std::simd coverage.

[dependencies.crc32fast]
version = "1.4.2"
features = ["nightly"]  # For optimized aarch64 implementation.

# Without the `artifact` field Cargo will only build the `[lib]` target from a
# dependency.  Specifying `artifact = "bin"` below allows Cargo (and `gnrt`) to
# also cover `cxxbridge-cmd` when analyzing the dependency tree.  See also
# https://doc.rust-lang.org/nightly/cargo/reference/unstable.html#artifact-dependencies
[dependencies.cxxbridge-cmd]
version = "1"
artifact = "bin"

[dependencies.icu_casemap]
version = "2.2.0"
default-features = false
features = ["compiled_data"]

[dependencies.icu_experimental]
version = "0.5.0"
default-features = false
features = ["compiled_data"]

[dependencies.icu_locale_core]
version = "2.2.0"
default-features = false

[dependencies.icu_normalizer]
version = "2.2.0"
default-features = false
features = ["compiled_data"]

[dependencies.icu_properties]
version = "2.2.0"
default-features = false
features = ["compiled_data"]

[dependencies.icu_provider]
version = "2.2.0"
default-features = false

[dependencies.image]
version = "0.25.9"
default-features = false
features = ["bmp"]

[dependencies.jxl]
version = "0.4.3"
features = ["all-simd"]

[dependencies.llguidance]
version = "1.0.0"
default-features = false
features = ["lark"]

[dependencies.log]
version = "0.4"
# `release_max_level_info` disables debug and trace logs at compile time
# when debug asserts are off, which is when DCHECK_IS_ON() is false.
features = ["std", "release_max_level_info"]

[dependencies.moxcms]
version = "0.8.1"
default-features = false

[dependencies.postcard]
version = "1.1.3" # TODO(crbug.com/496920769): Remove once libafl is added as a dependency.
default-features = false
features = ["alloc"]

[dependencies.read-fonts]
version = "0.39.2"
features = ["agl"]

[dependencies.rustfft]
version = "6.4.1"

# Temporarily inform our cargo tooling that we care about
# the new version of serde_json_lenient. We are in the midst
# of CLs that move from the older to the newer.
[dependencies.serde_json_lenient]
package = "serde_json_lenient"
version = "0.2"
features = ["unbounded_depth", "float_roundtrip"]

[dependencies.strum]
version = "0.28.0"
features = ["derive"]

# Tweak required to transitive dependency to avoids some use of unsafe,
# at the cost of requiring the nightly compiler.
[dependencies.subtle]
version = "2.6.1"
features = ["core_hint_black_box"]

[dependencies.symphonia]
version = "0.6.0-alpha.2"

# Disable the default lists of codecs and supported containers, and only support
# codecs specifically added in `features`. Enabling new codec support requires a
# package configuration through gnrt vendor and gnrt gen.
default-features = false
features = ["flac", "mp3", "pcm", "vorbis", "opt-simd"]

[dependencies.syn]
version = "2"
features = ["full"]

[dependencies.temporal_capi]
version = "0.2.3"
features = ["zoneinfo64"]

[dependencies.temporal_rs]
version = "0.2.3"
default-features = false
# This is necessary to enable a spec-compliance quirk
features = ["float64_representable_durations"]

[dependencies.zip]
version = "8.2.0"
default-features = false
features = ["deflate-flate2"]
